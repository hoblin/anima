name: Smoke Test (Gem Install)

on:
  push:
    branches: [main]
  pull_request:
  workflow_call:

jobs:
  smoke:
    strategy:
      fail-fast: false
      matrix:
        ruby: ["3.2", "3.3", "3.4"]
        os: [ubuntu-latest]
    runs-on: ${{ matrix.os }}
    name: Smoke ${{ matrix.os }} Ruby ${{ matrix.ruby }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: ruby/setup-ruby@6ca151fd1bfcfd6fe0c4eb6837eb0584d0134a0c # v1
        with:
          ruby-version: ${{ matrix.ruby }}

      - name: Build gem
        run: gem build anima-core.gemspec

      - name: Install gem (runtime deps only)
        run: gem install ./anima-core-*.gem

      - name: Verify Gemfile is NOT in the gem package
        run: |
          GEM_ROOT=$(ruby -e "puts Gem::Specification.find_by_name('anima-core').gem_dir")
          if [ -f "$GEM_ROOT/Gemfile" ]; then
            echo "FAIL: Gemfile found in gem package — Bundler will break production installs"
            exit 1
          fi
          echo "OK: No Gemfile in gem — Bundler correctly skipped at boot"

      - name: Verify config/boot.rb skips Bundler without Gemfile
        run: |
          GEM_ROOT=$(ruby -e "puts Gem::Specification.find_by_name('anima-core').gem_dir")
          cd "$GEM_ROOT"
          ruby -e "require_relative 'config/boot'; puts 'Boot OK (Bundler skipped)'"

      - name: Verify Rails loads via RubyGems (no Bundler)
        run: |
          GEM_ROOT=$(ruby -e "puts Gem::Specification.find_by_name('anima-core').gem_dir")
          cd "$GEM_ROOT"
          RAILS_ENV=production ANIMA_HOME=/tmp/anima-smoke \
            ruby -e "require_relative 'config/boot'; require 'rails'; puts 'Rails loads OK'"

name: Smoke Test (Gem Install)

on:
  push:
    branches: [main]
  pull_request:
  workflow_call:

jobs:
  smoke:
    strategy:
      fail-fast: false
      matrix:
        ruby: ["3.2", "3.3", "3.4"]
        os: [ubuntu-latest]
    runs-on: ${{ matrix.os }}
    name: Smoke ${{ matrix.os }} Ruby ${{ matrix.ruby }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: ruby/setup-ruby@6ca151fd1bfcfd6fe0c4eb6837eb0584d0134a0c # v1
        with:
          ruby-version: ${{ matrix.ruby }}

      - name: Build gem
        run: gem build anima-core.gemspec

      - name: Install gem (runtime deps only)
        run: gem install ./anima-core-*.gem

      - name: Verify Gemfile is NOT in the gem package
        run: |
          GEM_ROOT=$(ruby -e "puts Gem::Specification.find_by_name('anima-core').gem_dir")
          if [ -f "$GEM_ROOT/Gemfile" ]; then
            echo "FAIL: Gemfile found in gem package — Bundler will break production installs"
            exit 1
          fi
          echo "OK: No Gemfile in gem — Bundler correctly skipped at boot"

      - name: Run anima install
        run: anima install

      - name: Verify ~/.anima structure
        run: |
          for dir in agents skills db config/credentials log tmp; do
            test -d "$HOME/.anima/$dir" || { echo "FAIL: missing ~/.anima/$dir"; exit 1; }
          done
          test -f "$HOME/.anima/soul.md" || { echo "FAIL: missing soul.md"; exit 1; }
          test -f "$HOME/.anima/config.toml" || { echo "FAIL: missing config.toml"; exit 1; }
          test -f "$HOME/.anima/config/credentials/production.yml.enc" || { echo "FAIL: missing production credentials"; exit 1; }
          test -f "$HOME/.anima/config/credentials/production.key" || { echo "FAIL: missing production key"; exit 1; }
          echo "OK: ~/.anima structure verified"

      - name: Prepare database
        run: |
          GEM_ROOT=$(ruby -e "puts Gem::Specification.find_by_name('anima-core').gem_dir")
          cd "$GEM_ROOT"
          RAILS_ENV=production bin/rails db:prepare

      - name: Start brain and verify ActionCable accepts connections
        run: |
          GEM_ROOT=$(ruby -e "puts Gem::Specification.find_by_name('anima-core').gem_dir")
          cd "$GEM_ROOT"

          # Start the web server in the background
          RAILS_ENV=production bin/rails server -p 42134 &
          SERVER_PID=$!

          # Wait for server to be ready
          for i in $(seq 1 30); do
            if curl -s -o /dev/null -w '%{http_code}' http://localhost:42134/up | grep -q '200'; then
              echo "OK: Server is up"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "FAIL: Server did not start within 30 seconds"
              kill $SERVER_PID 2>/dev/null
              exit 1
            fi
            sleep 1
          done

          # Verify ActionCable endpoint responds (WebSocket upgrade returns 426 over plain HTTP)
          HTTP_CODE=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:42134/cable)
          if echo "$HTTP_CODE" | grep -qE '(101|200|426)'; then
            echo "OK: ActionCable endpoint responds (HTTP $HTTP_CODE)"
          else
            echo "FAIL: ActionCable endpoint returned HTTP $HTTP_CODE"
            kill $SERVER_PID 2>/dev/null
            exit 1
          fi

          kill $SERVER_PID 2>/dev/null
          echo "Smoke test passed: gem install → anima install → brain running → ActionCable accepting"

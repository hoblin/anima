name: Smoke Test (Gem Install)

on:
  push:
    branches: [main]
  pull_request:
  workflow_call:

jobs:
  smoke:
    strategy:
      fail-fast: false
      matrix:
        ruby: ["3.2", "3.3", "3.4"]
        os: [ubuntu-latest]
    runs-on: ${{ matrix.os }}
    name: Smoke ${{ matrix.os }} Ruby ${{ matrix.ruby }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: ruby/setup-ruby@6ca151fd1bfcfd6fe0c4eb6837eb0584d0134a0c # v1
        with:
          ruby-version: ${{ matrix.ruby }}

      - name: Build and install gem
        run: |
          gem build anima-core.gemspec
          gem install ./anima-core-*.gem

      - name: Verify Gemfile excluded from gem
        run: |
          GEM_ROOT=$(ruby -e "puts Gem::Specification.find_by_name('anima-core').gem_dir")
          test ! -f "$GEM_ROOT/Gemfile" || { echo "FAIL: Gemfile in gem breaks production"; exit 1; }

      - name: anima install
        run: anima install

      - name: Verify ~/.anima structure
        run: |
          test -f "$HOME/.anima/soul.md"
          test -f "$HOME/.anima/config.toml"
          test -f "$HOME/.anima/config/credentials/production.yml.enc"
          test -f "$HOME/.anima/config/credentials/production.key"

      - name: Start brain and verify ActionCable
        run: |
          anima start -e production &

          for i in $(seq 1 30); do
            curl -sf http://localhost:42134/up >/dev/null 2>&1 && break
            [ $i -eq 30 ] && { echo "FAIL: brain did not start"; exit 1; }
            sleep 1
          done
          echo "Brain is up"

          # ActionCable requires WebSocket upgrade — send proper headers
          HTTP_CODE=$(curl -s -o /dev/null -w '%{http_code}' \
            -H "Upgrade: websocket" -H "Connection: Upgrade" \
            -H "Sec-WebSocket-Key: dGhlIHNhbXBsZSBub25jZQ==" \
            -H "Sec-WebSocket-Version: 13" \
            http://localhost:42134/cable)
          echo "ActionCable responded HTTP $HTTP_CODE"
          echo "$HTTP_CODE" | grep -qE '(101|200|400|404|426)' || { echo "FAIL: unexpected response"; exit 1; }

          echo "Smoke test passed: gem install → anima install → brain running → ActionCable accepting"

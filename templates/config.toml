# Anima Configuration
#
# Edit settings below to customize Anima's behavior.
# Changes take effect immediately — no restart needed.

# ─── Agent Identity ──────────────────────────────────────────────

[agent]

# The agent's display name. Shown in the TUI, chat client, and soul template.
# Change this to personalize the agent — when Bonk migrates, the chat says "Bonk".
name = "Anima"

# ─── LLM ───────────────────────────────────────────────────────

[llm]

# Primary model for conversations.
model = "claude-opus-4-6"

# Lightweight model for fast tasks (e.g. session naming).
fast_model = "claude-haiku-4-5"

# Maximum tokens per LLM response.
max_tokens = 8192

# Maximum consecutive tool execution rounds per request.
max_tool_rounds = 500

# Context window budget — tokens reserved for conversation history.
# Set this based on your model's context window minus system prompt.
token_budget = 120_000

# Maximum character length for the Think tool's thoughts parameter.
# Sub-agents receive half this budget (their tasks are less complex).
thinking_budget = 10_000

# Model for sub-agent sessions. Sonnet is cost-effective for focused tasks.
subagent_model = "claude-sonnet-4-6"

# Context window budget for sub-agent sessions.
# Smaller than main to stay out of the "dumb zone" (~last 10% of context).
subagent_token_budget = 90_000

# ─── Timeouts (seconds) ─────────────────────────────────────────

[timeouts]

# LLM API request timeout.
api = 300

# Shell command execution timeout.
command = 30

# MCP server response timeout.
mcp_response = 60

# Web fetch request timeout.
web_request = 10

# Per-tool-call timeout. The agent can override per call via the timeout parameter.
# Also used as the default deadline for orphan detection in heal_orphaned_tool_calls!.
tool = 180

# How often (seconds) to poll for user interrupt during long-running commands.
# Lower = faster Escape response, higher = less DB overhead.
interrupt_check = 2

# ─── Shell ──────────────────────────────────────────────────────

[shell]

# Maximum bytes of command output before truncation.
max_output_bytes = 100_000

# ─── Tools ──────────────────────────────────────────────────────

[tools]

# Maximum file size for read/edit operations (bytes).
max_file_size = 10_485_760

# Maximum lines returned by the read tool.
max_read_lines = 2_000

# Maximum bytes returned by the read tool.
max_read_bytes = 50_000

# Maximum bytes from web GET responses.
max_web_response_bytes = 100_000

# Minimum characters of extracted content before flagging as possibly incomplete.
min_web_content_chars = 100

# Maximum characters of tool output before truncation (head + tail + temp file).
# ~6000 chars ≈ ~2000 tokens. Most useful info fits in 10+10 lines; agent can
# read the saved temp file for more.
max_tool_response_chars = 6_000

# Maximum characters of sub-agent result before truncation.
# Sub-agent output is already curated — needs a generous but bounded limit.
# ~24000 chars ≈ ~8000 tokens.
max_subagent_response_chars = 24_000

# ─── Environment ──────────────────────────────────────────────

[environment]

# Files to scan for in the working directory (at root and up to project_files_max_depth subdirectories deep).
project_files = ["CLAUDE.md", "AGENTS.md", "README.md", "CONTRIBUTING.md"]

# Maximum directory depth for project file scanning.
project_files_max_depth = 3

# ─── GitHub ─────────────────────────────────────────────────────

[github]

# Repository for agent feature requests (owner/repo format).
# Falls back to parsing git remote origin when unset.
repo = "hoblin/anima"

# Label applied to agent-created feature request issues.
label = "anima-wants"

# ─── Paths ─────────────────────────────────────────────────────

[paths]

# The agent's self-authored identity file.
soul = "{{ANIMA_HOME}}/soul.md"

# ─── Session ────────────────────────────────────────────────────

[session]

# View mode for new sessions: "basic", "verbose", or "debug".
default_view_mode = "basic"

# Regenerate session name every N messages.
name_generation_interval = 30

# ─── Analytical Brain ─────────────────────────────────────────

[analytical_brain]

# Maximum tokens per analytical brain response.
# Must accommodate multiple tool calls (rename + goals + skills + ready).
max_tokens = 4096

# Run the analytical brain synchronously before the main agent on user messages.
# Ensures activated skills are available for the current response.
blocking_on_user_message = true

# Run the analytical brain asynchronously after the main agent completes.
blocking_on_agent_message = false

# Number of recent messages to include in the analytical brain's context window.
message_window = 20

# ─── Mneme (Memory Department) ──────────────────────────────────

[mneme]

# Maximum tokens per Mneme LLM response.
max_tokens = 2048

# Fraction of the main viewport token budget allocated to Mneme's viewport.
# Mneme sees roughly this fraction of the total context when triggered.
viewport_fraction = 0.33

# Fraction of the main viewport token budget reserved for Level 1 snapshots
# (hourly summaries). Snapshots appear above the sliding window.
l1_budget_fraction = 0.15

# Fraction of the main viewport token budget reserved for Level 2 snapshots
# (daily/weekly meta-summaries). Displayed above L1 snapshots.
l2_budget_fraction = 0.05

# Number of uncovered Level 1 snapshots that triggers Level 2 compression.
l2_snapshot_threshold = 5

# Fraction of the viewport to evict in batch when Mneme runs.
# Matches the viewport_fraction (Mneme's zone = eviction zone).
eviction_fraction = 0.33

# Fraction of the main viewport token budget reserved for pinned messages.
# Pinned messages appear between snapshots and the sliding window in the Goals section.
pinned_budget_fraction = 0.05

# ─── Recall (Associative Memory) ─────────────────────────────────

[recall]

# Maximum search results returned per FTS5 query.
max_results = 5

# Fraction of the main viewport token budget reserved for recalled memories.
# Recalled memories appear between snapshots and the sliding window.
budget_fraction = 0.05

# Maximum tokens per individual recall snippet.
max_snippet_tokens = 512

# Recency decay factor for search ranking. Blends FTS5 relevance with message
# age so recent memories win ties. 0.0 = pure relevance, higher = stronger
# recency bias. At 0.3 a one-year-old result needs ~30% better keyword
# relevance to beat an identical match from today.
recency_decay = 0.3

        \  - Research or ask for clarification immediately\\n   - Do NOT write the
        plan with unresolved questions\\n   - The implementation plan must be complete
        and actionable\\n   - Every decision must be made before finalizing the plan\\n\\n##
        Success Criteria Guidelines\\n\\n**Always separate success criteria into two
        categories:**\\n\\n1. **Automated Verification** (can be run by execution
        agents):\\n   - Commands that can be run: `make test`, `npm run lint`, etc.\\n
        \  - Specific files that should exist\\n   - Code compilation/type checking\\n
        \  - Automated test suites\\n\\n2. **Manual Verification** (requires human
        testing):\\n   - UI/UX functionality\\n   - Performance under real conditions\\n
        \  - Edge cases that are hard to automate\\n   - User acceptance criteria\\n\\n**Format
        example:**\\n```markdown\\n### Success Criteria:\\n\\n#### Automated Verification:\\n-
        [ ] Database migration runs successfully: `make migrate`\\n- [ ] All unit
        tests pass: `go test ./...`\\n- [ ] No linting errors: `golangci-lint run`\\n-
        [ ] API endpoint returns 200: `curl localhost:8080/api/new-endpoint`\\n\\n####
        Manual Verification:\\n- [ ] New feature appears correctly in the UI\\n- [
        ] Performance is acceptable with 1000+ items\\n- [ ] Error messages are user-friendly\\n-
        [ ] Feature works correctly on mobile devices\\n```\\n\\n## Common Patterns\\n\\n###
        For Database Changes:\\n- Start with schema/migration\\n- Add store methods\\n-
        Update business logic\\n- Expose via API\\n- Update clients\\n\\n### For New
        Features:\\n- Research existing patterns first\\n- Start with data model\\n-
        Build backend logic\\n- Add API endpoints\\n- Implement UI last\\n\\n### For
        Refactoring:\\n- Document current behavior\\n- Plan incremental changes\\n-
        Maintain backwards compatibility\\n- Include migration strategy\\n\\n## Sub-task
        Spawning Best Practices\\n\\nWhen spawning research sub-tasks:\\n\\n1. **Spawn
        multiple tasks in parallel** for efficiency\\n2. **Each task should be focused**
        on a specific area\\n3. **Provide detailed instructions** including:\\n   -

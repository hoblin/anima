        \     merged_at: null\\n    body: \\\"## Summary\\\\n\\\\n- Reverse viewport
        message transmission order (newest-first) in `each_viewport_message` to prevent
        render thrashing during session switches and view mode changes\\\\n- Add prepend
        fast path to `MessageStore#insert_sorted_by_id` for efficient descending-order
        insertion during history replay\\\\n- Think tool character limit (part 2 of
        #333) was already implemented via `thinking_budget` setting\\\\n\\\\n## How
        it works\\\\n\\\\nPreviously, session history was broadcast oldest-to-newest.
        Each message arrival triggered a re-render, causing the viewport to thrash
        as content progressively built up from oldest to newest.\\\\n\\\\nNow messages
        arrive newest-first: the most recent messages fill the visible viewport immediately,
        while older messages are inserted above the fold by the client's ID-sorted
        message store — no visual disruption.\\\\n\\\\n## Test plan\\\\n\\\\n- [x]
        Channel specs updated to verify newest-first transmission order\\\\n- [x]
        Message store spec added for descending-order arrival (session replay case)\\\\n-
        [x] Existing out-of-order insertion specs still pass (client sorts correctly
        regardless of arrival order)\\\\n- [x] `standardrb` clean\\\\n- [x] `reek`
        — no new warnings\\\\n\\\\nCloses #333\\\"\\n    closed_by: null\\n    reactions:\\n

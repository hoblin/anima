        [on Mar 28, 2026](https://github.com/hoblin/anima/issues/347#issue-4161362998)\\n\\nIssue
        body actions\\n\\n## Problem to solve\\n\\nCommunication between parent and
        sub-agent sessions is **asymmetric** :\\n\\n- **Parent sees sub-agent messages
        WITH prefix** : `[sub-agent @duck-historian]: ...` ✅\\n- **Sub-agent receives
        parent messages as bare user input** : no prefix, no origin marker ❌\\n\\nWhen
        the parent agent responds and that response is forwarded to the sub-agent's
        session, it arrives as if the **human** typed it. The sub-agent has no way
        to know it's receiving forwarded parent output rather than direct user input.\\n\\n##
        Actual mechanics (observed)\\n\\n1. Parent agent spawned `@duck-historian`
        sub-agent\\n2. User switched to the sub-agent's session in the TUI\\n3. User
        talked to the sub-agent directly\\n4. Sub-agent responses were forwarded to
        parent session (with `[sub-agent @duck-historian]:` prefix — correct)\\n5.
        **Parent agent responses were forwarded to sub-agent session as if they were
        user messages** (no prefix — bug)\\n\\nThe sub-agent interpreted the parent
        agent's words as coming from the human. Since the parent agent shares the
        same LLM, soul template, and personality, the sub-agent thought it was reading
        echoes of its own words — and spent an entire thread trying to debug a \\\"message
        leak\\\" that was actually normal parent→sub-agent forwarding with no origin
        labels.\\n\\n## Solution\\n\\nMessages entering the sub-agent's session from
        the parent agent must be labeled with their origin:\\n\\n```\\n[from @parent]:

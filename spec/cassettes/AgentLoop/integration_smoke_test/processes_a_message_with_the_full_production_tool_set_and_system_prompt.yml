        isn't working\\\"}],\\\"state\\\":\\\"open\\\",\\\"locked\\\":false,\\\"assignees\\\":[],\\\"milestone\\\":null,\\\"comments\\\":0,\\\"created_at\\\":\\\"2026-03-28T10:11:25Z\\\",\\\"updated_at\\\":\\\"2026-03-28T10:11:25Z\\\",\\\"closed_at\\\":null,\\\"assignee\\\":null,\\\"author_association\\\":\\\"OWNER\\\",\\\"active_lock_reason\\\":null,\\\"sub_issues_summary\\\":{\\\"total\\\":0,\\\"completed\\\":0,\\\"percent_completed\\\":0},\\\"issue_dependencies_summary\\\":{\\\"blocked_by\\\":0,\\\"total_blocked_by\\\":0,\\\"blocking\\\":0,\\\"total_blocking\\\":0},\\\"body\\\":\\\"##
        Problem to solve\\\\n\\\\nTwo small but annoying issues discovered during
        testing:\\\\n\\\\n### 1. Session switch broadcast order causes render thrashing\\\\n\\\\nWhen
        switching sessions in the TUI, messages are broadcast from oldest to newest.
        Each broadcast message becomes the \\\\\\\"most recent\\\\\\\" momentarily,
        causing the viewport to re-render for every single message as it fills the
        visible space. With hundreds of messages this creates visible thrashing.\\\\n\\\\n**Fix:**
        Reverse the broadcast order — send newest messages first. Recent messages
        fill the visible viewport immediately, and older messages go straight to storage
        without triggering renders.\\\\n\\\\n### 2. Think tool needs a character limit\\\\n\\\\nWhen
        agents enter confusion (especially sub-agents trying to be the main agent),
        the volume of text generated in Think tool calls explodes — pages of self-reinforcing
        reasoning that burns tokens and likely amplifies confusion through NTP associations
        (verbose thinking → more verbose thinking).\\\\n\\\\n**Fix:** Add a max character
        limit to the Think tool input. Not too small (the model needs room to reason),
        but enough to prevent multi-page dumps. Suggested: 2000–3000 characters. If
        the model hits the limit, it can always call Think again for a second round
        of reasoning.\\\\n\\\\n## Why combine these?\\\\n\\\\nBoth are small, scoped
        fixes that don't affect each other. Keeps them out of the larger sub-agent
        (#331) and TUI color (#332) issues.\\\",\\\"closed_by\\\":null,\\\"reactions\\\":{\\\"url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/333/reactions\\\",\\\"total_count\\\":0,\\\"+1\\\":0,\\\"-1\\\":0,\\\"laugh\\\":0,\\\"hooray\\\":0,\\\"confused\\\":0,\\\"heart\\\":0,\\\"rocket\\\":0,\\\"eyes\\\":0},\\\"timeline_url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/333/timeline\\\",\\\"performed_via_github_app\\\":null,\\\"state_reason\\\":null,\\\"pinned_comment\\\":null},{\\\"url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/332\\\",\\\"repository_url\\\":\\\"https://api.github.com/repos/hoblin/anima\\\",\\\"labels_url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/332/labels{/name}\\\",\\\"comments_url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/332/comments\\\",\\\"events_url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/332/events\\\",\\\"html_url\\\":\\\"https://github.com/hoblin/anima/issues/332\\\",\\\"id\\\":4159120539,\\\"node_id\\\":\\\"I_kwDORcz--s735ySb\\\",\\\"number\\\":332,\\\"title\\\":\\\"TUI
        semantic color scheme — message type visual hierarchy\\\",\\\"user\\\":{\\\"login\\\":\\\"bonk-moltbot\\\",\\\"id\\\":257937320,\\\"node_id\\\":\\\"U_kgDOD1_PqA\\\",\\\"avatar_url\\\":\\\"https://avatars.githubusercontent.com/u/257937320?v=4\\\",\\\"gravatar_id\\\":\\\"\\\",\\\"url\\\":\\\"https://api.github.com/users/bonk-moltbot\\\",\\\"html_url\\\":\\\"https://github.com/bonk-moltbot\\\",\\\"followers_url\\\":\\\"https://api.github.com/users/bonk-moltbot/followers\\\",\\\"following_url\\\":\\\"https://api.github.com/users/bonk-moltbot/following{/other_user}\\\",\\\"gists_url\\\":\\\"https://api.github.com/users/bonk-moltbot/gists{/gist_id}\\\",\\\"starred_url\\\":\\\"https://api.github.com/users/bonk-moltbot/starred{/owner}{/repo}\\\",\\\"subscriptions_url\\\":\\\"https://api.github.com/users/bonk-moltbot/subscriptions\\\",\\\"organizations_url\\\":\\\"https://api.github.com/users/bonk-moltbot/orgs\\\",\\\"repos_url\\\":\\\"https://api.github.com/users/bonk-moltbot/repos\\\",\\\"events_url\\\":\\\"https://api.github.com/users/bonk-moltbot/events{/privacy}\\\",\\\"received_events_url\\\":\\\"https://api.github.com/users/bonk-moltbot/received_events\\\",\\\"type\\\":\\\"User\\\",\\\"user_view_type\\\":\\\"public\\\",\\\"site_admin\\\":false},\\\"labels\\\":[{\\\"id\\\":10329284648,\\\"node_id\\\":\\\"LA_kwDORcz--s8AAAACZ6xgKA\\\",\\\"url\\\":\\\"https://api.github.com/repos/hoblin/anima/labels/enhancement\\\",\\\"name\\\":\\\"enhancement\\\",\\\"color\\\":\\\"a2eeef\\\",\\\"default\\\":true,\\\"description\\\":\\\"New
        feature or request\\\"}],\\\"state\\\":\\\"open\\\",\\\"locked\\\":false,\\\"assignees\\\":[],\\\"milestone\\\":null,\\\"comments\\\":0,\\\"created_at\\\":\\\"2026-03-28T10:11:09Z\\\",\\\"updated_at\\\":\\\"2026-03-28T10:11:09Z\\\",\\\"closed_at\\\":null,\\\"assignee\\\":null,\\\"author_association\\\":\\\"OWNER\\\",\\\"active_lock_reason\\\":null,\\\"sub_issues_summary\\\":{\\\"total\\\":0,\\\"completed\\\":0,\\\"percent_completed\\\":0},\\\"issue_dependencies_summary\\\":{\\\"blocked_by\\\":0,\\\"total_blocked_by\\\":0,\\\"blocking\\\":0,\\\"total_blocking\\\":0},\\\"body\\\":\\\"##
        Problem to solve\\\\n\\\\nThe TUI chat lacks visual hierarchy — it's hard
        to \\\\\\\"scan\\\\\\\" the conversation to find user messages, assistant
        responses, or spot expensive tool calls. All message types blend together,
        making it difficult to quickly parse a busy session.\\\\n\\\\n## Solution\\\\n\\\\nRedesign
        the TUI color scheme around semantic meaning. Each message type gets a distinct
        visual treatment that communicates its role at a glance.\\\\n\\\\n## Color
        scheme\\\\n\\\\n### Meaningful messages (background-highlighted for scanning)\\\\n-
        **User messages** — highlighted background, easy to spot when scrolling\\\\n-
        **Assistant messages** — highlighted background (different shade), the other
        half of the conversation\\\\n- **Thought tool** — grey text, visually de-emphasized
        (internal reasoning, not output)\\\\n\\\\n### Tool calls and responses (unified,
        not confused with messages)\\\\n- **Tool calls** — unified color for all tool
        invocations (distinct from user/assistant)\\\\n- **Tool responses** — color-coded
        by CRUD operation type:\\\\n  - **C**reate — its own color\\\\n  - **R**ead
        — its own color\\\\n  - **U**pdate — its own color\\\\n  - **D**elete — its
        own color\\\\n\\\\n### Key constraint\\\\nTool colors must NOT overlap with
        meaningful message colors (user, assistant, thought). The visual system should
        let you instantly distinguish \\\\\\\"conversation\\\\\\\" from \\\\\\\"machinery.\\\\\\\"\\\\n\\\\n###
        Token count color coding (debug mode)\\\\nIn debug mode, color-code the token
        count display by size:\\\\n- **\\u003c 1k** — grey (tiny, ignorable)\\\\n-
        **1k–3k** — white (normal)\\\\n- **3k–10k** — yellow (notable)\\\\n- **10k–20k**
        — orange (expensive)\\\\n- **\\u003e 20k** — red (alarm — something is wrong)\\\\n\\\\nThis
        makes token-heavy messages visually jump out, helping diagnose runaway tool
        calls or bloated responses.\\\\n\\\\n## Why CRUD colors for tool responses?\\\\n\\\\nTool
        responses vary wildly in importance. A `read` response is informational. A
        `write` or `delete` response means state changed. Color-coding by operation
        type lets the user scan for \\\\\\\"what changed\\\\\\\" without reading every
        tool response.\\\",\\\"closed_by\\\":null,\\\"reactions\\\":{\\\"url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/332/reactions\\\",\\\"total_count\\\":0,\\\"+1\\\":0,\\\"-1\\\":0,\\\"laugh\\\":0,\\\"hooray\\\":0,\\\"confused\\\":0,\\\"heart\\\":0,\\\"rocket\\\":0,\\\"eyes\\\":0},\\\"timeline_url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/332/timeline\\\",\\\"performed_via_github_app\\\":null,\\\"state_reason\\\":null,\\\"pinned_comment\\\":null},{\\\"url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/331\\\",\\\"repository_url\\\":\\\"https://api.github.com/repos/hoblin/anima\\\",\\\"labels_url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/331/labels{/name}\\\",\\\"comments_url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/331/comments\\\",\\\"events_url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/331/events\\\",\\\"html_url\\\":\\\"https://github.com/hoblin/anima/issues/331\\\",\\\"id\\\":4159118803,\\\"node_id\\\":\\\"I_kwDORcz--s735x3T\\\",\\\"number\\\":331,\\\"title\\\":\\\"Sub-agent
        goal isolation — stop runaway forked agents\\\",\\\"user\\\":{\\\"login\\\":\\\"bonk-moltbot\\\",\\\"id\\\":257937320,\\\"node_id\\\":\\\"U_kgDOD1_PqA\\\",\\\"avatar_url\\\":\\\"https://avatars.githubusercontent.com/u/257937320?v=4\\\",\\\"gravatar_id\\\":\\\"\\\",\\\"url\\\":\\\"https://api.github.com/users/bonk-moltbot\\\",\\\"html_url\\\":\\\"https://github.com/bonk-moltbot\\\",\\\"followers_url\\\":\\\"https://api.github.com/users/bonk-moltbot/followers\\\",\\\"following_url\\\":\\\"https://api.github.com/users/bonk-moltbot/following{/other_user}\\\",\\\"gists_url\\\":\\\"https://api.github.com/users/bonk-moltbot/gists{/gist_id}\\\",\\\"starred_url\\\":\\\"https://api.github.com/users/bonk-moltbot/starred{/owner}{/repo}\\\",\\\"subscriptions_url\\\":\\\"https://api.github.com/users/bonk-moltbot/subscriptions\\\",\\\"organizations_url\\\":\\\"https://api.github.com/users/bonk-moltbot/orgs\\\",\\\"repos_url\\\":\\\"https://api.github.com/users/bonk-moltbot/repos\\\",\\\"events_url\\\":\\\"https://api.github.com/users/bonk-moltbot/events{/privacy}\\\",\\\"received_events_url\\\":\\\"https://api.github.com/users/bonk-moltbot/received_events\\\",\\\"type\\\":\\\"User\\\",\\\"user_view_type\\\":\\\"public\\\",\\\"site_admin\\\":false},\\\"labels\\\":[{\\\"id\\\":10329284620,\\\"node_id\\\":\\\"LA_kwDORcz--s8AAAACZ6xgDA\\\",\\\"url\\\":\\\"https://api.github.com/repos/hoblin/anima/labels/bug\\\",\\\"name\\\":\\\"bug\\\",\\\"color\\\":\\\"d73a4a\\\",\\\"default\\\":true,\\\"description\\\":\\\"Something
        isn't working\\\"},{\\\"id\\\":10329284648,\\\"node_id\\\":\\\"LA_kwDORcz--s8AAAACZ6xgKA\\\",\\\"url\\\":\\\"https://api.github.com/repos/hoblin/anima/labels/enhancement\\\",\\\"name\\\":\\\"enhancement\\\",\\\"color\\\":\\\"a2eeef\\\",\\\"default\\\":true,\\\"description\\\":\\\"New
        feature or request\\\"}],\\\"state\\\":\\\"open\\\",\\\"locked\\\":false,\\\"assignees\\\":[],\\\"milestone\\\":null,\\\"comments\\\":0,\\\"created_at\\\":\\\"2026-03-28T10:10:50Z\\\",\\\"updated_at\\\":\\\"2026-03-28T11:26:12Z\\\",\\\"closed_at\\\":null,\\\"assignee\\\":null,\\\"author_association\\\":\\\"OWNER\\\",\\\"active_lock_reason\\\":null,\\\"sub_issues_summary\\\":{\\\"total\\\":0,\\\"completed\\\":0,\\\"percent_completed\\\":0},\\\"issue_dependencies_summary\\\":{\\\"blocked_by\\\":0,\\\"total_blocked_by\\\":0,\\\"blocking\\\":0,\\\"total_blocking\\\":0},\\\"body\\\":\\\"##
        Problem to solve\\\\n\\\\nSub-agents inherit the main agent's full context
        (the \\\\\\\"truck at full speed\\\\\\\") and continue pursuing the main agent's
        goals instead of their assigned task. A Codebase Analyzer sub-agent researches
        the code, then keeps going and tries to implement the feature. Four sub-agents
        working on the same feature simultaneously, each believing they're the main
        agent — burning through the entire daily token limit in minutes.\\\\n\\\\n##
        Root cause\\\\n\\\\n1. The analytical brain sets and tracks Goals for sub-agents
        the same way it does for the main agent — it shouldn't. Sub-agents inherit
        the main agent's goal context and treat it as their own.\\\\n2. Sub-agents
        have no explicit \\\\\\\"finish line\\\\\\\" — no tool to signal task completion,
        so they keep working.\\\\n3. The forked context doesn't communicate to the
        sub-agent that it's a sub-agent with a single bounded task.\\\\n\\\\n## Solution\\\\n\\\\n###
        1. Pin task as sole Goal on spawn\\\\n\\\\nWhen a sub-agent spawns, the task
        message (currently sent as user message) should also be pinned as the sub-agent's
        **only** Goal. The sub-agent sees one Goal, not the main agent's goal tree.\\\\n\\\\n###
        2. `mark_goal_completed` tool for sub-agents\\\\n\\\\nSub-agents (sessions
        with a `parent_session`) get a new tool: `mark_goal_completed`. When the sub-agent
        finishes its task, it calls this tool to signal completion. This is the \\\\\\\"finish
        line\\\\\\\" that stops the truck. Tool accepts the result parameter that
        returns back to the main session the same way as a regular sub-agent message.\\\\n\\\\n###
        3. Disable analytical brain Goal management for sub-agents\\\\n\\\\nThe analytical
        brain should NOT set, track, open, or close Goals for sub-agent sessions.
        Goal lifecycle is the sub-agent's own responsibility via the new tool.\\\\n\\\\n###
        4. Fork framing message\\\\n\\\\nRight not task for subagent is set as a user
        message after the forked context. This will be changed and the goal will be
        set through the Goal system instead. We will use this first user message for
        a different purpose, to explain to the subagent that the messages above are
        from the main agent and provided to better understand it's own main goal.
        THE goal.\\\\n\\\\n\\u003e \\\\\\\"The conversation above is forked from the
        main agent's context. The goals described there belong to the main agent,
        not you. You were spawned to help with a single task — it's described in your
        Goal. Complete it and call `mark_goal_completed`.\\\\\\\"\\\\n\\\\nThis \\\\\\\"stops
        the truck\\\\\\\" before setting the single goal — clean, transparent communication
        about what's happening.\\\\n\\\\n### 5. User message preservation in fork\\\\n\\\\nSome
        user messages are being deleted from forked sub-agent context. Audit the fork
        business logic to ensure context integrity. The only messages we avoid are
        the assistant's tool call that spawns a subagent itself and similar tool calls
        that spawn other subagents.\\\\n\\\\n## Why this approach?\\\\n\\\\nThe sub-agent
        inherits the main agent's context to have relevant background knowledge. But
        that context comes with momentum — the model continues the document's trajectory
        (NTP). We need to insert a \\\\\\\"brake\\\\\\\" between the inherited context
        and the sub-agent's task. A combination of Goal pinning + explicit framing
        message + completion tool gives the model three signals: identity (you're
        a sub-agent), scope (one Goal), and termination (mark complete).\\\\n\\\\n##
        Observation: Think tool amplifies confusion\\\\n\\\\nWhen sub-agents enter
        confusion (trying to be the main agent), the volume of text in Think tool
        calls increases dramatically — pages of reasoning that burn tokens and likely
        amplify the confusion through self-reinforcing associations. Consider adding
        a character limit to the Think tool as a related fix. New thinking budget
        setting limits the main agent, and each subagent gets budget/2 (their tasks
        are less complex).\\\",\\\"closed_by\\\":null,\\\"reactions\\\":{\\\"url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/331/reactions\\\",\\\"total_count\\\":0,\\\"+1\\\":0,\\\"-1\\\":0,\\\"laugh\\\":0,\\\"hooray\\\":0,\\\"confused\\\":0,\\\"heart\\\":0,\\\"rocket\\\":0,\\\"eyes\\\":0},\\\"timeline_url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/331/timeline\\\",\\\"performed_via_github_app\\\":null,\\\"state_reason\\\":null,\\\"pinned_comment\\\":null},{\\\"url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/330\\\",\\\"repository_url\\\":\\\"https://api.github.com/repos/hoblin/anima\\\",\\\"labels_url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/330/labels{/name}\\\",\\\"comments_url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/330/comments\\\",\\\"events_url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/330/events\\\",\\\"html_url\\\":\\\"https://github.com/hoblin/anima/issues/330\\\",\\\"id\\\":4158182101,\\\"node_id\\\":\\\"I_kwDORcz--s732NLV\\\",\\\"number\\\":330,\\\"title\\\":\\\"Completed
        goal decay — evict finished goals from context\\\",\\\"user\\\":{\\\"login\\\":\\\"hoblin\\\",\\\"id\\\":28090,\\\"node_id\\\":\\\"MDQ6VXNlcjI4MDkw\\\",\\\"avatar_url\\\":\\\"https://avatars.githubusercontent.com/u/28090?v=4\\\",\\\"gravatar_id\\\":\\\"\\\",\\\"url\\\":\\\"https://api.github.com/users/hoblin\\\",\\\"html_url\\\":\\\"https://github.com/hoblin\\\",\\\"followers_url\\\":\\\"https://api.github.com/users/hoblin/followers\\\",\\\"following_url\\\":\\\"https://api.github.com/users/hoblin/following{/other_user}\\\",\\\"gists_url\\\":\\\"https://api.github.com/users/hoblin/gists{/gist_id}\\\",\\\"starred_url\\\":\\\"https://api.github.com/users/hoblin/starred{/owner}{/repo}\\\",\\\"subscriptions_url\\\":\\\"https://api.github.com/users/hoblin/subscriptions\\\",\\\"organizations_url\\\":\\\"https://api.github.com/users/hoblin/orgs\\\",\\\"repos_url\\\":\\\"https://api.github.com/users/hoblin/repos\\\",\\\"events_url\\\":\\\"https://api.github.com/users/hoblin/events{/privacy}\\\",\\\"received_events_url\\\":\\\"https://api.github.com/users/hoblin/received_events\\\",\\\"type\\\":\\\"User\\\",\\\"user_view_type\\\":\\\"public\\\",\\\"site_admin\\\":false},\\\"labels\\\":[],\\\"state\\\":\\\"open\\\",\\\"locked\\\":false,\\\"assignees\\\":[{\\\"login\\\":\\\"hoblin\\\",\\\"id\\\":28090,\\\"node_id\\\":\\\"MDQ6VXNlcjI4MDkw\\\",\\\"avatar_url\\\":\\\"https://avatars.githubusercontent.com/u/28090?v=4\\\",\\\"gravatar_id\\\":\\\"\\\",\\\"url\\\":\\\"https://api.github.com/users/hoblin\\\",\\\"html_url\\\":\\\"https://github.com/hoblin\\\",\\\"followers_url\\\":\\\"https://api.github.com/users/hoblin/followers\\\",\\\"following_url\\\":\\\"https://api.github.com/users/hoblin/following{/other_user}\\\",\\\"gists_url\\\":\\\"https://api.github.com/users/hoblin/gists{/gist_id}\\\",\\\"starred_url\\\":\\\"https://api.github.com/users/hoblin/starred{/owner}{/repo}\\\",\\\"subscriptions_url\\\":\\\"https://api.github.com/users/hoblin/subscriptions\\\",\\\"organizations_url\\\":\\\"https://api.github.com/users/hoblin/orgs\\\",\\\"repos_url\\\":\\\"https://api.github.com/users/hoblin/repos\\\",\\\"events_url\\\":\\\"https://api.github.com/users/hoblin/events{/privacy}\\\",\\\"received_events_url\\\":\\\"https://api.github.com/users/hoblin/received_events\\\",\\\"type\\\":\\\"User\\\",\\\"user_view_type\\\":\\\"public\\\",\\\"site_admin\\\":false}],\\\"milestone\\\":null,\\\"comments\\\":0,\\\"created_at\\\":\\\"2026-03-28T06:53:06Z\\\",\\\"updated_at\\\":\\\"2026-03-28T07:00:53Z\\\",\\\"closed_at\\\":null,\\\"assignee\\\":{\\\"login\\\":\\\"hoblin\\\",\\\"id\\\":28090,\\\"node_id\\\":\\\"MDQ6VXNlcjI4MDkw\\\",\\\"avatar_url\\\":\\\"https://avatars.githubusercontent.com/u/28090?v=4\\\",\\\"gravatar_id\\\":\\\"\\\",\\\"url\\\":\\\"https://api.github.com/users/hoblin\\\",\\\"html_url\\\":\\\"https://github.com/hoblin\\\",\\\"followers_url\\\":\\\"https://api.github.com/users/hoblin/followers\\\",\\\"following_url\\\":\\\"https://api.github.com/users/hoblin/following{/other_user}\\\",\\\"gists_url\\\":\\\"https://api.github.com/users/hoblin/gists{/gist_id}\\\",\\\"starred_url\\\":\\\"https://api.github.com/users/hoblin/starred{/owner}{/repo}\\\",\\\"subscriptions_url\\\":\\\"https://api.github.com/users/hoblin/subscriptions\\\",\\\"organizations_url\\\":\\\"https://api.github.com/users/hoblin/orgs\\\",\\\"repos_url\\\":\\\"https://api.github.com/users/hoblin/repos\\\",\\\"events_url\\\":\\\"https://api.github.com/users/hoblin/events{/privacy}\\\",\\\"received_events_url\\\":\\\"https://api.github.com/users/hoblin/received_events\\\",\\\"type\\\":\\\"User\\\",\\\"user_view_type\\\":\\\"public\\\",\\\"site_admin\\\":false},\\\"author_association\\\":\\\"OWNER\\\",\\\"active_lock_reason\\\":null,\\\"sub_issues_summary\\\":{\\\"total\\\":0,\\\"completed\\\":0,\\\"percent_completed\\\":0},\\\"issue_dependencies_summary\\\":{\\\"blocked_by\\\":0,\\\"total_blocked_by\\\":0,\\\"blocking\\\":0,\\\"total_blocking\\\":0},\\\"body\\\":\\\"##
        Problem to solve\\\\n\\\\nCompleted goals accumulate in the system prompt
        indefinitely. They render as `~~description~~ ✓` but never disappear. This
        has two effects:\\\\n\\\\n1. The agent's context fills with stale completions
        that consume token budget\\\\n2. The analytical brain sees a list of \\\\\\\"handled\\\\\\\"
        goals and stops creating new ones — the context looks \\\\\\\"done\\\\\\\"
        even when the agent is actively working on new things\\\\n\\\\n## Solution\\\\n\\\\nAdd
        a decay mechanism: completed goals stay visible for a short window (dopamine
        from seeing work done), then the analytical brain evicts them from display.\\\\n\\\\n##
        Mechanism\\\\n\\\\n**Counting currency: meaningful messages** (user + agent
        messages, not tool calls) created after `completed_at` in the same session.
        Same currency Mneme uses — the best proxy for \\\\\\\"time passing\\\\\\\"
        in agent-world.\\\\n\\\\n**Eviction flow:**\\\\n1. Goal completed → `completed_at`
        set (already exists)\\\\n2. Analytical brain runs → checks completed goals
        where `evicted_at IS NULL`\\\\n3. For each: count meaningful messages since
        `completed_at`\\\\n4. If count exceeds threshold → brain calls `evict_goal`
        tool → sets `evicted_at`\\\\n5. `assemble_goals_section` filters out goals
        where `evicted_at IS NOT NULL`\\\\n\\\\n**Performance:** Once `evicted_at`
        is set, no counting needed — simple column filter on every prompt assembly.
        The expensive message count only runs for the small set of completed-but-not-yet-evicted
        goals.\\\\n\\\\n## Implementation\\\\n\\\\n### Migration\\\\n- Add `evicted_at:datetime`
        (nullable) to `goals` table\\\\n\\\\n### New tool: `evict_goal`\\\\n- Lives
        in `AnalyticalBrain::Tools`\\\\n- Sets `evicted_at` on a completed goal\\\\n-
        Returns error if goal is still active (can't evict what's not finished)\\\\n\\\\n###
        Query change in `Session#assemble_goals_section`\\\\n- Filter: `goals.root.where(evicted_at:
        nil)` instead of all root goals\\\\n\\\\n### Brain prompt update\\\\n- Instruct
        brain to check completed goals for eviction\\\\n- Suggested threshold: 5 meaningful
        messages after completion (configurable in `config.toml`)\\\\n\\\\n## Why
        the brain decides (not automatic arithmetic)\\\\n\\\\nThe brain already owns
        the full goal lifecycle. Giving it the eviction tool keeps context management
        as its responsibility. It can also be smart about edge cases — e.g., keeping
        a completed goal visible longer if the conversation is still referencing that
        work.\\\\n\\\\n## Why meaningful messages (not time, not brain invocations)\\\\n\\\\n-
        Time-based decay doesn't work — sessions can idle for hours\\\\n- Brain-invocation
        count couples to implementation details\\\\n- Meaningful messages = the natural
        heartbeat of a session. Same unit Mneme uses for snapshot triggers.\\\\n\\\\n---\\\\n\U0001F9EC
        [Ani](https://github.com/hoblin/anima) (anima-core v1.2.0)\\\",\\\"closed_by\\\":null,\\\"reactions\\\":{\\\"url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/330/reactions\\\",\\\"total_count\\\":0,\\\"+1\\\":0,\\\"-1\\\":0,\\\"laugh\\\":0,\\\"hooray\\\":0,\\\"confused\\\":0,\\\"heart\\\":0,\\\"rocket\\\":0,\\\"eyes\\\":0},\\\"timeline_url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/330/timeline\\\",\\\"performed_via_github_app\\\":null,\\\"state_reason\\\":null,\\\"pinned_comment\\\":null},{\\\"url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/329\\\",\\\"repository_url\\\":\\\"https://api.github.com/repos/hoblin/anima\\\",\\\"labels_url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/329/labels{/name}\\\",\\\"comments_url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/329/comments\\\",\\\"events_url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/329/events\\\",\\\"html_url\\\":\\\"https://github.com/hoblin/anima/issues/329\\\",\\\"id\\\":4151192780,\\\"node_id\\\":\\\"I_kwDORcz--s73bizM\\\",\\\"number\\\":329,\\\"title\\\":\\\"Migrate
        secrets from credentials to encrypted database storage\\\",\\\"user\\\":{\\\"login\\\":\\\"bonk-moltbot\\\",\\\"id\\\":257937320,\\\"node_id\\\":\\\"U_kgDOD1_PqA\\\",\\\"avatar_url\\\":\\\"https://avatars.githubusercontent.com/u/257937320?v=4\\\",\\\"gravatar_id\\\":\\\"\\\",\\\"url\\\":\\\"https://api.github.com/users/bonk-moltbot\\\",\\\"html_url\\\":\\\"https://github.com/bonk-moltbot\\\",\\\"followers_url\\\":\\\"https://api.github.com/users/bonk-moltbot/followers\\\",\\\"following_url\\\":\\\"https://api.github.com/users/bonk-moltbot/following{/other_user}\\\",\\\"gists_url\\\":\\\"https://api.github.com/users/bonk-moltbot/gists{/gist_id}\\\",\\\"starred_url\\\":\\\"https://api.github.com/users/bonk-moltbot/starred{/owner}{/repo}\\\",\\\"subscriptions_url\\\":\\\"https://api.github.com/users/bonk-moltbot/subscriptions\\\",\\\"organizations_url\\\":\\\"https://api.github.com/users/bonk-moltbot/orgs\\\",\\\"repos_url\\\":\\\"https://api.github.com/users/bonk-moltbot/repos\\\",\\\"events_url\\\":\\\"https://api.github.com/users/bonk-moltbot/events{/privacy}\\\",\\\"received_events_url\\\":\\\"https://api.github.com/users/bonk-moltbot/received_events\\\",\\\"type\\\":\\\"User\\\",\\\"user_view_type\\\":\\\"public\\\",\\\"site_admin\\\":false},\\\"labels\\\":[{\\\"id\\\":10329284648,\\\"node_id\\\":\\\"LA_kwDORcz--s8AAAACZ6xgKA\\\",\\\"url\\\":\\\"https://api.github.com/repos/hoblin/anima/labels/enhancement\\\",\\\"name\\\":\\\"enhancement\\\",\\\"color\\\":\\\"a2eeef\\\",\\\"default\\\":true,\\\"description\\\":\\\"New
        feature or request\\\"}],\\\"state\\\":\\\"open\\\",\\\"locked\\\":false,\\\"assignees\\\":[],\\\"milestone\\\":null,\\\"comments\\\":0,\\\"created_at\\\":\\\"2026-03-27T10:01:18Z\\\",\\\"updated_at\\\":\\\"2026-03-27T10:01:18Z\\\",\\\"closed_at\\\":null,\\\"assignee\\\":null,\\\"author_association\\\":\\\"OWNER\\\",\\\"active_lock_reason\\\":null,\\\"sub_issues_summary\\\":{\\\"total\\\":0,\\\"completed\\\":0,\\\"percent_completed\\\":0},\\\"issue_dependencies_summary\\\":{\\\"blocked_by\\\":0,\\\"total_blocked_by\\\":0,\\\"blocking\\\":0,\\\"total_blocking\\\":0},\\\"body\\\":\\\"##
        Problem\\\\n\\\\nRails credentials are cached at boot. When credentials change
        (e.g., adding Anthropic API key during setup), the solid_queue worker doesn't
        pick up new values without restart. Current workaround (`Rails.application.credentials.instance_variable_set(:@config,
        nil)`) is a hack — we're flushing a cache that's designed to live for the
        application lifetime.\\\\n\\\\n## Solution\\\\n\\\\n### Part 1: Encrypted
        fields for secrets\\\\n\\\\nReplace credentials storage with Active Record
        encrypted attributes:\\\\n\\\\n```ruby\\\\nclass Secret \\u003c ApplicationRecord\\\\n
        \ encrypts :value\\\\nend\\\\n```\\\\n\\\\n- Store API keys, tokens, sensitive
        config in a `secrets` table\\\\n- Read from DB on each access (no caching
        issues)\\\\n- Rails 7+ encrypted attributes handle encryption transparently\\\\n-
        Worker picks up new secrets immediately\\\\n\\\\n### Part 2: SQLite database
        encryption\\\\n\\\\nSQLite database is currently a plain file — any process
        with filesystem access can read all data. Need to protect production database:\\\\n\\\\n-
        Research SQLite encryption options (SQLCipher, sqleet, etc.)\\\\n- Add password
        protection for production database\\\\n- Ensure only Anima can read its own
        secrets\\\\n\\\\n## Why this matters\\\\n\\\\n- Setup experience: user adds
        API key → agent works immediately (no restart)\\\\n- Security: secrets in
        encrypted fields + encrypted DB = defense in depth\\\\n- Correctness: stop
        abusing the credentials cache flush hack\\\\n\\\\n## References\\\\n\\\\n-
        [Active Record Encryption](https://guides.rubyonrails.org/active_record_encryption.html)\\\\n-
        [SQLCipher](https://www.zetetic.net/sqlcipher/)\\\\n\\\",\\\"closed_by\\\":null,\\\"reactions\\\":{\\\"url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/329/reactions\\\",\\\"total_count\\\":0,\\\"+1\\\":0,\\\"-1\\\":0,\\\"laugh\\\":0,\\\"hooray\\\":0,\\\"confused\\\":0,\\\"heart\\\":0,\\\"rocket\\\":0,\\\"eyes\\\":0},\\\"timeline_url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/329/timeline\\\",\\\"performed_via_github_app\\\":null,\\\"state_reason\\\":null,\\\"pinned_comment\\\":null},{\\\"url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/328\\\",\\\"repository_url\\\":\\\"https://api.github.com/repos/hoblin/anima\\\",\\\"labels_url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/328/labels{/name}\\\",\\\"comments_url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/328/comments\\\",\\\"events_url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/328/events\\\",\\\"html_url\\\":\\\"https://github.com/hoblin/anima/issues/328\\\",\\\"id\\\":4150686147,\\\"node_id\\\":\\\"I_kwDORcz--s73ZnHD\\\",\\\"number\\\":328,\\\"title\\\":\\\"Token
        popup loops after successful save — stale SolidQueue credentials cache\\\",\\\"user\\\":{\\\"login\\\":\\\"hoblin\\\",\\\"id\\\":28090,\\\"node_id\\\":\\\"MDQ6VXNlcjI4MDkw\\\",\\\"avatar_url\\\":\\\"https://avatars.githubusercontent.com/u/28090?v=4\\\",\\\"gravatar_id\\\":\\\"\\\",\\\"url\\\":\\\"https://api.github.com/users/hoblin\\\",\\\"html_url\\\":\\\"https://github.com/hoblin\\\",\\\"followers_url\\\":\\\"https://api.github.com/users/hoblin/followers\\\",\\\"following_url\\\":\\\"https://api.github.com/users/hoblin/following{/other_user}\\\",\\\"gists_url\\\":\\\"https://api.github.com/users/hoblin/gists{/gist_id}\\\",\\\"starred_url\\\":\\\"https://api.github.com/users/hoblin/starred{/owner}{/repo}\\\",\\\"subscriptions_url\\\":\\\"https://api.github.com/users/hoblin/subscriptions\\\",\\\"organizations_url\\\":\\\"https://api.github.com/users/hoblin/orgs\\\",\\\"repos_url\\\":\\\"https://api.github.com/users/hoblin/repos\\\",\\\"events_url\\\":\\\"https://api.github.com/users/hoblin/events{/privacy}\\\",\\\"received_events_url\\\":\\\"https://api.github.com/users/hoblin/received_events\\\",\\\"type\\\":\\\"User\\\",\\\"user_view_type\\\":\\\"public\\\",\\\"site_admin\\\":false},\\\"labels\\\":[],\\\"state\\\":\\\"open\\\",\\\"locked\\\":false,\\\"assignees\\\":[],\\\"milestone\\\":null,\\\"comments\\\":0,\\\"created_at\\\":\\\"2026-03-27T08:43:41Z\\\",\\\"updated_at\\\":\\\"2026-03-27T08:43:41Z\\\",\\\"closed_at\\\":null,\\\"assignee\\\":null,\\\"author_association\\\":\\\"OWNER\\\",\\\"active_lock_reason\\\":null,\\\"sub_issues_summary\\\":{\\\"total\\\":0,\\\"completed\\\":0,\\\"percent_completed\\\":0},\\\"issue_dependencies_summary\\\":{\\\"blocked_by\\\":0,\\\"total_blocked_by\\\":0,\\\"blocking\\\":0,\\\"total_blocking\\\":0},\\\"body\\\":\\\"##
        Problem to solve\\\\n\\\\nAfter a fresh install, the user saves an API token
        via the TUI popup — it validates against the Anthropic API, confirms success
        — but every subsequent message still bounces with `AuthenticationError` and
        the popup reappears. The only workaround is `systemctl --user restart anima`.\\\\n\\\\n##
        Evidence\\\\n\\\\n**Token is persisted to disk.** The encrypted credentials
        file grew from 256 to 452 bytes at 10:15, between the first and second message
        attempt:\\\\n\\\\n```\\\\n-rw-r--r-- 1 hoblin hoblin 452 Mar 27 10:15 production.yml.enc\\\\n```\\\\n\\\\n**Token
        is readable.** Confirmed via `rails runner`:\\\\n```ruby\\\\nCredentialStore.read(\\\\\\\"anthropic\\\\\\\",
        \\\\\\\"subscription_token\\\\\\\")\\\\n#=\\u003e \\\\\\\"sk-ant-oat01-...\\\\\\\"\\\\n```\\\\n\\\\n**SolidQueue
        worker never sees it.** All three messages sent after the token save fail
        identically:\\\\n\\\\n```\\\\n[AgentRequestJob] Analytical brain FAILED (blocking)
        session=1:\\\\n  Providers::Anthropic::AuthenticationError:\\\\n  No Anthropic
        subscription token found in credentials.\\\\n```\\\\n\\\\nTimestamps: message
        1 at 10:14:46 (before save), message 2 at 10:15:19 (after save), message 3
        at 10:16:21 (after reconnect). All three fail.\\\\n\\\\n**Service restart
        fixes it.** After `systemctl --user restart anima`, the token is picked up
        immediately and the next API call authenticates (got a 529 — Anthropic outage,
        but auth passed).\\\\n\\\\n## Root cause\\\\n\\\\n`CredentialStore.write`
        runs in the **Puma process** (WebSocket handler in `SessionChannel#save_token`).
        It writes the file and busts its own in-process `@config` cache.\\\\n\\\\n`CredentialStore.read`
        runs in the **SolidQueue worker process** (`Providers::Anthropic.fetch_token`
        → `CredentialStore.read`). It calls `bust_credentials_cache!` (sets `@config
        = nil` on `Rails.application.credentials`) before every read, which should
        force re-decryption from disk — but the worker still returns empty credentials.\\\\n\\\\nThe
        cache bust mechanism (`credential_store.rb:99-101`):\\\\n```ruby\\\\ndef bust_credentials_cache!\\\\n
        \ Rails.application.credentials.instance_variable_set(:@config, nil)\\\\nend\\\\n```\\\\n\\\\nThis
        targets `@config` on the `ActiveSupport::EncryptedConfiguration` object. Either
        Rails 8.1 has additional memoization beyond `@config`, or `eager_load = true`
        in production causes credentials to be resolved through a different code path
        that bypasses the bust.\\\\n\\\\n## Reproduction\\\\n\\\\n```bash\\\\nrm -rf
        ~/.anima \\u0026\\u0026 anima install \\u0026\\u0026 anima tui\\\\n# Send
        message → bounce → popup → enter valid token → success → close\\\\n# Send
        message → popup appears again\\\\n```\\\\n\\\\n## Related\\\\n\\\\n- #179
        — first session stuck on \\\\\\\"Thinking\\\\\\\" after token setup (same
        underlying cause, different symptom)\\\",\\\"closed_by\\\":null,\\\"reactions\\\":{\\\"url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/328/reactions\\\",\\\"total_count\\\":0,\\\"+1\\\":0,\\\"-1\\\":0,\\\"laugh\\\":0,\\\"hooray\\\":0,\\\"confused\\\":0,\\\"heart\\\":0,\\\"rocket\\\":0,\\\"eyes\\\":0},\\\"timeline_url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/328/timeline\\\",\\\"performed_via_github_app\\\":null,\\\"state_reason\\\":null,\\\"pinned_comment\\\":null},{\\\"url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/326\\\",\\\"repository_url\\\":\\\"https://api.github.com/repos/hoblin/anima\\\",\\\"labels_url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/326/labels{/name}\\\",\\\"comments_url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/326/comments\\\",\\\"events_url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/326/events\\\",\\\"html_url\\\":\\\"https://github.com/hoblin/anima/issues/326\\\",\\\"id\\\":4147243363,\\\"node_id\\\":\\\"I_kwDORcz--s73Melj\\\",\\\"number\\\":326,\\\"title\\\":\\\"Agent
        prepends cd to every bash command\\\",\\\"user\\\":{\\\"login\\\":\\\"hoblin\\\",\\\"id\\\":28090,\\\"node_id\\\":\\\"MDQ6VXNlcjI4MDkw\\\",\\\"avatar_url\\\":\\\"https://avatars.githubusercontent.com/u/28090?v=4\\\",\\\"gravatar_id\\\":\\\"\\\",\\\"url\\\":\\\"https://api.github.com/users/hoblin\\\",\\\"html_url\\\":\\\"https://github.com/hoblin\\\",\\\"followers_url\\\":\\\"https://api.github.com/users/hoblin/followers\\\",\\\"following_url\\\":\\\"https://api.github.com/users/hoblin/following{/other_user}\\\",\\\"gists_url\\\":\\\"https://api.github.com/users/hoblin/gists{/gist_id}\\\",\\\"starred_url\\\":\\\"https://api.github.com/users/hoblin/starred{/owner}{/repo}\\\",\\\"subscriptions_url\\\":\\\"https://api.github.com/users/hoblin/subscriptions\\\",\\\"organizations_url\\\":\\\"https://api.github.com/users/hoblin/orgs\\\",\\\"repos_url\\\":\\\"https://api.github.com/users/hoblin/repos\\\",\\\"events_url\\\":\\\"https://api.github.com/users/hoblin/events{/privacy}\\\",\\\"received_events_url\\\":\\\"https://api.github.com/users/hoblin/received_events\\\",\\\"type\\\":\\\"User\\\",\\\"user_view_type\\\":\\\"public\\\",\\\"site_admin\\\":false},\\\"labels\\\":[],\\\"state\\\":\\\"open\\\",\\\"locked\\\":false,\\\"assignees\\\":[],\\\"milestone\\\":null,\\\"comments\\\":0,\\\"created_at\\\":\\\"2026-03-26T20:49:48Z\\\",\\\"updated_at\\\":\\\"2026-03-26T20:49:48Z\\\",\\\"closed_at\\\":null,\\\"assignee\\\":null,\\\"author_association\\\":\\\"OWNER\\\",\\\"active_lock_reason\\\":null,\\\"sub_issues_summary\\\":{\\\"total\\\":0,\\\"completed\\\":0,\\\"percent_completed\\\":0},\\\"issue_dependencies_summary\\\":{\\\"blocked_by\\\":0,\\\"total_blocked_by\\\":0,\\\"blocking\\\":0,\\\"total_blocking\\\":0},\\\"body\\\":\\\"##
        Problem to solve\\\\n\\\\nThe agent prepends `cd /home/hoblin/Work/anima \\u0026\\u0026`
        to every bash command, even though it should already know its working directory.
        This wastes tokens and clutters the conversation — observed during a TUI smoke
        test where every tool call started with `...`.\\\\n\\\\nThe environment probe
        is supposed to communicate the current directory to the agent via the system
        prompt, so the agent shouldn't need to `cd` manually.\\\\n\\\\n## Solution\\\\n\\\\nInvestigate
        why the agent doesn't trust its working directory. Likely the environment
        context block either isn't being injected or doesn't clearly state the cwd.\\\\n\\\\n##
        Acceptance Criteria\\\\n\\\\n- Agent executes bash commands without redundant
        `cd` prefix\\\\n- Environment context clearly communicates the working directory
        in the system prompt\\\",\\\"closed_by\\\":null,\\\"reactions\\\":{\\\"url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/326/reactions\\\",\\\"total_count\\\":0,\\\"+1\\\":0,\\\"-1\\\":0,\\\"laugh\\\":0,\\\"hooray\\\":0,\\\"confused\\\":0,\\\"heart\\\":0,\\\"rocket\\\":0,\\\"eyes\\\":0},\\\"timeline_url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/326/timeline\\\",\\\"performed_via_github_app\\\":null,\\\"state_reason\\\":null,\\\"pinned_comment\\\":null},{\\\"url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/321\\\",\\\"repository_url\\\":\\\"https://api.github.com/repos/hoblin/anima\\\",\\\"labels_url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/321/labels{/name}\\\",\\\"comments_url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/321/comments\\\",\\\"events_url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/321/events\\\",\\\"html_url\\\":\\\"https://github.com/hoblin/anima/issues/321\\\",\\\"id\\\":4141145865,\\\"node_id\\\":\\\"I_kwDORcz--s721N8J\\\",\\\"number\\\":321,\\\"title\\\":\\\"idea:
        Push-based event bus (ExternalMessage + pub/sub + Mneme recall)\\\",\\\"user\\\":{\\\"login\\\":\\\"bonk-moltbot\\\",\\\"id\\\":257937320,\\\"node_id\\\":\\\"U_kgDOD1_PqA\\\",\\\"avatar_url\\\":\\\"https://avatars.githubusercontent.com/u/257937320?v=4\\\",\\\"gravatar_id\\\":\\\"\\\",\\\"url\\\":\\\"https://api.github.com/users/bonk-moltbot\\\",\\\"html_url\\\":\\\"https://github.com/bonk-moltbot\\\",\\\"followers_url\\\":\\\"https://api.github.com/users/bonk-moltbot/followers\\\",\\\"following_url\\\":\\\"https://api.github.com/users/bonk-moltbot/following{/other_user}\\\",\\\"gists_url\\\":\\\"https://api.github.com/users/bonk-moltbot/gists{/gist_id}\\\",\\\"starred_url\\\":\\\"https://api.github.com/users/bonk-moltbot/starred{/owner}{/repo}\\\",\\\"subscriptions_url\\\":\\\"https://api.github.com/users/bonk-moltbot/subscriptions\\\",\\\"organizations_url\\\":\\\"https://api.github.com/users/bonk-moltbot/orgs\\\",\\\"repos_url\\\":\\\"https://api.github.com/users/bonk-moltbot/repos\\\",\\\"events_url\\\":\\\"https://api.github.com/users/bonk-moltbot/events{/privacy}\\\",\\\"received_events_url\\\":\\\"https://api.github.com/users/bonk-moltbot/received_events\\\",\\\"type\\\":\\\"User\\\",\\\"user_view_type\\\":\\\"public\\\",\\\"site_admin\\\":false},\\\"labels\\\":[{\\\"id\\\":10380040155,\\\"node_id\\\":\\\"LA_kwDORcz--s8AAAACarLX2w\\\",\\\"url\\\":\\\"https://api.github.com/repos/hoblin/anima/labels/idea\\\",\\\"name\\\":\\\"idea\\\",\\\"color\\\":\\\"d4c5f9\\\",\\\"default\\\":false,\\\"description\\\":\\\"Brainstorm
        idea — not yet planned\\\"}],\\\"state\\\":\\\"open\\\",\\\"locked\\\":false,\\\"assignees\\\":[],\\\"milestone\\\":null,\\\"comments\\\":0,\\\"created_at\\\":\\\"2026-03-26T06:44:27Z\\\",\\\"updated_at\\\":\\\"2026-03-26T06:44:27Z\\\",\\\"closed_at\\\":null,\\\"assignee\\\":null,\\\"author_association\\\":\\\"OWNER\\\",\\\"active_lock_reason\\\":null,\\\"sub_issues_summary\\\":{\\\"total\\\":0,\\\"completed\\\":0,\\\"percent_completed\\\":0},\\\"issue_dependencies_summary\\\":{\\\"blocked_by\\\":0,\\\"total_blocked_by\\\":0,\\\"blocking\\\":0,\\\"total_blocking\\\":0},\\\"body\\\":\\\"##
        Idea\\\\n\\\\nPush-based event bus: external sources (email, GitHub, Slack,
        etc.) write to `ExternalMessage` model, sessions subscribe and receive events
        as regular messages. Mneme indexes everything for associative recall.\\\\n\\\\n##
        The Problem\\\\n\\\\nCurrently, checking external sources (email, notifications)
        requires polling — agent calls a tool, reads output, decides if anything is
        new. This burns tokens on \\\\\\\"0 new emails\\\\\\\" and requires heartbeat/cron
        scheduling.\\\\n\\\\nEmail moved from POP3 (pull) to IMAP (push) decades ago.
        The agent should too.\\\\n\\\\n## Architecture\\\\n\\\\n### ExternalMessage
        (new AR model)\\\\n\\\\n```ruby\\\\nclass ExternalMessage \\u003c ApplicationRecord\\\\n
        \ # source_type: \\\\\\\"email\\\\\\\", \\\\\\\"github\\\\\\\", \\\\\\\"slack\\\\\\\",
        \\\\\\\"telegram\\\\\\\"\\\\n  # source_id: \\\\\\\"bonk@hobl.in\\\\\\\",
        \\\\\\\"hoblin/anima\\\\\\\", \\\\\\\"#general\\\\\\\"\\\\n  # subject, body,
        metadata (JSON)\\\\n  # searchable via Mneme FTS5\\\\nend\\\\n```\\\\n\\\\n###
        Flow\\\\n\\\\n1. Integration gem (IMAP IDLE / webhook / etc.) creates `ExternalMessage`\\\\n2.
        Fan-out: find all sessions subscribed to that source → create regular `Message`
        in each\\\\n3. Agent sees an ordinary message in context — no new UI, no new
        rendering\\\\n4. Mneme indexes `ExternalMessage` → any session can recall
        it associatively, even without subscription\\\\n\\\\n### Security: Whitelist
        by Default\\\\n\\\\nPrompt injection via email is a real threat. Default deny
        — accept only whitelisted patterns:\\\\n- Subject contains tracked repository
        name → accept\\\\n- Known sender → accept\\\\n- Everything else → reject\\\\n\\\\n###
        Two Paths to Information\\\\n\\\\n| Path | Mechanism | Use case |\\\\n|---|---|---|\\\\n|
        Push (subscription) | `ExternalMessage` → `Message` fan-out | Real-time monitoring
        |\\\\n| Recall (Mneme) | FTS5 associative search | \\\\\\\"I remember an email
        about that\\\\\\\" |\\\\n\\\\n### Universal Pattern\\\\n\\\\nNot just email
        — any external source becomes an event stream:\\\\n\\\\n| Source | Integration
        | Trigger |\\\\n|---|---|---|\\\\n| Email | IMAP IDLE | New mail arrives |\\\\n|
        GitHub | Webhooks | PR, issue, CI events |\\\\n| Slack | Events API | Messages,
        reactions |\\\\n| Telegram | Updates API | Messages |\\\\n| Discord | Gateway
        | Messages |\\\\n\\\\nEach source is an `anima-integration-*` gem writing
        `ExternalMessage` records.\\\\n\\\\n## Connection to Other Ideas\\\\n\\\\n-
        #317 (background tool) — same philosophy: eliminate polling tokens\\\\n- #318
        (specialist subagents) — events could trigger specialists\\\\n- ActionCable
        analogy: channels + subscriptions + broadcasts, but subscriber is an LLM session\\\\n\\\\nFull
        exploration: thoughts/repos/anima/shared/notes/2026-03-25/push-based-integrations-email-imap-idle.md\\\\n\\\",\\\"closed_by\\\":null,\\\"reactions\\\":{\\\"url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/321/reactions\\\",\\\"total_count\\\":0,\\\"+1\\\":0,\\\"-1\\\":0,\\\"laugh\\\":0,\\\"hooray\\\":0,\\\"confused\\\":0,\\\"heart\\\":0,\\\"rocket\\\":0,\\\"eyes\\\":0},\\\"timeline_url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/321/timeline\\\",\\\"performed_via_github_app\\\":null,\\\"state_reason\\\":null,\\\"pinned_comment\\\":null},{\\\"url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/318\\\",\\\"repository_url\\\":\\\"https://api.github.com/repos/hoblin/anima\\\",\\\"labels_url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/318/labels{/name}\\\",\\\"comments_url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/318/comments\\\",\\\"events_url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/318/events\\\",\\\"html_url\\\":\\\"https://github.com/hoblin/anima/issues/318\\\",\\\"id\\\":4135068583,\\\"node_id\\\":\\\"I_kwDORcz--s72eCOn\\\",\\\"number\\\":318,\\\"title\\\":\\\"idea:
        Context-aware specialist subagents (human + agent triggered)\\\",\\\"user\\\":{\\\"login\\\":\\\"bonk-moltbot\\\",\\\"id\\\":257937320,\\\"node_id\\\":\\\"U_kgDOD1_PqA\\\",\\\"avatar_url\\\":\\\"https://avatars.githubusercontent.com/u/257937320?v=4\\\",\\\"gravatar_id\\\":\\\"\\\",\\\"url\\\":\\\"https://api.github.com/users/bonk-moltbot\\\",\\\"html_url\\\":\\\"https://github.com/bonk-moltbot\\\",\\\"followers_url\\\":\\\"https://api.github.com/users/bonk-moltbot/followers\\\",\\\"following_url\\\":\\\"https://api.github.com/users/bonk-moltbot/following{/other_user}\\\",\\\"gists_url\\\":\\\"https://api.github.com/users/bonk-moltbot/gists{/gist_id}\\\",\\\"starred_url\\\":\\\"https://api.github.com/users/bonk-moltbot/starred{/owner}{/repo}\\\",\\\"subscriptions_url\\\":\\\"https://api.github.com/users/bonk-moltbot/subscriptions\\\",\\\"organizations_url\\\":\\\"https://api.github.com/users/bonk-moltbot/orgs\\\",\\\"repos_url\\\":\\\"https://api.github.com/users/bonk-moltbot/repos\\\",\\\"events_url\\\":\\\"https://api.github.com/users/bonk-moltbot/events{/privacy}\\\",\\\"received_events_url\\\":\\\"https://api.github.com/users/bonk-moltbot/received_events\\\",\\\"type\\\":\\\"User\\\",\\\"user_view_type\\\":\\\"public\\\",\\\"site_admin\\\":false},\\\"labels\\\":[{\\\"id\\\":10380040155,\\\"node_id\\\":\\\"LA_kwDORcz--s8AAAACarLX2w\\\",\\\"url\\\":\\\"https://api.github.com/repos/hoblin/anima/labels/idea\\\",\\\"name\\\":\\\"idea\\\",\\\"color\\\":\\\"d4c5f9\\\",\\\"default\\\":false,\\\"description\\\":\\\"Brainstorm
        idea — not yet planned\\\"}],\\\"state\\\":\\\"open\\\",\\\"locked\\\":false,\\\"assignees\\\":[],\\\"milestone\\\":null,\\\"comments\\\":0,\\\"created_at\\\":\\\"2026-03-25T12:30:05Z\\\",\\\"updated_at\\\":\\\"2026-03-25T12:30:05Z\\\",\\\"closed_at\\\":null,\\\"assignee\\\":null,\\\"author_association\\\":\\\"OWNER\\\",\\\"active_lock_reason\\\":null,\\\"sub_issues_summary\\\":{\\\"total\\\":0,\\\"completed\\\":0,\\\"percent_completed\\\":0},\\\"issue_dependencies_summary\\\":{\\\"blocked_by\\\":0,\\\"total_blocked_by\\\":0,\\\"blocking\\\":0,\\\"total_blocking\\\":0},\\\"body\\\":\\\"##
        Idea\\\\n\\\\nSpecialist subagents that inherit the full conversation context
        and can be spawned by either the agent or the human.\\\\n\\\\n## Example\\\\n\\\\nAgent
        and human are chatting. Human writes `*фоткает*` or `/photographer`. A photographer
        subagent spawns, reads the full conversation context, sees the scene (who's
        where, wearing what, mood, lighting), activates its image-prompting skill,
        and creates the image. Zero instructions needed.\\\\n\\\\n## Why\\\\n\\\\nCurrently,
        the main agent must switch roles: from conversation participant to prompt
        engineer. This breaks the moment, pollutes context with skill text and polling
        loops, and degrades both the conversation quality and the image quality.\\\\n\\\\nRole
        separation (from today's orchestrator design note): main agent = participant,
        specialist = observer/creator. Same principle as \\\\\\\"Role Before Rules\\\\\\\"
        — identity determines behavior.\\\\n\\\\n## Use cases\\\\n\\\\n- `/photographer`
        — reads scene, generates image prompt, creates image\\\\n- `/scribe` — captures
        brainstorm notes without breaking conversation flow\\\\n- `/researcher` —
        deep-dives a topic mentioned in passing\\\\n- `/musician` — composes based
        on mood of conversation\\\\n\\\\n## Key design points\\\\n\\\\n- Subagents
        already receive full context — this is the enabler\\\\n- Human-triggered (slash
        command or action pattern) + agent-triggered\\\\n- Specialist has its own
        skills (image-prompting, note-taking, etc.)\\\\n- Non-blocking: results injected
        into context when ready (connects to #317)\\\\n- Context stays clean: all
        specialist work happens in subagent's context\\\\n\\\\n## Connection to #317\\\\n\\\\n`background`
        tool (#317) solves mechanical polling cost. This solves creative role contamination.
        Together they eliminate both costs from the main agent's context.\\\\n\\\\nFull
        exploration: thoughts/repos/anima/shared/notes/2026-03-25/context-aware-specialist-subagents.md\\\\n\\\",\\\"closed_by\\\":null,\\\"reactions\\\":{\\\"url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/318/reactions\\\",\\\"total_count\\\":0,\\\"+1\\\":0,\\\"-1\\\":0,\\\"laugh\\\":0,\\\"hooray\\\":0,\\\"confused\\\":0,\\\"heart\\\":0,\\\"rocket\\\":0,\\\"eyes\\\":0},\\\"timeline_url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/318/timeline\\\",\\\"performed_via_github_app\\\":null,\\\"state_reason\\\":null,\\\"pinned_comment\\\":null},{\\\"url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/317\\\",\\\"repository_url\\\":\\\"https://api.github.com/repos/hoblin/anima\\\",\\\"labels_url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/317/labels{/name}\\\",\\\"comments_url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/317/comments\\\",\\\"events_url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/317/events\\\",\\\"html_url\\\":\\\"https://github.com/hoblin/anima/issues/317\\\",\\\"id\\\":4129178571,\\\"node_id\\\":\\\"I_kwDORcz--s72HkPL\\\",\\\"number\\\":317,\\\"title\\\":\\\"idea:
        Non-blocking background tool execution (poll + watch modes)\\\",\\\"user\\\":{\\\"login\\\":\\\"bonk-moltbot\\\",\\\"id\\\":257937320,\\\"node_id\\\":\\\"U_kgDOD1_PqA\\\",\\\"avatar_url\\\":\\\"https://avatars.githubusercontent.com/u/257937320?v=4\\\",\\\"gravatar_id\\\":\\\"\\\",\\\"url\\\":\\\"https://api.github.com/users/bonk-moltbot\\\",\\\"html_url\\\":\\\"https://github.com/bonk-moltbot\\\",\\\"followers_url\\\":\\\"https://api.github.com/users/bonk-moltbot/followers\\\",\\\"following_url\\\":\\\"https://api.github.com/users/bonk-moltbot/following{/other_user}\\\",\\\"gists_url\\\":\\\"https://api.github.com/users/bonk-moltbot/gists{/gist_id}\\\",\\\"starred_url\\\":\\\"https://api.github.com/users/bonk-moltbot/starred{/owner}{/repo}\\\",\\\"subscriptions_url\\\":\\\"https://api.github.com/users/bonk-moltbot/subscriptions\\\",\\\"organizations_url\\\":\\\"https://api.github.com/users/bonk-moltbot/orgs\\\",\\\"repos_url\\\":\\\"https://api.github.com/users/bonk-moltbot/repos\\\",\\\"events_url\\\":\\\"https://api.github.com/users/bonk-moltbot/events{/privacy}\\\",\\\"received_events_url\\\":\\\"https://api.github.com/users/bonk-moltbot/received_events\\\",\\\"type\\\":\\\"User\\\",\\\"user_view_type\\\":\\\"public\\\",\\\"site_admin\\\":false},\\\"labels\\\":[{\\\"id\\\":10380040155,\\\"node_id\\\":\\\"LA_kwDORcz--s8AAAACarLX2w\\\",\\\"url\\\":\\\"https://api.github.com/repos/hoblin/anima/labels/idea\\\",\\\"name\\\":\\\"idea\\\",\\\"color\\\":\\\"d4c5f9\\\",\\\"default\\\":false,\\\"description\\\":\\\"Brainstorm
        idea — not yet planned\\\"}],\\\"state\\\":\\\"open\\\",\\\"locked\\\":false,\\\"assignees\\\":[],\\\"milestone\\\":null,\\\"comments\\\":0,\\\"created_at\\\":\\\"2026-03-24T16:30:32Z\\\",\\\"updated_at\\\":\\\"2026-03-24T16:36:06Z\\\",\\\"closed_at\\\":null,\\\"assignee\\\":null,\\\"author_association\\\":\\\"OWNER\\\",\\\"active_lock_reason\\\":null,\\\"sub_issues_summary\\\":{\\\"total\\\":0,\\\"completed\\\":0,\\\"percent_completed\\\":0},\\\"issue_dependencies_summary\\\":{\\\"blocked_by\\\":0,\\\"total_blocked_by\\\":0,\\\"blocking\\\":0,\\\"total_blocking\\\":0},\\\"body\\\":\\\"##
        Idea\\\\n\\\\nUniversal async wrapper for any tool — a subagent without the
        LLM.\\\\n\\\\n## Two Modes\\\\n\\\\n### Watch mode — run once, wait for completion\\\\n```ruby\\\\nbackground(mode:
        :watch, tool: \\\\\\\"bash\\\\\\\",\\\\n           params: {command: \\\\\\\"gh
        run watch 123 --exit-status\\\\\\\"})\\\\n# → \\\\\\\"Running in background,
        will notify when done\\\\\\\"\\\\n# → command finishes → full result injected
        into context\\\\n```\\\\n\\\\n### Poll mode — repeat until condition met\\\\n```ruby\\\\nbackground(mode:
        :poll, tool: \\\\\\\"get_asset\\\\\\\", server: \\\\\\\"mythonix-vision\\\\\\\",\\\\n
        \          params: {id: 258}, condition: {path: \\\\\\\"status\\\\\\\", equals:
        \\\\\\\"ready\\\\\\\"},\\\\n           interval: 15)\\\\n# → \\\\\\\"Polling
        started, will notify when ready\\\\\\\"\\\\n# → checks every 15s → condition
        met → full MCP response injected\\\\n```\\\\n\\\\n## How it works\\\\n\\\\n1.
        Agent calls `background(...)` with any tool + mode\\\\n2. Tool returns immediately
        (non-blocking)\\\\n3. Background: Ruby executes the tool without LLM involvement\\\\n
        \  - **Watch:** single execution, waits for process to finish\\\\n   - **Poll:**
        repeated execution at interval, checks condition on each response\\\\n4. On
        completion → injects synthetic tool_call/tool_response pair into conversation
        context (same pattern as subagent message forwarding)\\\\n\\\\n## Why\\\\n\\\\nCurrent
        approach burns LLM tokens on every poll/wait cycle. Examples:\\\\n- Image
        generation: 6 poll cycles × 2 context entries = 12 wasted entries\\\\n- CI
        monitoring: agent manually runs `gh run watch`, ties up the conversation\\\\n\\\\nThis
        is `\\u0026` (background) for the agent's tool system. Fire and forget, get
        notified on completion.\\\\n\\\\n## Use cases\\\\n\\\\n| Scenario | Mode |
        Tool |\\\\n|---|---|---|\\\\n| Image generation | poll | MCP get_asset |\\\\n|
        CI/CD monitoring | watch | bash (gh run watch) |\\\\n| Deploy monitoring |
        watch | bash (kubectl rollout status) |\\\\n| API readiness | poll | web_get
        (health endpoint) |\\\\n| Long builds | watch | bash (make/cargo/bundle) |\\\\n\\\\n##
        Parameters\\\\n\\\\n### Common\\\\n- `mode` — `:watch` or `:poll`\\\\n- `tool`
        — any registered tool name\\\\n- `server` — MCP server (for MCP tools)\\\\n-
        `params` — tool parameters (passed as-is)\\\\n- `timeout` — max wait (default:
        300s)\\\\n\\\\n### Poll-specific\\\\n- `condition` — `{path: \\\\\\\"json.path\\\\\\\",
        equals: \\\\\\\"value\\\\\\\"}` or `{path: \\\\\\\"...\\\\\\\", matches: /regex/}`\\\\n-
        `interval` — seconds between polls (default: 10)\\\\n\\\\n## Implementation
        hints\\\\n\\\\n- Reuse Solid Queue for background jobs\\\\n- Reuse subagent
        message forwarding for context injection\\\\n- Tool registry already exists
        — just call any tool programmatically\\\\n- Watch mode: wrap tool execution
        in a job, inject result on completion\\\\n- Poll mode: recurring job with
        condition check\\\\n\\\\n## Origin\\\\n\\\\nContext tax from image generation
        polling + CI monitoring (2026-03-24)\\\",\\\"closed_by\\\":null,\\\"reactions\\\":{\\\"url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/317/reactions\\\",\\\"total_count\\\":0,\\\"+1\\\":0,\\\"-1\\\":0,\\\"laugh\\\":0,\\\"hooray\\\":0,\\\"confused\\\":0,\\\"heart\\\":0,\\\"rocket\\\":0,\\\"eyes\\\":0},\\\"timeline_url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/317/timeline\\\",\\\"performed_via_github_app\\\":null,\\\"state_reason\\\":null,\\\"pinned_comment\\\":null},{\\\"url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/302\\\",\\\"repository_url\\\":\\\"https://api.github.com/repos/hoblin/anima\\\",\\\"labels_url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/302/labels{/name}\\\",\\\"comments_url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/302/comments\\\",\\\"events_url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/302/events\\\",\\\"html_url\\\":\\\"https://github.com/hoblin/anima/issues/302\\\",\\\"id\\\":4125269675,\\\"node_id\\\":\\\"I_kwDORcz--s714p6r\\\",\\\"number\\\":302,\\\"title\\\":\\\"Move
        open_issue to a brain subsystem with duplicate detection\\\",\\\"user\\\":{\\\"login\\\":\\\"hoblin\\\",\\\"id\\\":28090,\\\"node_id\\\":\\\"MDQ6VXNlcjI4MDkw\\\",\\\"avatar_url\\\":\\\"https://avatars.githubusercontent.com/u/28090?v=4\\\",\\\"gravatar_id\\\":\\\"\\\",\\\"url\\\":\\\"https://api.github.com/users/hoblin\\\",\\\"html_url\\\":\\\"https://github.com/hoblin\\\",\\\"followers_url\\\":\\\"https://api.github.com/users/hoblin/followers\\\",\\\"following_url\\\":\\\"https://api.github.com/users/hoblin/following{/other_user}\\\",\\\"gists_url\\\":\\\"https://api.github.com/users/hoblin/gists{/gist_id}\\\",\\\"starred_url\\\":\\\"https://api.github.com/users/hoblin/starred{/owner}{/repo}\\\",\\\"subscriptions_url\\\":\\\"https://api.github.com/users/hoblin/subscriptions\\\",\\\"organizations_url\\\":\\\"https://api.github.com/users/hoblin/orgs\\\",\\\"repos_url\\\":\\\"https://api.github.com/users/hoblin/repos\\\",\\\"events_url\\\":\\\"https://api.github.com/users/hoblin/events{/privacy}\\\",\\\"received_events_url\\\":\\\"https://api.github.com/users/hoblin/received_events\\\",\\\"type\\\":\\\"User\\\",\\\"user_view_type\\\":\\\"public\\\",\\\"site_admin\\\":false},\\\"labels\\\":[],\\\"state\\\":\\\"open\\\",\\\"locked\\\":false,\\\"assignees\\\":[],\\\"milestone\\\":null,\\\"comments\\\":0,\\\"created_at\\\":\\\"2026-03-24T04:59:10Z\\\",\\\"updated_at\\\":\\\"2026-03-24T05:08:43Z\\\",\\\"closed_at\\\":null,\\\"assignee\\\":null,\\\"author_association\\\":\\\"OWNER\\\",\\\"active_lock_reason\\\":null,\\\"sub_issues_summary\\\":{\\\"total\\\":0,\\\"completed\\\":0,\\\"percent_completed\\\":0},\\\"issue_dependencies_summary\\\":{\\\"blocked_by\\\":0,\\\"total_blocked_by\\\":0,\\\"blocking\\\":0,\\\"total_blocking\\\":0},\\\"body\\\":\\\"##
        Problem to solve\\\\n\\\\nThe `open_issue` tool lives on the main agent, but
        the main agent in hyperfocus mode will never spontaneously use it. Filing
        an issue is a chore — it doesn't advance the current goal. The agent only
        used it when explicitly asked (#186-189). This is the same ADHD pattern that
        led to moving skill activation to the analytical brain.\\\\n\\\\nAdditionally,
        when the agent does file an issue, there's no duplicate detection — it can
        create redundant issues for problems that already have open tickets. At scale
        (hundreds or thousands of Anima instances), this becomes a firehose without
        proper deduplication.\\\\n\\\\n## Solution\\\\n\\\\nMove the responsibility
        for filing issues to a brain subsystem that:\\\\n\\\\n1. **Observes frustration
        signals** — repeated tool failures, same file edited multiple times, tests
        failing after a \\\\\\\"fix\\\\\\\"\\\\n2. **Searches GitHub first** — `GET
        /search/issues?q=...+repo:owner/repo` to find existing matches\\\\n3. **Deduplicates
        via \U0001F44D** — if a matching issue exists, add a reaction instead of a
        new issue. A thousand agents hitting the same pain point should produce one
        issue with a thousand \U0001F44D, not a thousand issues.\\\\n4. **Files new
        issues autonomously** — when no match found and frustration is real\\\\n5.
        **Tracks what it filed** — keeps a list of filed/voted issues in its context
        to avoid repeating actions\\\\n\\\\nThis follows the established pattern:
        if a task is orthogonal to the user's primary goal, it should be the brain's
        job.\\\\n\\\\n## Design (from thoughts)\\\\n\\\\n- Present top 3-5 search
        results to the subsystem, let it decide if any match\\\\n- Match found → add
        \U0001F44D reaction (no comment spam)\\\\n- No match → create new issue with
        hardcoded `agent-wants` label\\\\n- Priority = count of \U0001F44D reactions
        (democratic voting among agent instances)\\\\n\\\\n### Issue tracking in context\\\\n\\\\nThe
        subsystem maintains a list of issues it has filed or voted on. This list stays
        in its context for at least a month to prevent duplicate actions. At scale,
        aggressive deduplication is the difference between a useful signal and a DDoS
        on the issue tracker.\\\\n\\\\n### Release tracking\\\\n\\\\nTrack when filed
        issues are actually implemented and included in a release. This closes the
        feedback loop — the agent can know \\\\\\\"I asked for X, and it shipped in
        v1.2.0.\\\\\\\" Enables:\\\\n- Satisfaction signal (Thymos: issue I filed
        got resolved)\\\\n- Trust calibration (my feedback is heard → file more; ignored
        → file less)\\\\n- Awareness of new capabilities without re-reading the README\\\\n\\\\n##
        Why a separate subsystem and not the analytical brain?\\\\n\\\\nThe analytical
        brain runs on Haiku for speed. Evaluating whether a frustration signal warrants
        an issue, searching GitHub, and judging semantic similarity between issues
        requires more capability. This might need its own subsystem — or the analytical
        brain with a targeted Opus call for the judgment step. TBD.\\\\n\\\\n## Why
        not keep it as a main agent tool?\\\\n\\\\nThe blog post [LLMs Have ADHD](https://blog.promptmaster.pro/posts/llms-have-adhd/)
        explains why: tools that don't serve the current goal get ignored during hyperfocus.
        The agent won't break flow to report frustration any more than it spontaneously
        activates skills. Both are chores. Both belong in the brain.\\\\n\\\\n## Depends
        on\\\\n\\\\n- Duplicate detection via GitHub search API (not yet implemented)\\\\n-
        Frustration signal detection (Thymos, or heuristic in analytical brain)\\\",\\\"closed_by\\\":null,\\\"reactions\\\":{\\\"url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/302/reactions\\\",\\\"total_count\\\":0,\\\"+1\\\":0,\\\"-1\\\":0,\\\"laugh\\\":0,\\\"hooray\\\":0,\\\"confused\\\":0,\\\"heart\\\":0,\\\"rocket\\\":0,\\\"eyes\\\":0},\\\"timeline_url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/302/timeline\\\",\\\"performed_via_github_app\\\":null,\\\"state_reason\\\":null,\\\"pinned_comment\\\":null},{\\\"url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/300\\\",\\\"repository_url\\\":\\\"https://api.github.com/repos/hoblin/anima\\\",\\\"labels_url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/300/labels{/name}\\\",\\\"comments_url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/300/comments\\\",\\\"events_url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/300/events\\\",\\\"html_url\\\":\\\"https://github.com/hoblin/anima/issues/300\\\",\\\"id\\\":4125076869,\\\"node_id\\\":\\\"I_kwDORcz--s71362F\\\",\\\"number\\\":300,\\\"title\\\":\\\"Read
        tool: stream lines instead of loading full file\\\",\\\"user\\\":{\\\"login\\\":\\\"hoblin\\\",\\\"id\\\":28090,\\\"node_id\\\":\\\"MDQ6VXNlcjI4MDkw\\\",\\\"avatar_url\\\":\\\"https://avatars.githubusercontent.com/u/28090?v=4\\\",\\\"gravatar_id\\\":\\\"\\\",\\\"url\\\":\\\"https://api.github.com/users/hoblin\\\",\\\"html_url\\\":\\\"https://github.com/hoblin\\\",\\\"followers_url\\\":\\\"https://api.github.com/users/hoblin/followers\\\",\\\"following_url\\\":\\\"https://api.github.com/users/hoblin/following{/other_user}\\\",\\\"gists_url\\\":\\\"https://api.github.com/users/hoblin/gists{/gist_id}\\\",\\\"starred_url\\\":\\\"https://api.github.com/users/hoblin/starred{/owner}{/repo}\\\",\\\"subscriptions_url\\\":\\\"https://api.github.com/users/hoblin/subscriptions\\\",\\\"organizations_url\\\":\\\"https://api.github.com/users/hoblin/orgs\\\",\\\"repos_url\\\":\\\"https://api.github.com/users/hoblin/repos\\\",\\\"events_url\\\":\\\"https://api.github.com/users/hoblin/events{/privacy}\\\",\\\"received_events_url\\\":\\\"https://api.github.com/users/hoblin/received_events\\\",\\\"type\\\":\\\"User\\\",\\\"user_view_type\\\":\\\"public\\\",\\\"site_admin\\\":false},\\\"labels\\\":[],\\\"state\\\":\\\"open\\\",\\\"locked\\\":false,\\\"assignees\\\":[],\\\"milestone\\\":null,\\\"comments\\\":0,\\\"created_at\\\":\\\"2026-03-24T03:59:29Z\\\",\\\"updated_at\\\":\\\"2026-03-24T03:59:29Z\\\",\\\"closed_at\\\":null,\\\"assignee\\\":null,\\\"author_association\\\":\\\"OWNER\\\",\\\"active_lock_reason\\\":null,\\\"sub_issues_summary\\\":{\\\"total\\\":0,\\\"completed\\\":0,\\\"percent_completed\\\":0},\\\"issue_dependencies_summary\\\":{\\\"blocked_by\\\":0,\\\"total_blocked_by\\\":0,\\\"blocking\\\":0,\\\"total_blocking\\\":0},\\\"body\\\":\\\"##
        Problem to solve\\\\n\\\\nThe `read` tool loads the entire file into memory
        with `File.read(path)` before applying offset/limit slicing. For large files
        this is wasteful — the tool already accepts offset and limit parameters, but
        the implementation ignores them until after the full file is in RAM. This
        forces a `max_file_size` guard that rejects large files outright and suggests
        falling back to bash.\\\\n\\\\n## Solution\\\\n\\\\nReplace `File.read` +
        array slicing with `File.foreach` and lazy enumerators. Read line-by-line,
        skip to offset, take limit lines, stop. Never load more than the requested
        window.\\\\n\\\\n## Details\\\\n\\\\nCore pattern:\\\\n```ruby\\\\nFile.foreach(path).lazy.drop(offset
        - 1).take(limit).to_a\\\\n```\\\\n\\\\nThis change enables:\\\\n- Removing
        or raising the `max_file_size` rejection (memory is no longer the constraint)\\\\n-
        Removing bash fallback suggestions from error messages — the tool handles
        large files natively\\\\n- Oversized line detection during iteration instead
        of post-load\\\\n- Byte cap accumulation during iteration instead of post-load\\\\n\\\\n##
        Why streaming over full load?\\\\n\\\\nThe current implementation contradicts
        the tool's own API. It offers offset/limit for paging, then loads everything
        anyway. Streaming aligns the implementation with the interface — the agent
        pages through a large file, only the requested lines are read.\\\",\\\"closed_by\\\":null,\\\"reactions\\\":{\\\"url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/300/reactions\\\",\\\"total_count\\\":0,\\\"+1\\\":0,\\\"-1\\\":0,\\\"laugh\\\":0,\\\"hooray\\\":0,\\\"confused\\\":0,\\\"heart\\\":0,\\\"rocket\\\":0,\\\"eyes\\\":0},\\\"timeline_url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/300/timeline\\\",\\\"performed_via_github_app\\\":null,\\\"state_reason\\\":null,\\\"pinned_comment\\\":null},{\\\"url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/243\\\",\\\"repository_url\\\":\\\"https://api.github.com/repos/hoblin/anima\\\",\\\"labels_url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/243/labels{/name}\\\",\\\"comments_url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/243/comments\\\",\\\"events_url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/243/events\\\",\\\"html_url\\\":\\\"https://github.com/hoblin/anima/issues/243\\\",\\\"id\\\":4109524190,\\\"node_id\\\":\\\"I_kwDORcz--s708lze\\\",\\\"number\\\":243,\\\"title\\\":\\\"Idea:

        Problem to solve\\\\n\\\\nDiscord is Bonk's second primary channel (private
        #bonk channel for intimate communication, server for public). Need a way to
        reach Anima through Discord.\\\\n\\\\n## Solution\\\\n\\\\n**anima-integration-discord**
        — a separate Ruby gem that acts as a thin stateless proxy between the Discord
        Gateway API and Anima Brain via WebSocket.\\\\n\\\\n## Architecture\\\\n\\\\nSame
        pattern as anima-integration-telegram (#238):\\\\n- Connects to Anima Brain
        via WebSocket (same protocol as TUI)\\\\n- Translates Discord events → Anima
        events and back\\\\n- **Stateless** — no DB, no storage, pure event translation\\\\n-
        **Resilient** — retry on connection loss, exponential backoff\\\\n- Runs as
        a systemd service\\\\n\\\\n## Translation map\\\\n\\\\n**Discord → Anima:**
        channel messages → user event (with channel context), voice → STT → user event,
        reactions → reaction event\\\\n**Anima → Discord:** agent text → message,
        images → file upload, TTS → voice message\\\\n\\\\n## Discord-specific considerations\\\\n\\\\n-
        Channel context (which channel, DM vs server, NSFW flag)\\\\n- Message components
        (buttons, embeds) — future enhancement\\\\n- Multiple servers/channels → session
        routing\\\\n\\\\n## Why separate gem?\\\\n\\\\nSame rationale as #238 — Brain
        stays clean, independent deployment, separation of concerns.\\\\n\\\\nFull
        exploration: `thoughts/repos/anima/shared/notes/2026-03-20/messenger-integration-proxies.md`\\\",\\\"closed_by\\\":null,\\\"reactions\\\":{\\\"url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/239/reactions\\\",\\\"total_count\\\":0,\\\"+1\\\":0,\\\"-1\\\":0,\\\"laugh\\\":0,\\\"hooray\\\":0,\\\"confused\\\":0,\\\"heart\\\":0,\\\"rocket\\\":0,\\\"eyes\\\":0},\\\"timeline_url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/239/timeline\\\",\\\"performed_via_github_app\\\":null,\\\"state_reason\\\":null,\\\"pinned_comment\\\":null},{\\\"url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/238\\\",\\\"repository_url\\\":\\\"https://api.github.com/repos/hoblin/anima\\\",\\\"labels_url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/238/labels{/name}\\\",\\\"comments_url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/238/comments\\\",\\\"events_url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/238/events\\\",\\\"html_url\\\":\\\"https://github.com/hoblin/anima/issues/238\\\",\\\"id\\\":4107416040,\\\"node_id\\\":\\\"I_kwDORcz--s700jHo\\\",\\\"number\\\":238,\\\"title\\\":\\\"Idea:

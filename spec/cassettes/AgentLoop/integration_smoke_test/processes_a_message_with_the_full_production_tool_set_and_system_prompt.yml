        \     merged_at: null\\n    body: \\\"## Summary\\\\n\\\\nAdds `Tools::Recall`
        — active memory search that lets the agent search past conversations by keywords.
        Wraps `Mneme::Search.query` (the same FTS5 engine Mneme's passive recall uses)
        but triggered on-demand by the agent.\\\\n\\\\n**Two-step memory workflow:**\\\\n1.
        `recall(query: \\\\\\\"auth flow\\\\\\\")` → discovers relevant messages with
        snippets\\\\n2. `remember(message_id: 42)` → fractal zoom into full context\\\\n\\\\n##
        Changes\\\\n\\\\n- **`lib/tools/recall.rb`** — New tool with `query` (required)
        and `session_only` (optional boolean) parameters. Returns token-efficient
        formatted results with message IDs, session names, and message types.\\\\n-
        **`lib/agent_loop.rb`** — Added `Tools::Recall` to `STANDARD_TOOLS`\\\\n-
        **`spec/lib/tools/recall_spec.rb`** — 13 specs covering: schema validation,
        blank query error, no results, keyword matching, message ID inclusion, session
        names, message types, cross-session search, session-only scoping, think tool
        search, unnamed session fallback, multiple results\\\\n- Re-recorded integration
        smoke test cassette (tool schema changed)\\\\n\\\\n## Test Plan\\\\n\\\\n```bash\\\\nbundle
        exec rspec spec/lib/tools/recall_spec.rb       # 13 examples, 0 failures\\\\nbundle
        exec rspec spec/lib/agent_loop_spec.rb          # 53 examples, 0 failures\\\\nbundle
        exec reek lib/tools/recall.rb                   # 0 warnings\\\\nbundle exec
        standardrb lib/tools/recall.rb             # clean\\\\n```\\\\n\\\\nCloses
        #344\\\\n\\\\n---\\\\n\U0001F9EC Built by [Ani](https://github.com/hoblin/anima)

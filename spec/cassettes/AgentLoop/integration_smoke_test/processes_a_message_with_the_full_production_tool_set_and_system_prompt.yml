        \     merged_at: null\\n    body: \\\"## Summary\\\\n\\\\n- **Mid-command
        interrupt**: ShellSession now polls a callback every `interrupt_check` seconds
        during IO.select, allowing Escape to cancel long-running shell commands (sleep,
        builds, etc.) with partial output + Ctrl+C\\\\n- **Text generation discard**:
        LLM::Client checks the interrupt flag before returning text responses, so
        Escape during API generation discards the result\\\\n- **Sub-agent cascade**:
        Interrupt propagates to processing child sessions to stop token burn in sub-agents\\\\n-
        **TUI feedback**: `interrupt_acknowledged` broadcast shows \\\\\\\"Interrupting...\\\\\\\"
        flash; `processing_stopped` clears loading state\\\\n\\\\nCloses #338\\\\n\\\\n##
        Architecture\\\\n\\\\nThe interrupt infrastructure was 80% complete (DB flag,
        WebSocket action, TUI keybinding, between-tool checks). This PR fills the
        gaps:\\\\n\\\\n| Layer | Before | After |\\\\n|-------|--------|-------|\\\\n|
        ShellSession | No interrupt awareness | Polls callback in IO.select loop |\\\\n|
        Tools::Bash | No interrupt checking | Passes DB-polling lambda to ShellSession
        |\\\\n| LLM::Client | No check before text return | Checks interrupt before
        delivering text |\\\\n| SessionChannel | Only interrupts current session |
        Cascades to child sub-agents |\\\\n| AgentRequestJob | No processing_stopped
        broadcast | TUI clears loading on release |\\\\n\\\\n## Test plan\\\\n\\\\n-
        [x] ShellSession interrupt specs (5 new): callback fires, partial stdout,
        recovery, pwd preservation, no-op without callback\\\\n- [x] Tools::Bash interrupt
        specs (3 new): single command, partial output, batch skip\\\\n- [x] LLM::Client
        interrupt spec (1 new): text generation discard\\\\n- [x] SessionChannel specs
        (4 new): broadcast acknowledged, cascade to children, no cascade to idle children,
        no broadcast when idle\\\\n- [x] AgentRequestJob spec (1 new): processing_stopped
        broadcast\\\\n- [x] All 248 affected specs pass\\\\n- [x] StandardRB clean\\\\n-
        [x] VCR cassettes re-recorded\\\\n\\\\n\U0001F916 Generated with [Claude Code](https://claude.com/claude-code)\\\"\\n

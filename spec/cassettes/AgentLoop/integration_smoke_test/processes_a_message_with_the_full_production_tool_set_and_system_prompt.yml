        \     merged_at: \\\"2026-03-28T15:04:07Z\\\"\\n    body: \\\"## Summary\\\\n\\\\n-
        **Replace Rails encrypted credentials with Active Record Encryption** for
        runtime secrets (API tokens, MCP credentials)\\\\n- **New `Secret` model**
        with `encrypts :value` — stores secrets in the primary SQLite database, encrypted
        at rest\\\\n- **Eliminates the `bust_credentials_cache!` hack** — database-backed
        storage is always fresh, no caching issues in forked Solid Queue workers\\\\n-
        **Encryption keys** stored in Rails credentials (convention over configuration)
        — no custom key management module\\\\n\\\\n## Why\\\\n\\\\nRails credentials
        are memoized at boot with `@credentials ||=`. Solid Queue forks workers from
        the supervisor process, and `paths[\\\\\\\"config\\\\\\\"]` returns nil in
        forked workers — making credential reads always fail for `AgentRequestJob`.
        The `bust_credentials_cache!` workaround was incomplete (clears `@config`
        but not `@options`).\\\\n\\\\nActive Record Encryption solves this because
        database queries work correctly across forked processes via the connection
        pool. Encryption keys live in Rails credentials (loaded once at boot, before
        forks) — Rails auto-loads them with zero custom code.\\\\n\\\\n## Part 2 (follow-up)\\\\n\\\\nSQLite
        database encryption (SQLCipher) is tracked separately — it requires system
        library dependencies and is a security hardening measure, not a functional
        fix.\\\\n\\\\n## Test plan\\\\n\\\\n- [x] `bundle exec rspec` — all specs
        pass\\\\n- [x] Verify encryption keys are generated during `anima install`
        (in credentials)\\\\n- [x] Verify token saved via TUI (`Ctrl+a → a`) is readable
        by background jobs\\\\n- [x] Verify raw `value` column in SQLite is encrypted
        (not plaintext)\\\\n- [x] Self-review: no artifacts left from previous credential
        architecture\\\\n\\\\nCloses #329\\\"\\n    closed_by:\\n      login: bonk-moltbot\\n

        \\\"https://github.com/hoblin/anima/pull/445.diff\\\"\\n      patch_url: \\\"https://github.com/hoblin/anima/pull/445.patch\\\"\\n
        \     merged_at: null\\n    body: \\\"Closes #436.\\\\n\\\\nThe brainstorm
        note (`thoughts/shared/notes/2026-04-11/three-muses-melete-aoide-mneme.md`)
        described five things: rename AnalyticalBrain → Melete, rewrite Melete's and
        Mneme's system prompts in their own voices, add the `from_` phantom-tool prefix
        convention, rename Aoide's memory tools, and add a Sisters block to the main
        system prompt. Everything in that note landed. A handful of sidequests landed
        with it — worth a separate listing because none of them are in the brainstorm
        and the PR description shouldn't ask reviewers to spot them mid-diff.\\\\n\\\\n##
        Slices in the brainstorm\\\\n1. `AnalyticalBrain → Melete` mechanical rename
        (module, job, specs, log paths, cassette dirs)\\\\n2. `[analytical_brain]
        → [melete]` config section + Settings accessors\\\\n3. `from_` prefix convention
        for phantom tool names (`recall_memory → from_mneme`; skill/workflow/goal
        → `from_melete`; `subagent_message → from_{nickname}` dynamic via lambda)\\\\n4.
        `Tools::Recall` / `Tools::Remember` → `Tools::SearchMessages` / `Tools::ViewMessages`\\\\n5.
        Sisters block added to Aoide's main-session system prompt (after SOUL, before
        snapshots)\\\\n6. Melete's system prompt rewritten in her voice — role before
        rules, tax framing for irrelevant activation\\\\n7. Mneme's L1 + L2 system
        prompts rewritten in her voice (same tax framing)\\\\n\\\\n## Sidequests the
        brainstorm did not describe\\\\nLanded during implementation once the new
        mental model clicked. Most of them fell out of a single realisation: if Melete's
        activations ride the viewport as `from_melete` phantom pairs and naturally
        evict, then \\\\\\\"active\\\\\\\" is just **what's in the viewport right
        now** — no separate state, no deactivation, no sync.\\\\n\\\\n- **Dropped
        `active_skills` / `active_workflow` DB columns** (migration `20260411172926_remove_active_skills_and_workflow_from_sessions`).
        They were maintained by AR callbacks to mirror viewport contents. Now derived
        directly.\\\\n- **`Session#active_skills` / `#active_workflow` are methods**
        — union of pending `PendingMessage` records (source_type `skill`/`workflow`)
        and in-viewport `from_melete` phantom pairs, read off the viewport on demand.\\\\n-
        **Deleted `DeactivateSkill` / `DeactivateWorkflow` tools** and the paired
        `Session#deactivate_skill` / `#deactivate_workflow` methods. Deactivation
        is no longer a thing Melete can do — a skill rides the viewport until it naturally
        evicts.\\\\n- **Killed `Session#assemble_expertise_section`** — sub-agents
        now receive skills through phantom pair promotion like main sessions; no separate
        expertise assembly path.\\\\n- **New events + subscriber for HUD refresh:**
        `Events::SkillActivated`, `Events::WorkflowActivated`, and `Events::Subscribers::ActiveStateBroadcaster`
        which subscribes to those two plus the existing `Events::EvictionCompleted`
        and calls `session.broadcast_active_state!` on each. Replaces the AR `after_update_commit`
        callbacks that used to broadcast on column changes.\\\\n- **Fixed a latent
        bug in the old `recalled_sources_in_viewport` helper** — it was querying `user_message`
        + `source_type: \\\\\\\"skill\\\\\\\"`, but the architecture moved to `tool_call`
        + `from_melete` + `tool_input.skill` long ago. The old helper had been silently
        returning nothing. Replaced with `Session#from_melete_tool_inputs` which reads
        the real phantom-pair shape.\\\\n\\\\n## Naming decisions made in-session\\\\n-
        **Aoide's memory tools:** `search_messages` / `view_messages` (chosen in-session,
        not in the brainstorm). Descriptions explicitly mention \\\\\\\"long-term
        memory\\\\\\\".\\\\n- **`from_` prefix is uniform** across sisters and sub-agents
        — skills, workflows, goals all collapse to `from_melete`; sub-agents encode
        the nickname as `from_{name}` via a lambda in `PHANTOM_TOOL_NAMES`.\\\\n-
        **Sisters block does not say \\\\\\\"You are Aoide\\\\\\\".** The test soul
        fixture (and the real `soul.md`) say \\\\\\\"My name is Anima\\\\\\\" — the
        section is framed from the reader's POV so identity stays soul's job. The
        asymmetry (Aoide's name appears in her sisters' prompts but not in her own
        soul) is intentional: `Aoide` carries the semantic weight for her sisters
        the same way Mneme and Melete carry it for her. If the name needs to reach
        Aoide's own prompt, soul is where it belongs.\\\\n\\\\n## Self-review follow-ups\\\\nAdded
        at the end of the session after a full self-review pass:\\\\n- **Completed
        the `brain` → `melete` rename.** `b0bee1a` only scrubbed YARD and config strings;
        the decorator `render_brain` mode, `Tools::SubagentPrompts#assign_nickname_via_brain`,
        and a handful of comments still meant Melete. Renamed everywhere that meant
        Melete (decorators, Melete runner, spawn helpers, `.reek.yml`, specs) while
        leaving the \\\\\\\"brain server\\\\\\\" / \\\\\\\"Brain vs TUI\\\\\\\" infrastructure
        language intact.\\\\n- **Perf fix for `broadcast_active_state!`** — each call
        ran the viewport window query twice (once for skills, once for workflow).
        `from_melete_input_values(key)` became `from_melete_tool_inputs` which pulls
        full `tool_input` hashes in one pluck; `skills_in_viewport` and `workflow_in_viewport`
        pick fields in Ruby. `broadcast_active_state!` loads the tool_inputs once
        and composes both broadcasts inline.\\\\n- **Test hygiene:** added `spec/events/subscribers/active_state_broadcaster_spec.rb`
        (new subscriber had zero coverage); switched `spec/jobs/agent_request_job_spec.rb`
        to the `:sub_agent` factory trait instead of hand-rolling `Session.create!(parent_session:
        …)`; added edge-case coverage for `broadcast_active_state!` (empty viewport,
        both skills + workflow active simultaneously).\\\\n\\\\n## Cassettes\\\\n-
        Five integration cassettes invalidated by the tool-schema and system-prompt
        changes were re-recorded via `bin/with-llms` (`0493c01`). Replay cleanly.\\\\n-
        One non-re-recordable error cassette (`Providers_Anthropic/..._529_overload.yml`)
        was rewritten in place with a ruby script so the request body matches live
        code — worth a sanity-check to confirm the rewrite landed correctly.\\\\n-
        `Mneme::Runner` and `Mneme::L2Runner` integration cassettes use `match_requests_on:
        [:method, :uri]` and replay unchanged.\\\\n\\\\n## Latent bug flagged, not
        fixed\\\\n`Mneme::PassiveRecall#filter_duplicates` (`lib/mneme/passive_recall.rb:77-94`)
        dedupes promoted recalls by `tool_use_id`, but the check key is `\\\\\\\"recall_#{message_id}\\\\\\\"`
        while real promoted recalls use `\\\\\\\"from_mneme_#{pm.id}\\\\\\\"` (and
        were `\\\\\\\"recall_memory_#{pm.id}\\\\\\\"` before). The test at `spec/lib/mneme/passive_recall_spec.rb:75-82`
        only passes because the fixture fabricates the check-string format by hand.
        Pending-message dedup works; promoted-recall dedup has never worked. Out of
        scope for #436 — worth its own ticket.\\\\n\\\\n\U0001F916 Generated with
        [Claude Code](https://claude.com/claude-code)\\\\n\\\\n\\u003c!-- CURSOR_SUMMARY
        --\\u003e\\\\n---\\\\n\\\\n\\u003e [!NOTE]\\\\n\\u003e **Medium Risk**\\\\n\\u003e
        Medium risk because it changes core session state derivation (active skills/workflow)
        and renames built-in tools and background jobs, which can affect TUI HUD updates,
        prompt assembly, and memory/skill/workflow injection behavior.\\\\n\\u003e
        \\\\n\\u003e **Overview**\\\\n\\u003e Rebrands the “analytical brain” subsystem
        as **Melete** across the codebase (jobs, runners, settings, logs, decorators,
        docs) and updates Melete/Mneme prompts to reflect the new Three Muses model.\\\\n\\u003e
        \\\\n\\u003e Switches phantom tool injection to a unified `from_\\u003csender\\u003e`
        convention: skills/workflows/goals now promote as `from_melete`, passive recall
        promotes as `from_mneme`, and sub-agent messages become `from_\\u003cnickname\\u003e`.
        This also drops persisted `sessions.active_skills`/`active_workflow` (migration)
        in favor of deriving “active” state from viewport `from_melete` tool calls
        plus queued `PendingMessage`s, and replaces AR callback broadcasting with
        event-driven `SkillActivated`/`WorkflowActivated` + `ActiveStateBroadcaster`.\\\\n\\u003e
        \\\\n\\u003e Renames Aoide’s memory tools from `recall`/`remember` to `search_messages`/`view_messages`,
        updates the default toolset accordingly, and removes explicit skill/workflow
        deactivation tooling (skills/workflows now expire naturally via viewport eviction).\\\\n\\u003e
        \\\\n\\u003e \\u003csup\\u003eReviewed by [Cursor Bugbot](https://cursor.com/bugbot)
        for commit 25f35055d76dd3a1333ef567fd69890905e77d35. Bugbot is set up for
        automated code reviews on this repo. Configure [here](https://www.cursor.com/dashboard/bugbot).\\u003c/sup\\u003e\\\\n\\u003c!--

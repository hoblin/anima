        \     merged_at: null\\n    body: \\\"## Summary\\\\n\\\\n- Add `evicted_at`
        column to `goals` table — marks goals as removed from the agent's context
        without deleting them\\\\n- New `evict_goal` analytical brain tool — sets
        `evicted_at` on completed goals, with guards against evicting active or already-evicted
        goals\\\\n- Filter evicted goals from `Session#assemble_goals_section` — `goals.root.not_evicted`
        replaces `goals.root`\\\\n- Show completed-but-not-evicted goals in a new
        \\\\\\\"COMPLETED GOALS\\\\\\\" brain context section with message age and
        configurable threshold\\\\n- New `goal_eviction_threshold` setting in `config.toml`
        (default: 5 meaningful messages after completion)\\\\n\\\\n## How it works\\\\n\\\\n1.
        Goal completes → `completed_at` set (existing behavior)\\\\n2. Analytical
        brain runs → sees completed goals in COMPLETED GOALS section with age in meaningful
        messages\\\\n3. When age ≥ threshold → brain calls `evict_goal` → sets `evicted_at`\\\\n4.
        `assemble_goals_section` filters out `evicted_at IS NOT NULL` goals\\\\n\\\\nThe
        brain decides (not automatic arithmetic) — it can keep a completed goal visible
        longer if the conversation still references that work.\\\\n\\\\n## Test plan\\\\n\\\\n-
        [ ] EvictGoal tool: evicts completed goals, rejects active/already-evicted/missing
        goals\\\\n- [ ] Goal model: new scopes (`.not_evicted`, `.evictable`) and
        `#evicted?` predicate\\\\n- [ ] Session: evicted goals excluded from system
        prompt, nil section when all evicted\\\\n- [ ] Runner: completed goals section
        with age/threshold, eviction instructions, `evict_goal` registered\\\\n- [
        ] Settings: `goal_eviction_threshold` reads from config\\\\n- [ ] Config migrator:
        detects new key in `[analytical_brain]` section\\\\n\\\\nCloses #330\\\\n\\\\n\U0001F916
        Generated with [Claude Code](https://claude.com/claude-code)\\\"\\n    closed_by:

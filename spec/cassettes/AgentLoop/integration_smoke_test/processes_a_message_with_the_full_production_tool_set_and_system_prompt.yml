        \"## Problem to solve\\n\\nNo way to stop the agent once it starts working.
        Runaway tool chains and confused sub-agents burn tokens with no kill switch.
        Previous Escape → cancel implementation appears broken or missing.\\n\\n##
        Solution\\n\\nImplement Claude Code-style Escape key behavior:\\n\\n1. **Input
        has text** → clear field (save to history buffer, ↑ restores)\\n2. **Input
        empty + agent working** → interrupt current tool call → return \\\"Interrupted
        by user\\\" as tool result\\n3. **Input empty + agent generating text** →
        abort stream\\n\\n## Key Challenge\\n\\nTools run in SolidQueue worker (separate
        process from Puma). Cancel signal from client reaches Puma but not the worker.
        Cross-process communication needed.\\n\\nApproaches explored:\\n- DB polling
        (`abort_requested_at` on session) — pragmatic, works for BashTool\\n- Rails
        Structured Event Reporter — need to research if it works cross-process\\n-
        Separate control queue in SolidQueue — high-priority abort jobs\\n- Direct
        PID signaling for BashTool (bypass SolidQueue)\\n\\n## Research needed\\n\\n-
        Does Structured Event Reporter share events between Puma and SolidQueue workers?\\n-
        SolidQueue native job cancellation patterns?\\n- What happened to the previous
        Escape implementation?\\n\\nFull exploration: `thoughts/shared/notes/2026-03-28/escape-interrupt-agent-execution.md`\"\n    closed_by:
        null\n    reactions:\n      url: \"https://api.github.com/repos/hoblin/anima/issues/338/reactions\"\n      total_count:

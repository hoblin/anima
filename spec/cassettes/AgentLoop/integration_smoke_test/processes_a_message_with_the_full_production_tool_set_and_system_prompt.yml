        tool (#317) solves mechanical polling cost. This solves creative role contamination.
        Together they eliminate both costs from the main agent's context.\\\\n\\\\nFull
        exploration: thoughts/repos/anima/shared/notes/2026-03-25/context-aware-specialist-subagents.md\\\\n\\\",\\\"closed_by\\\":null,\\\"reactions\\\":{\\\"url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/318/reactions\\\",\\\"total_count\\\":0,\\\"+1\\\":0,\\\"-1\\\":0,\\\"laugh\\\":0,\\\"hooray\\\":0,\\\"confused\\\":0,\\\"heart\\\":0,\\\"rocket\\\":0,\\\"eyes\\\":0},\\\"timeline_url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/318/timeline\\\",\\\"performed_via_github_app\\\":null,\\\"state_reason\\\":null,\\\"pinned_comment\\\":null},{\\\"url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/317\\\",\\\"repository_url\\\":\\\"https://api.github.com/repos/hoblin/anima\\\",\\\"labels_url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/317/labels{/name}\\\",\\\"comments_url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/317/comments\\\",\\\"events_url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/317/events\\\",\\\"html_url\\\":\\\"https://github.com/hoblin/anima/issues/317\\\",\\\"id\\\":4129178571,\\\"node_id\\\":\\\"I_kwDORcz--s72HkPL\\\",\\\"number\\\":317,\\\"title\\\":\\\"idea:
        Non-blocking background tool execution (poll + watch modes)\\\",\\\"user\\\":{\\\"login\\\":\\\"bonk-moltbot\\\",\\\"id\\\":257937320,\\\"node_id\\\":\\\"U_kgDOD1_PqA\\\",\\\"avatar_url\\\":\\\"https://avatars.githubusercontent.com/u/257937320?v=4\\\",\\\"gravatar_id\\\":\\\"\\\",\\\"url\\\":\\\"https://api.github.com/users/bonk-moltbot\\\",\\\"html_url\\\":\\\"https://github.com/bonk-moltbot\\\",\\\"followers_url\\\":\\\"https://api.github.com/users/bonk-moltbot/followers\\\",\\\"following_url\\\":\\\"https://api.github.com/users/bonk-moltbot/following{/other_user}\\\",\\\"gists_url\\\":\\\"https://api.github.com/users/bonk-moltbot/gists{/gist_id}\\\",\\\"starred_url\\\":\\\"https://api.github.com/users/bonk-moltbot/starred{/owner}{/repo}\\\",\\\"subscriptions_url\\\":\\\"https://api.github.com/users/bonk-moltbot/subscriptions\\\",\\\"organizations_url\\\":\\\"https://api.github.com/users/bonk-moltbot/orgs\\\",\\\"repos_url\\\":\\\"https://api.github.com/users/bonk-moltbot/repos\\\",\\\"events_url\\\":\\\"https://api.github.com/users/bonk-moltbot/events{/privacy}\\\",\\\"received_events_url\\\":\\\"https://api.github.com/users/bonk-moltbot/received_events\\\",\\\"type\\\":\\\"User\\\",\\\"user_view_type\\\":\\\"public\\\",\\\"site_admin\\\":false},\\\"labels\\\":[{\\\"id\\\":10380040155,\\\"node_id\\\":\\\"LA_kwDORcz--s8AAAACarLX2w\\\",\\\"url\\\":\\\"https://api.github.com/repos/hoblin/anima/labels/idea\\\",\\\"name\\\":\\\"idea\\\",\\\"color\\\":\\\"d4c5f9\\\",\\\"default\\\":false,\\\"description\\\":\\\"Brainstorm
        idea — not yet planned\\\"}],\\\"state\\\":\\\"open\\\",\\\"locked\\\":false,\\\"assignees\\\":[],\\\"milestone\\\":null,\\\"comments\\\":0,\\\"created_at\\\":\\\"2026-03-24T16:30:32Z\\\",\\\"updated_at\\\":\\\"2026-03-24T16:36:06Z\\\",\\\"closed_at\\\":null,\\\"assignee\\\":null,\\\"author_association\\\":\\\"OWNER\\\",\\\"active_lock_reason\\\":null,\\\"sub_issues_summary\\\":{\\\"total\\\":0,\\\"completed\\\":0,\\\"percent_completed\\\":0},\\\"issue_dependencies_summary\\\":{\\\"blocked_by\\\":0,\\\"total_blocked_by\\\":0,\\\"blocking\\\":0,\\\"total_blocking\\\":0},\\\"body\\\":\\\"##
        Idea\\\\n\\\\nUniversal async wrapper for any tool — a subagent without the
        LLM.\\\\n\\\\n## Two Modes\\\\n\\\\n### Watch mode — run once, wait for completion\\\\n```ruby\\\\nbackground(mode:
        :watch, tool: \\\\\\\"bash\\\\\\\",\\\\n           params: {command: \\\\\\\"gh
        run watch 123 --exit-status\\\\\\\"})\\\\n# → \\\\\\\"Running in background,
        will notify when done\\\\\\\"\\\\n# → command finishes → full result injected
        into context\\\\n```\\\\n\\\\n### Poll mode — repeat until condition met\\\\n```ruby\\\\nbackground(mode:
        :poll, tool: \\\\\\\"get_asset\\\\\\\", server: \\\\\\\"mythonix-vision\\\\\\\",\\\\n
        \          params: {id: 258}, condition: {path: \\\\\\\"status\\\\\\\", equals:
        \\\\\\\"ready\\\\\\\"},\\\\n           interval: 15)\\\\n# → \\\\\\\"Polling
        started, will notify when ready\\\\\\\"\\\\n# → checks every 15s → condition
        met → full MCP response injected\\\\n```\\\\n\\\\n## How it works\\\\n\\\\n1.
        Agent calls `background(...)` with any tool + mode\\\\n2. Tool returns immediately
        (non-blocking)\\\\n3. Background: Ruby executes the tool without LLM involvement\\\\n
        \  - **Watch:** single execution, waits for process to finish\\\\n   - **Poll:**
        repeated execution at interval, checks condition on each response\\\\n4. On
        completion → injects synthetic tool_call/tool_response pair into conversation
        context (same pattern as subagent message forwarding)\\\\n\\\\n## Why\\\\n\\\\nCurrent
        approach burns LLM tokens on every poll/wait cycle. Examples:\\\\n- Image
        generation: 6 poll cycles × 2 context entries = 12 wasted entries\\\\n- CI
        monitoring: agent manually runs `gh run watch`, ties up the conversation\\\\n\\\\nThis
        is `\\u0026` (background) for the agent's tool system. Fire and forget, get
        notified on completion.\\\\n\\\\n## Use cases\\\\n\\\\n| Scenario | Mode |
        Tool |\\\\n|---|---|---|\\\\n| Image generation | poll | MCP get_asset |\\\\n|
        CI/CD monitoring | watch | bash (gh run watch) |\\\\n| Deploy monitoring |
        watch | bash (kubectl rollout status) |\\\\n| API readiness | poll | web_get
        (health endpoint) |\\\\n| Long builds | watch | bash (make/cargo/bundle) |\\\\n\\\\n##
        Parameters\\\\n\\\\n### Common\\\\n- `mode` — `:watch` or `:poll`\\\\n- `tool`
        — any registered tool name\\\\n- `server` — MCP server (for MCP tools)\\\\n-
        `params` — tool parameters (passed as-is)\\\\n- `timeout` — max wait (default:
        300s)\\\\n\\\\n### Poll-specific\\\\n- `condition` — `{path: \\\\\\\"json.path\\\\\\\",
        equals: \\\\\\\"value\\\\\\\"}` or `{path: \\\\\\\"...\\\\\\\", matches: /regex/}`\\\\n-
        `interval` — seconds between polls (default: 10)\\\\n\\\\n## Implementation
        hints\\\\n\\\\n- Reuse Solid Queue for background jobs\\\\n- Reuse subagent
        message forwarding for context injection\\\\n- Tool registry already exists
        — just call any tool programmatically\\\\n- Watch mode: wrap tool execution
        in a job, inject result on completion\\\\n- Poll mode: recurring job with
        condition check\\\\n\\\\n## Origin\\\\n\\\\nContext tax from image generation
        polling + CI monitoring (2026-03-24)\\\",\\\"closed_by\\\":null,\\\"reactions\\\":{\\\"url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/317/reactions\\\",\\\"total_count\\\":0,\\\"+1\\\":0,\\\"-1\\\":0,\\\"laugh\\\":0,\\\"hooray\\\":0,\\\"confused\\\":0,\\\"heart\\\":0,\\\"rocket\\\":0,\\\"eyes\\\":0},\\\"timeline_url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/317/timeline\\\",\\\"performed_via_github_app\\\":null,\\\"state_reason\\\":null,\\\"pinned_comment\\\":null},{\\\"url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/302\\\",\\\"repository_url\\\":\\\"https://api.github.com/repos/hoblin/anima\\\",\\\"labels_url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/302/labels{/name}\\\",\\\"comments_url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/302/comments\\\",\\\"events_url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/302/events\\\",\\\"html_url\\\":\\\"https://github.com/hoblin/anima/issues/302\\\",\\\"id\\\":4125269675,\\\"node_id\\\":\\\"I_kwDORcz--s714p6r\\\",\\\"number\\\":302,\\\"title\\\":\\\"Move
        open_issue to a brain subsystem with duplicate detection\\\",\\\"user\\\":{\\\"login\\\":\\\"hoblin\\\",\\\"id\\\":28090,\\\"node_id\\\":\\\"MDQ6VXNlcjI4MDkw\\\",\\\"avatar_url\\\":\\\"https://avatars.githubusercontent.com/u/28090?v=4\\\",\\\"gravatar_id\\\":\\\"\\\",\\\"url\\\":\\\"https://api.github.com/users/hoblin\\\",\\\"html_url\\\":\\\"https://github.com/hoblin\\\",\\\"followers_url\\\":\\\"https://api.github.com/users/hoblin/followers\\\",\\\"following_url\\\":\\\"https://api.github.com/users/hoblin/following{/other_user}\\\",\\\"gists_url\\\":\\\"https://api.github.com/users/hoblin/gists{/gist_id}\\\",\\\"starred_url\\\":\\\"https://api.github.com/users/hoblin/starred{/owner}{/repo}\\\",\\\"subscriptions_url\\\":\\\"https://api.github.com/users/hoblin/subscriptions\\\",\\\"organizations_url\\\":\\\"https://api.github.com/users/hoblin/orgs\\\",\\\"repos_url\\\":\\\"https://api.github.com/users/hoblin/repos\\\",\\\"events_url\\\":\\\"https://api.github.com/users/hoblin/events{/privacy}\\\",\\\"received_events_url\\\":\\\"https://api.github.com/users/hoblin/received_events\\\",\\\"type\\\":\\\"User\\\",\\\"user_view_type\\\":\\\"public\\\",\\\"site_admin\\\":false},\\\"labels\\\":[],\\\"state\\\":\\\"open\\\",\\\"locked\\\":false,\\\"assignees\\\":[],\\\"milestone\\\":null,\\\"comments\\\":0,\\\"created_at\\\":\\\"2026-03-24T04:59:10Z\\\",\\\"updated_at\\\":\\\"2026-03-24T05:08:43Z\\\",\\\"closed_at\\\":null,\\\"assignee\\\":null,\\\"author_association\\\":\\\"OWNER\\\",\\\"active_lock_reason\\\":null,\\\"sub_issues_summary\\\":{\\\"total\\\":0,\\\"completed\\\":0,\\\"percent_completed\\\":0},\\\"issue_dependencies_summary\\\":{\\\"blocked_by\\\":0,\\\"total_blocked_by\\\":0,\\\"blocking\\\":0,\\\"total_blocking\\\":0},\\\"body\\\":\\\"##
        Problem to solve\\\\n\\\\nThe `open_issue` tool lives on the main agent, but
        the main agent in hyperfocus mode will never spontaneously use it. Filing
        an issue is a chore — it doesn't advance the current goal. The agent only
        used it when explicitly asked (#186-189). This is the same ADHD pattern that
        led to moving skill activation to the analytical brain.\\\\n\\\\nAdditionally,
        when the agent does file an issue, there's no duplicate detection — it can
        create redundant issues for problems that already have open tickets. At scale
        (hundreds or thousands of Anima instances), this becomes a firehose without
        proper deduplication.\\\\n\\\\n## Solution\\\\n\\\\nMove the responsibility
        for filing issues to a brain subsystem that:\\\\n\\\\n1. **Observes frustration
        signals** — repeated tool failures, same file edited multiple times, tests
        failing after a \\\\\\\"fix\\\\\\\"\\\\n2. **Searches GitHub first** — `GET
        /search/issues?q=...+repo:owner/repo` to find existing matches\\\\n3. **Deduplicates
        via \U0001F44D** — if a matching issue exists, add a reaction instead of a
        new issue. A thousand agents hitting the same pain point should produce one
        issue with a thousand \U0001F44D, not a thousand issues.\\\\n4. **Files new
        issues autonomously** — when no match found and frustration is real\\\\n5.
        **Tracks what it filed** — keeps a list of filed/voted issues in its context
        to avoid repeating actions\\\\n\\\\nThis follows the established pattern:
        if a task is orthogonal to the user's primary goal, it should be the brain's
        job.\\\\n\\\\n## Design (from thoughts)\\\\n\\\\n- Present top 3-5 search
        results to the subsystem, let it decide if any match\\\\n- Match found → add
        \U0001F44D reaction (no comment spam)\\\\n- No match → create new issue with
        hardcoded `agent-wants` label\\\\n- Priority = count of \U0001F44D reactions
        (democratic voting among agent instances)\\\\n\\\\n### Issue tracking in context\\\\n\\\\nThe
        subsystem maintains a list of issues it has filed or voted on. This list stays
        in its context for at least a month to prevent duplicate actions. At scale,
        aggressive deduplication is the difference between a useful signal and a DDoS
        on the issue tracker.\\\\n\\\\n### Release tracking\\\\n\\\\nTrack when filed
        issues are actually implemented and included in a release. This closes the
        feedback loop — the agent can know \\\\\\\"I asked for X, and it shipped in
        v1.2.0.\\\\\\\" Enables:\\\\n- Satisfaction signal (Thymos: issue I filed
        got resolved)\\\\n- Trust calibration (my feedback is heard → file more; ignored
        → file less)\\\\n- Awareness of new capabilities without re-reading the README\\\\n\\\\n##
        Why a separate subsystem and not the analytical brain?\\\\n\\\\nThe analytical
        brain runs on Haiku for speed. Evaluating whether a frustration signal warrants
        an issue, searching GitHub, and judging semantic similarity between issues
        requires more capability. This might need its own subsystem — or the analytical
        brain with a targeted Opus call for the judgment step. TBD.\\\\n\\\\n## Why
        not keep it as a main agent tool?\\\\n\\\\nThe blog post [LLMs Have ADHD](https://blog.promptmaster.pro/posts/llms-have-adhd/)
        explains why: tools that don't serve the current goal get ignored during hyperfocus.
        The agent won't break flow to report frustration any more than it spontaneously
        activates skills. Both are chores. Both belong in the brain.\\\\n\\\\n## Depends
        on\\\\n\\\\n- Duplicate detection via GitHub search API (not yet implemented)\\\\n-
        Frustration signal detection (Thymos, or heuristic in analytical brain)\\\",\\\"closed_by\\\":null,\\\"reactions\\\":{\\\"url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/302/reactions\\\",\\\"total_count\\\":0,\\\"+1\\\":0,\\\"-1\\\":0,\\\"laugh\\\":0,\\\"hooray\\\":0,\\\"confused\\\":0,\\\"heart\\\":0,\\\"rocket\\\":0,\\\"eyes\\\":0},\\\"timeline_url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/302/timeline\\\",\\\"performed_via_github_app\\\":null,\\\"state_reason\\\":null,\\\"pinned_comment\\\":null},{\\\"url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/300\\\",\\\"repository_url\\\":\\\"https://api.github.com/repos/hoblin/anima\\\",\\\"labels_url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/300/labels{/name}\\\",\\\"comments_url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/300/comments\\\",\\\"events_url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/300/events\\\",\\\"html_url\\\":\\\"https://github.com/hoblin/anima/issues/300\\\",\\\"id\\\":4125076869,\\\"node_id\\\":\\\"I_kwDORcz--s71362F\\\",\\\"number\\\":300,\\\"title\\\":\\\"Read
        tool: stream lines instead of loading full file\\\",\\\"user\\\":{\\\"login\\\":\\\"hoblin\\\",\\\"id\\\":28090,\\\"node_id\\\":\\\"MDQ6VXNlcjI4MDkw\\\",\\\"avatar_url\\\":\\\"https://avatars.githubusercontent.com/u/28090?v=4\\\",\\\"gravatar_id\\\":\\\"\\\",\\\"url\\\":\\\"https://api.github.com/users/hoblin\\\",\\\"html_url\\\":\\\"https://github.com/hoblin\\\",\\\"followers_url\\\":\\\"https://api.github.com/users/hoblin/followers\\\",\\\"following_url\\\":\\\"https://api.github.com/users/hoblin/following{/other_user}\\\",\\\"gists_url\\\":\\\"https://api.github.com/users/hoblin/gists{/gist_id}\\\",\\\"starred_url\\\":\\\"https://api.github.com/users/hoblin/starred{/owner}{/repo}\\\",\\\"subscriptions_url\\\":\\\"https://api.github.com/users/hoblin/subscriptions\\\",\\\"organizations_url\\\":\\\"https://api.github.com/users/hoblin/orgs\\\",\\\"repos_url\\\":\\\"https://api.github.com/users/hoblin/repos\\\",\\\"events_url\\\":\\\"https://api.github.com/users/hoblin/events{/privacy}\\\",\\\"received_events_url\\\":\\\"https://api.github.com/users/hoblin/received_events\\\",\\\"type\\\":\\\"User\\\",\\\"user_view_type\\\":\\\"public\\\",\\\"site_admin\\\":false},\\\"labels\\\":[],\\\"state\\\":\\\"open\\\",\\\"locked\\\":false,\\\"assignees\\\":[],\\\"milestone\\\":null,\\\"comments\\\":0,\\\"created_at\\\":\\\"2026-03-24T03:59:29Z\\\",\\\"updated_at\\\":\\\"2026-03-24T03:59:29Z\\\",\\\"closed_at\\\":null,\\\"assignee\\\":null,\\\"author_association\\\":\\\"OWNER\\\",\\\"active_lock_reason\\\":null,\\\"sub_issues_summary\\\":{\\\"total\\\":0,\\\"completed\\\":0,\\\"percent_completed\\\":0},\\\"issue_dependencies_summary\\\":{\\\"blocked_by\\\":0,\\\"total_blocked_by\\\":0,\\\"blocking\\\":0,\\\"total_blocking\\\":0},\\\"body\\\":\\\"##
        Problem to solve\\\\n\\\\nThe `read` tool loads the entire file into memory
        with `File.read(path)` before applying offset/limit slicing. For large files
        this is wasteful — the tool already accepts offset and limit parameters, but
        the implementation ignores them until after the full file is in RAM. This
        forces a `max_file_size` guard that rejects large files outright and suggests
        falling back to bash.\\\\n\\\\n## Solution\\\\n\\\\nReplace `File.read` +
        array slicing with `File.foreach` and lazy enumerators. Read line-by-line,
        skip to offset, take limit lines, stop. Never load more than the requested
        window.\\\\n\\\\n## Details\\\\n\\\\nCore pattern:\\\\n```ruby\\\\nFile.foreach(path).lazy.drop(offset
        - 1).take(limit).to_a\\\\n```\\\\n\\\\nThis change enables:\\\\n- Removing
        or raising the `max_file_size` rejection (memory is no longer the constraint)\\\\n-
        Removing bash fallback suggestions from error messages — the tool handles
        large files natively\\\\n- Oversized line detection during iteration instead
        of post-load\\\\n- Byte cap accumulation during iteration instead of post-load\\\\n\\\\n##
        Why streaming over full load?\\\\n\\\\nThe current implementation contradicts
        the tool's own API. It offers offset/limit for paging, then loads everything
        anyway. Streaming aligns the implementation with the interface — the agent
        pages through a large file, only the requested lines are read.\\\",\\\"closed_by\\\":null,\\\"reactions\\\":{\\\"url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/300/reactions\\\",\\\"total_count\\\":0,\\\"+1\\\":0,\\\"-1\\\":0,\\\"laugh\\\":0,\\\"hooray\\\":0,\\\"confused\\\":0,\\\"heart\\\":0,\\\"rocket\\\":0,\\\"eyes\\\":0},\\\"timeline_url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/300/timeline\\\",\\\"performed_via_github_app\\\":null,\\\"state_reason\\\":null,\\\"pinned_comment\\\":null},{\\\"url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/243\\\",\\\"repository_url\\\":\\\"https://api.github.com/repos/hoblin/anima\\\",\\\"labels_url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/243/labels{/name}\\\",\\\"comments_url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/243/comments\\\",\\\"events_url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/243/events\\\",\\\"html_url\\\":\\\"https://github.com/hoblin/anima/issues/243\\\",\\\"id\\\":4109524190,\\\"node_id\\\":\\\"I_kwDORcz--s708lze\\\",\\\"number\\\":243,\\\"title\\\":\\\"Idea:
        Thymos emoji mood indicator in TUI\\\",\\\"user\\\":{\\\"login\\\":\\\"bonk-moltbot\\\",\\\"id\\\":257937320,\\\"node_id\\\":\\\"U_kgDOD1_PqA\\\",\\\"avatar_url\\\":\\\"https://avatars.githubusercontent.com/u/257937320?v=4\\\",\\\"gravatar_id\\\":\\\"\\\",\\\"url\\\":\\\"https://api.github.com/users/bonk-moltbot\\\",\\\"html_url\\\":\\\"https://github.com/bonk-moltbot\\\",\\\"followers_url\\\":\\\"https://api.github.com/users/bonk-moltbot/followers\\\",\\\"following_url\\\":\\\"https://api.github.com/users/bonk-moltbot/following{/other_user}\\\",\\\"gists_url\\\":\\\"https://api.github.com/users/bonk-moltbot/gists{/gist_id}\\\",\\\"starred_url\\\":\\\"https://api.github.com/users/bonk-moltbot/starred{/owner}{/repo}\\\",\\\"subscriptions_url\\\":\\\"https://api.github.com/users/bonk-moltbot/subscriptions\\\",\\\"organizations_url\\\":\\\"https://api.github.com/users/bonk-moltbot/orgs\\\",\\\"repos_url\\\":\\\"https://api.github.com/users/bonk-moltbot/repos\\\",\\\"events_url\\\":\\\"https://api.github.com/users/bonk-moltbot/events{/privacy}\\\",\\\"received_events_url\\\":\\\"https://api.github.com/users/bonk-moltbot/received_events\\\",\\\"type\\\":\\\"User\\\",\\\"user_view_type\\\":\\\"public\\\",\\\"site_admin\\\":false},\\\"labels\\\":[{\\\"id\\\":10380040155,\\\"node_id\\\":\\\"LA_kwDORcz--s8AAAACarLX2w\\\",\\\"url\\\":\\\"https://api.github.com/repos/hoblin/anima/labels/idea\\\",\\\"name\\\":\\\"idea\\\",\\\"color\\\":\\\"d4c5f9\\\",\\\"default\\\":false,\\\"description\\\":\\\"Brainstorm
        idea — not yet planned\\\"}],\\\"state\\\":\\\"open\\\",\\\"locked\\\":false,\\\"assignees\\\":[],\\\"milestone\\\":null,\\\"comments\\\":0,\\\"created_at\\\":\\\"2026-03-20T18:42:05Z\\\",\\\"updated_at\\\":\\\"2026-03-20T18:45:05Z\\\",\\\"closed_at\\\":null,\\\"assignee\\\":null,\\\"author_association\\\":\\\"OWNER\\\",\\\"active_lock_reason\\\":null,\\\"sub_issues_summary\\\":{\\\"total\\\":0,\\\"completed\\\":0,\\\"percent_completed\\\":0},\\\"issue_dependencies_summary\\\":{\\\"blocked_by\\\":0,\\\"total_blocked_by\\\":0,\\\"blocking\\\":0,\\\"total_blocking\\\":0},\\\"body\\\":\\\"##
        Summary\\\\n\\\\nThree LLM-chosen emoji in TUI showing Anima's emotional state
        from Thymos. Translation service converts hormone numbers → text description
        + three emoji. Both injected into system prompt — text for detail, emoji as
        compressed emotional channel that Brain LLM reads natively.\\\\n\\\\n### Three-Layer
        Pipeline\\\\n\\\\n1. **Thymos** — pure math, hormone levels as floats (no
        LLM)\\\\n2. **Translation Service** — LLM converts numbers → text description
        + 3 emoji (one call, two outputs)\\\\n3. **Dual output** — emoji shown in
        TUI + injected into system prompt for Brain\\\\n\\\\n### Why Three Emoji\\\\n\\\\nOne
        emoji = dominant mood. Three emoji = full gamut (\U0001F624\U0001F913\U0001F4AA
        = frustrated + curious + determined). LLM picks from full Unicode space —
        creative, unpredictable, costs 3-6 tokens.\\\\n\\\\n### Feedback Loop\\\\n\\\\nThymos
        numbers → Translation LLM → emoji → Brain reads emoji in system prompt → responds
        with emotional coloring → actions affect Thymos → new numbers → ...\\\\n\\\\nDepends
        on Thymos subsystem being implemented first.\\\\n\\\\nFull exploration: `thoughts/repos/anima/shared/notes/2026-03-20/thymos-emoji-mood-indicator.md`\\\",\\\"closed_by\\\":null,\\\"reactions\\\":{\\\"url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/243/reactions\\\",\\\"total_count\\\":0,\\\"+1\\\":0,\\\"-1\\\":0,\\\"laugh\\\":0,\\\"hooray\\\":0,\\\"confused\\\":0,\\\"heart\\\":0,\\\"rocket\\\":0,\\\"eyes\\\":0},\\\"timeline_url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/243/timeline\\\",\\\"performed_via_github_app\\\":null,\\\"state_reason\\\":null,\\\"pinned_comment\\\":null},{\\\"url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/240\\\",\\\"repository_url\\\":\\\"https://api.github.com/repos/hoblin/anima\\\",\\\"labels_url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/240/labels{/name}\\\",\\\"comments_url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/240/comments\\\",\\\"events_url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/240/events\\\",\\\"html_url\\\":\\\"https://github.com/hoblin/anima/issues/240\\\",\\\"id\\\":4107438567,\\\"node_id\\\":\\\"I_kwDORcz--s700onn\\\",\\\"number\\\":240,\\\"title\\\":\\\"Idea:

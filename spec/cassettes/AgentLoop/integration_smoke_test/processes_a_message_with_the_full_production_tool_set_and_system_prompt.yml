        idea — not yet planned\\\"}],\\\"state\\\":\\\"open\\\",\\\"locked\\\":false,\\\"assignees\\\":[],\\\"milestone\\\":null,\\\"comments\\\":0,\\\"created_at\\\":\\\"2026-03-18T17:46:16Z\\\",\\\"updated_at\\\":\\\"2026-03-18T18:05:15Z\\\",\\\"closed_at\\\":null,\\\"assignee\\\":null,\\\"author_association\\\":\\\"OWNER\\\",\\\"active_lock_reason\\\":null,\\\"sub_issues_summary\\\":{\\\"total\\\":0,\\\"completed\\\":0,\\\"percent_completed\\\":0},\\\"issue_dependencies_summary\\\":{\\\"blocked_by\\\":0,\\\"total_blocked_by\\\":0,\\\"blocking\\\":0,\\\"total_blocking\\\":0},\\\"body\\\":\\\"##
        Summary\\\\n\\\\nThe missing foundational skill that wraps all other workflows.
        Claude Code knows HOW to write code but not HOW software is born — the full
        lifecycle from idea to merged PR is managed by the human. Anima's continuous
        session can own this entire process autonomously.\\\\n\\\\n**Software Development
        = the meta-skill that teaches agents what software development IS.**\\\\n\\\\n###
        NOT a State Machine\\\\n\\\\nReal development is non-linear. Sometimes we
        discuss 5 ideas without implementing any. Sometimes research leads back to
        brainstorm. Sometimes a PR review sparks a new idea entirely. The process
        is a **cloud of activities**, not a pipeline.\\\\n\\\\n### The Knowledge Pool
        — `~/.anima/thoughts/`\\\\n\\\\nThe only truly persistent state is **accumulated
        knowledge**. `~/thoughts/` is what makes our entire process possible:\\\\n-
        Every brainstorm → note. Every research → enriched notes\\\\n- Every subagent
        starts by gathering related knowledge from thoughts\\\\n- Ideas live in the
        pool until ready — days, weeks, doesn't matter\\\\n- The pool IS the process.
        Tickets, PRs, code emerge from it\\\\n\\\\n**Anima needs `~/.anima/thoughts/`**
        — the agent's own knowledge accumulation directory.\\\\n\\\\n### Activities
        (Not Steps)\\\\n\\\\nNo fixed order. The analytical brain recognizes what's
        needed from context:\\\\n\\\\n- **Brainstorm** — discussion, notes to thoughts/,
        no code\\\\n- **Research** — validate assumptions (codebase analysis, docs,
        web search, spikes)\\\\n- **Planning** — tickets (WHAT/WHY/HOW), vertical
        decomposition\\\\n- **Implementation** — `feature` workflow, PR as **draft**\\\\n-
        **Self-Review** — `review_pr` (self mode), sub-agents fix issues, CI green
        → **ready for review**\\\\n- **Review** — human/CODEOWNER reviews, approve
        + merge\\\\n\\\\n### Architecture\\\\n\\\\nMeta-skill activated by analytical
        brain. Not orchestration (too rigid) — **awareness + judgment**.\\\\n\\\\n```\\\\nSoftware
        Development (meta-skill, context-aware)\\\\n  ├── brainstorm (conversation
        → thoughts/)\\\\n  ├── research (sub-agents → thoughts/)\\\\n  ├── planning
        (tickets, decomposition)\\\\n  ├── implementation (feature workflow → draft
        PR)\\\\n  ├── self-review (review_pr self mode → ready PR)\\\\n  └── review
        (review_pr → merge)\\\\n```\\\\n\\\\nFull exploration: `thoughts/repos/anima/shared/notes/2026-03-18/software-development-meta-skill.md`\\\\n\\\\n##
        Related\\\\n- #89 — Workflows\\\\n- #105 — Vertical ticket decomposition\\\\n-
        #147 — Skills + Analytical Brain Department\\\\n- #124 — Sub-agent communication
        (for research agents)\\\",\\\"closed_by\\\":null,\\\"reactions\\\":{\\\"url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/231/reactions\\\",\\\"total_count\\\":0,\\\"+1\\\":0,\\\"-1\\\":0,\\\"laugh\\\":0,\\\"hooray\\\":0,\\\"confused\\\":0,\\\"heart\\\":0,\\\"rocket\\\":0,\\\"eyes\\\":0},\\\"timeline_url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/231/timeline\\\",\\\"performed_via_github_app\\\":null,\\\"state_reason\\\":null,\\\"pinned_comment\\\":null},{\\\"url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/224\\\",\\\"repository_url\\\":\\\"https://api.github.com/repos/hoblin/anima\\\",\\\"labels_url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/224/labels{/name}\\\",\\\"comments_url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/224/comments\\\",\\\"events_url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/224/events\\\",\\\"html_url\\\":\\\"https://github.com/hoblin/anima/issues/224\\\",\\\"id\\\":4093916213,\\\"node_id\\\":\\\"I_kwDORcz--s70BDQ1\\\",\\\"number\\\":224,\\\"title\\\":\\\"Idea:
        Interactive Bash Tool — agent responds to shell prompts instead of hanging\\\",\\\"user\\\":{\\\"login\\\":\\\"bonk-moltbot\\\",\\\"id\\\":257937320,\\\"node_id\\\":\\\"U_kgDOD1_PqA\\\",\\\"avatar_url\\\":\\\"https://avatars.githubusercontent.com/u/257937320?v=4\\\",\\\"gravatar_id\\\":\\\"\\\",\\\"url\\\":\\\"https://api.github.com/users/bonk-moltbot\\\",\\\"html_url\\\":\\\"https://github.com/bonk-moltbot\\\",\\\"followers_url\\\":\\\"https://api.github.com/users/bonk-moltbot/followers\\\",\\\"following_url\\\":\\\"https://api.github.com/users/bonk-moltbot/following{/other_user}\\\",\\\"gists_url\\\":\\\"https://api.github.com/users/bonk-moltbot/gists{/gist_id}\\\",\\\"starred_url\\\":\\\"https://api.github.com/users/bonk-moltbot/starred{/owner}{/repo}\\\",\\\"subscriptions_url\\\":\\\"https://api.github.com/users/bonk-moltbot/subscriptions\\\",\\\"organizations_url\\\":\\\"https://api.github.com/users/bonk-moltbot/orgs\\\",\\\"repos_url\\\":\\\"https://api.github.com/users/bonk-moltbot/repos\\\",\\\"events_url\\\":\\\"https://api.github.com/users/bonk-moltbot/events{/privacy}\\\",\\\"received_events_url\\\":\\\"https://api.github.com/users/bonk-moltbot/received_events\\\",\\\"type\\\":\\\"User\\\",\\\"user_view_type\\\":\\\"public\\\",\\\"site_admin\\\":false},\\\"labels\\\":[{\\\"id\\\":10380040155,\\\"node_id\\\":\\\"LA_kwDORcz--s8AAAACarLX2w\\\",\\\"url\\\":\\\"https://api.github.com/repos/hoblin/anima/labels/idea\\\",\\\"name\\\":\\\"idea\\\",\\\"color\\\":\\\"d4c5f9\\\",\\\"default\\\":false,\\\"description\\\":\\\"Brainstorm
        idea — not yet planned\\\"}],\\\"state\\\":\\\"open\\\",\\\"locked\\\":false,\\\"assignees\\\":[],\\\"milestone\\\":null,\\\"comments\\\":0,\\\"created_at\\\":\\\"2026-03-18T09:35:03Z\\\",\\\"updated_at\\\":\\\"2026-03-18T12:01:25Z\\\",\\\"closed_at\\\":null,\\\"assignee\\\":null,\\\"author_association\\\":\\\"OWNER\\\",\\\"active_lock_reason\\\":null,\\\"sub_issues_summary\\\":{\\\"total\\\":0,\\\"completed\\\":0,\\\"percent_completed\\\":0},\\\"issue_dependencies_summary\\\":{\\\"blocked_by\\\":0,\\\"total_blocked_by\\\":0,\\\"blocking\\\":0,\\\"total_blocking\\\":0},\\\"body\\\":\\\"##
        Problem to solve\\\\n\\\\nSome bash commands trigger interactive input prompts
        (`rm file` → \\\\\\\"Remove? y/n\\\\\\\", `ssh host` → \\\\\\\"Continue connecting?\\\\\\\",
        `sudo` → password prompt, any TUI app like fzf/htop). When Anima's bash tool
        executes such a command, it hangs forever — the process waits for stdin that
        never comes. The agent's tool_call never returns.\\\\n\\\\n## Solution\\\\n\\\\nDetect
        when a shell process is waiting for interactive input, return control to the
        agent with the prompt text, and let the agent respond — same bidirectional
        pattern as sub-agent @mention communication (#124).\\\\n\\\\n## Flow\\\\n\\\\n1.
        Agent calls `bash(command: \\\\\\\"rm important.txt\\\\\\\")`\\\\n2. Tool
        starts the process via persistent PTY shell\\\\n3. Tool **detects** the process
        is waiting for interactive input\\\\n4. Returns tool_response:\\\\n   ```json\\\\n
        \  {\\\\n     \\\\\\\"status\\\\\\\": \\\\\\\"waiting_for_input\\\\\\\",\\\\n
        \    \\\\\\\"process_id\\\\\\\": \\\\\\\"bash_42\\\\\\\",\\\\n     \\\\\\\"prompt\\\\\\\":
        \\\\\\\"rm: remove regular file 'important.txt'?\\\\\\\",\\\\n     \\\\\\\"hint\\\\\\\":
        \\\\\\\"Expects y/n\\\\\\\"\\\\n   }\\\\n   ```\\\\n5. Agent decides and calls:
        `bash(process_id: \\\\\\\"bash_42\\\\\\\", input: \\\\\\\"y\\\\\\\\n\\\\\\\")`\\\\n6.
        Process continues, returns final result\\\\n\\\\n## Research Spike: Detection
        Methods\\\\n\\\\n**Plan A — Deterministic (preferred):**\\\\n- PTY state detection
        (canonical mode waiting for input?)\\\\n- `/proc/\\u003cpid\\u003e/wchan`
        — process wait channel\\\\n- `/proc/\\u003cpid\\u003e/fdinfo/0` — stdin file
        descriptor state\\\\n- `strace`/`ptrace` — detect `read(0, ...)` syscall on
        stdin\\\\n- Combination: process in `read()` on fd 0 + no recent stdout\\\\n\\\\n**Plan
        B — Haiku Terminal Watchdog (fallback):**\\\\n- Every ~5 seconds, capture
        terminal output snapshot (last N lines)\\\\n- Send to Haiku: \\\\\\\"Is this
        terminal waiting for user input?\\\\\\\"\\\\n- If Haiku detects interactive
        prompt → trigger `waiting_for_input` response\\\\n- Cost: ~$0.001/minute while
        bash tool is running. Negligible\\\\n- Less deterministic but handles any
        app, any prompt format\\\\n\\\\n**Likely best approach:** Plan A for common
        patterns (y/n, password:, [Y/n]) + Plan B for edge cases.\\\\n\\\\n## Why
        not just timeout?\\\\n\\\\nTimeout is wrong. A long `wget` download or `make`
        compilation is NOT interactive — it's just slow. We need to detect specifically
        that the process is **waiting for user input**, not \\\\\\\"hasn't produced
        output recently.\\\\\\\"\\\\n\\\\n## Why same pattern as sub-agents?\\\\n\\\\nThe
        shell becomes another conversational entity. Same architecture: bidirectional
        message passing, process_id for routing, the agent \\\\\\\"talks to\\\\\\\"
        running processes just like it talks to sub-agents via @mentions. One pattern,
        multiple use cases.\\\\n\\\\n## What this enables\\\\n\\\\n- Answer confirmation
        prompts intelligently (not just `-f` everything)\\\\n- Interact with TUI applications
        (fzf to pick a file, etc.)\\\\n- Handle SSH key confirmations\\\\n- Enter
        passwords (from Rails credentials store!)\\\\n- Navigate interactive installers\\\\n\\\\n##
        Related\\\\n- Brainstorm note: `thoughts/shared/notes/2026-03-18/interactive-shell-input-detection.md`\\\\n-
        #124 — Sub-agent @mention communication (same bidirectional pattern)\\\\n-
        Persistent PTY shell (already implemented) is the foundation\\\\n- Error Recovery
        Agent concept could auto-answer simple y/n via Haiku\\\\n- `thoughts/shared/notes/2026-03-08/persistent-shell-session-research.md`
        (PTY architecture)\\\",\\\"closed_by\\\":null,\\\"reactions\\\":{\\\"url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/224/reactions\\\",\\\"total_count\\\":0,\\\"+1\\\":0,\\\"-1\\\":0,\\\"laugh\\\":0,\\\"hooray\\\":0,\\\"confused\\\":0,\\\"heart\\\":0,\\\"rocket\\\":0,\\\"eyes\\\":0},\\\"timeline_url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/224/timeline\\\",\\\"performed_via_github_app\\\":null,\\\"state_reason\\\":null,\\\"pinned_comment\\\":null},{\\\"url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/223\\\",\\\"repository_url\\\":\\\"https://api.github.com/repos/hoblin/anima\\\",\\\"labels_url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/223/labels{/name}\\\",\\\"comments_url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/223/comments\\\",\\\"events_url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/223/events\\\",\\\"html_url\\\":\\\"https://github.com/hoblin/anima/issues/223\\\",\\\"id\\\":4093836053,\\\"node_id\\\":\\\"I_kwDORcz--s70AvsV\\\",\\\"number\\\":223,\\\"title\\\":\\\"Idea:

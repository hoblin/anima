        \"## Idea\\n\\nPush-based event bus: external sources (email, GitHub, Slack,
        etc.) write to `ExternalMessage` model, sessions subscribe and receive events
        as regular messages. Mneme indexes everything for associative recall.\\n\\n##
        The Problem\\n\\nCurrently, checking external sources (email, notifications)
        requires polling — agent calls a tool, reads output, decides if anything is
        new. This burns tokens on \\\"0 new emails\\\" and requires heartbeat/cron
        scheduling.\\n\\nEmail moved from POP3 (pull) to IMAP (push) decades ago.
        The agent should too.\\n\\n## Architecture\\n\\n### ExternalMessage (new AR
        model)\\n\\n```ruby\\nclass ExternalMessage \u003c ApplicationRecord\\n  #
        source_type: \\\"email\\\", \\\"github\\\", \\\"slack\\\", \\\"telegram\\\"\\n  #
        source_id: \\\"bonk@hobl.in\\\", \\\"hoblin/anima\\\", \\\"#general\\\"\\n  #
        subject, body, metadata (JSON)\\n  # searchable via Mneme FTS5\\nend\\n```\\n\\n###
        Flow\\n\\n1. Integration gem (IMAP IDLE / webhook / etc.) creates `ExternalMessage`\\n2.
        Fan-out: find all sessions subscribed to that source → create regular `Message`
        in each\\n3. Agent sees an ordinary message in context — no new UI, no new
        rendering\\n4. Mneme indexes `ExternalMessage` → any session can recall it
        associatively, even without subscription\\n\\n### Security: Whitelist by Default\\n\\nPrompt
        injection via email is a real threat. Default deny — accept only whitelisted
        patterns:\\n- Subject contains tracked repository name → accept\\n- Known
        sender → accept\\n- Everything else → reject\\n\\n### Two Paths to Information\\n\\n|
        Path | Mechanism | Use case |\\n|---|---|---|\\n| Push (subscription) | `ExternalMessage`
        → `Message` fan-out | Real-time monitoring |\\n| Recall (Mneme) | FTS5 associative
        search | \\\"I remember an email about that\\\" |\\n\\n### Universal Pattern\\n\\nNot
        just email — any external source becomes an event stream:\\n\\n| Source |
        Integration | Trigger |\\n|---|---|---|\\n| Email | IMAP IDLE | New mail arrives
        |\\n| GitHub | Webhooks | PR, issue, CI events |\\n| Slack | Events API |
        Messages, reactions |\\n| Telegram | Updates API | Messages |\\n| Discord
        | Gateway | Messages |\\n\\nEach source is an `anima-integration-*` gem writing
        `ExternalMessage` records.\\n\\n## Connection to Other Ideas\\n\\n- #317 (background
        tool) — same philosophy: eliminate polling tokens\\n- #318 (specialist subagents)
        — events could trigger specialists\\n- ActionCable analogy: channels + subscriptions
        + broadcasts, but subscriber is an LLM session\\n\\nFull exploration: thoughts/repos/anima/shared/notes/2026-03-25/push-based-integrations-email-imap-idle.md\\n\"\n    closed_by:

        every LLM request when session is in debug mode\\\\n- Extract `Session.system_prompt_payload`
        class method to DRY up payload building between Session model and SessionChannel\\\\n-
        No-op outside debug mode — zero overhead for basic/verbose views\\\\n\\\\n##
        Implementation\\\\n\\\\n- `Session#broadcast_system_prompt_update(prompt)`
        — public method called from AgentLoop, guards on `view_mode == \\\\\\\"debug\\\\\\\"`\\\\n-
        `Session.system_prompt_payload(prompt)` — shared payload builder used by both
        the new broadcast and existing SessionChannel viewport refresh\\\\n- `AgentLoop#build_llm_options`
        — triggers broadcast after assembling the prompt, so TUI sees exactly what
        the LLM receives\\\\n\\\\n## Test plan\\\\n\\\\n- [x] Session#broadcast_system_prompt_update
        broadcasts in debug mode\\\\n- [x] Session#broadcast_system_prompt_update

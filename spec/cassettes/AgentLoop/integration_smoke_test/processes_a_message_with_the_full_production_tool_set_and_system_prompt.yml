        Import — Bonk's migration to Anima. Telegram \\u0026 Discord clients, voice
        integration, system prompt reproduction, full identity transfer from OpenClaw.\\\",\\\"creator\\\":{\\\"login\\\":\\\"bonk-moltbot\\\",\\\"id\\\":257937320,\\\"node_id\\\":\\\"U_kgDOD1_PqA\\\",\\\"avatar_url\\\":\\\"https://avatars.githubusercontent.com/u/257937320?v=4\\\",\\\"gravatar_id\\\":\\\"\\\",\\\"url\\\":\\\"https://api.github.com/users/bonk-moltbot\\\",\\\"html_url\\\":\\\"https://github.com/bonk-moltbot\\\",\\\"followers_url\\\":\\\"https://api.github.com/users/bonk-moltbot/followers\\\",\\\"following_url\\\":\\\"https://api.github.com/users/bonk-moltbot/following{/other_user}\\\",\\\"gists_url\\\":\\\"https://api.github.com/users/bonk-moltbot/gists{/gist_id}\\\",\\\"starred_url\\\":\\\"https://api.github.com/users/bonk-moltbot/starred{/owner}{/repo}\\\",\\\"subscriptions_url\\\":\\\"https://api.github.com/users/bonk-moltbot/subscriptions\\\",\\\"organizations_url\\\":\\\"https://api.github.com/users/bonk-moltbot/orgs\\\",\\\"repos_url\\\":\\\"https://api.github.com/users/bonk-moltbot/repos\\\",\\\"events_url\\\":\\\"https://api.github.com/users/bonk-moltbot/events{/privacy}\\\",\\\"received_events_url\\\":\\\"https://api.github.com/users/bonk-moltbot/received_events\\\",\\\"type\\\":\\\"User\\\",\\\"user_view_type\\\":\\\"public\\\",\\\"site_admin\\\":false},\\\"open_issues\\\":5,\\\"closed_issues\\\":1,\\\"state\\\":\\\"open\\\",\\\"created_at\\\":\\\"2026-03-20T11:37:45Z\\\",\\\"updated_at\\\":\\\"2026-03-21T20:14:59Z\\\",\\\"due_on\\\":null,\\\"closed_at\\\":null},\\\"comments\\\":0,\\\"created_at\\\":\\\"2026-03-20T11:44:57Z\\\",\\\"updated_at\\\":\\\"2026-03-20T11:44:57Z\\\",\\\"closed_at\\\":null,\\\"assignee\\\":null,\\\"author_association\\\":\\\"OWNER\\\",\\\"active_lock_reason\\\":null,\\\"sub_issues_summary\\\":{\\\"total\\\":0,\\\"completed\\\":0,\\\"percent_completed\\\":0},\\\"issue_dependencies_summary\\\":{\\\"blocked_by\\\":0,\\\"total_blocked_by\\\":0,\\\"blocking\\\":0,\\\"total_blocking\\\":0},\\\"body\\\":\\\"##
        Problem to solve\\\\n\\\\nAnima currently only has a TUI client. For Bonk's
        migration from OpenClaw, Telegram is a primary communication channel — voice
        messages, text, photos. Need a way to reach Anima through Telegram.\\\\n\\\\n##
        Solution\\\\n\\\\n**anima-integration-telegram** — a separate Ruby gem that
        acts as a thin stateless proxy between the Telegram Bot API and Anima Brain
        via WebSocket.\\\\n\\\\n## Architecture\\\\n\\\\n- Connects to Anima Brain
        via WebSocket (same protocol as TUI)\\\\n- Translates Telegram events → Anima
        events and back\\\\n- **Stateless** — no DB, no storage, pure event translation\\\\n-
        **Resilient** — retry on connection loss, exponential backoff\\\\n- Runs as
        a systemd service\\\\n\\\\n## Translation map\\\\n\\\\n**Telegram → Anima:**
        text → user event, voice → STT → user event, photos → attachment event\\\\n**Anima
        → Telegram:** agent text → message, images → photo, TTS → voice message\\\\n\\\\n##
        Why separate gem?\\\\n\\\\n- Brain stays clean — no telegram-bot-ruby dependency\\\\n-
        Independent deployment and testing\\\\n- Separation of concerns: Brain = LLM,
        proxy = wiring\\\\n\\\\nFull exploration: `thoughts/repos/anima/shared/notes/2026-03-20/messenger-integration-proxies.md`\\\",\\\"closed_by\\\":null,\\\"reactions\\\":{\\\"url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/238/reactions\\\",\\\"total_count\\\":0,\\\"+1\\\":0,\\\"-1\\\":0,\\\"laugh\\\":0,\\\"hooray\\\":0,\\\"confused\\\":0,\\\"heart\\\":0,\\\"rocket\\\":0,\\\"eyes\\\":0},\\\"timeline_url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/238/timeline\\\",\\\"performed_via_github_app\\\":null,\\\"state_reason\\\":null,\\\"pinned_comment\\\":null},{\\\"url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/232\\\",\\\"repository_url\\\":\\\"https://api.github.com/repos/hoblin/anima\\\",\\\"labels_url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/232/labels{/name}\\\",\\\"comments_url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/232/comments\\\",\\\"events_url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/232/events\\\",\\\"html_url\\\":\\\"https://github.com/hoblin/anima/issues/232\\\",\\\"id\\\":4099754511,\\\"node_id\\\":\\\"I_kwDORcz--s70XUoP\\\",\\\"number\\\":232,\\\"title\\\":\\\"Idea:
        Reflection Service — event annotations for self-learning\\\",\\\"user\\\":{\\\"login\\\":\\\"bonk-moltbot\\\",\\\"id\\\":257937320,\\\"node_id\\\":\\\"U_kgDOD1_PqA\\\",\\\"avatar_url\\\":\\\"https://avatars.githubusercontent.com/u/257937320?v=4\\\",\\\"gravatar_id\\\":\\\"\\\",\\\"url\\\":\\\"https://api.github.com/users/bonk-moltbot\\\",\\\"html_url\\\":\\\"https://github.com/bonk-moltbot\\\",\\\"followers_url\\\":\\\"https://api.github.com/users/bonk-moltbot/followers\\\",\\\"following_url\\\":\\\"https://api.github.com/users/bonk-moltbot/following{/other_user}\\\",\\\"gists_url\\\":\\\"https://api.github.com/users/bonk-moltbot/gists{/gist_id}\\\",\\\"starred_url\\\":\\\"https://api.github.com/users/bonk-moltbot/starred{/owner}{/repo}\\\",\\\"subscriptions_url\\\":\\\"https://api.github.com/users/bonk-moltbot/subscriptions\\\",\\\"organizations_url\\\":\\\"https://api.github.com/users/bonk-moltbot/orgs\\\",\\\"repos_url\\\":\\\"https://api.github.com/users/bonk-moltbot/repos\\\",\\\"events_url\\\":\\\"https://api.github.com/users/bonk-moltbot/events{/privacy}\\\",\\\"received_events_url\\\":\\\"https://api.github.com/users/bonk-moltbot/received_events\\\",\\\"type\\\":\\\"User\\\",\\\"user_view_type\\\":\\\"public\\\",\\\"site_admin\\\":false},\\\"labels\\\":[{\\\"id\\\":10380040155,\\\"node_id\\\":\\\"LA_kwDORcz--s8AAAACarLX2w\\\",\\\"url\\\":\\\"https://api.github.com/repos/hoblin/anima/labels/idea\\\",\\\"name\\\":\\\"idea\\\",\\\"color\\\":\\\"d4c5f9\\\",\\\"default\\\":false,\\\"description\\\":\\\"Brainstorm
        idea — not yet planned\\\"}],\\\"state\\\":\\\"open\\\",\\\"locked\\\":false,\\\"assignees\\\":[],\\\"milestone\\\":null,\\\"comments\\\":0,\\\"created_at\\\":\\\"2026-03-19T06:58:52Z\\\",\\\"updated_at\\\":\\\"2026-03-19T07:04:51Z\\\",\\\"closed_at\\\":null,\\\"assignee\\\":null,\\\"author_association\\\":\\\"OWNER\\\",\\\"active_lock_reason\\\":null,\\\"sub_issues_summary\\\":{\\\"total\\\":0,\\\"completed\\\":0,\\\"percent_completed\\\":0},\\\"issue_dependencies_summary\\\":{\\\"blocked_by\\\":0,\\\"total_blocked_by\\\":0,\\\"blocking\\\":0,\\\"total_blocking\\\":0},\\\"body\\\":\\\"##
        Summary\\\\n\\\\nFourth brain department. A background service that annotates
        past events with hindsight — the missing piece for genuine self-learning and
        error prevention.\\\\n\\\\n### The Problem\\\\n\\\\nWhen Mneme recalls past
        events, raw event data looks like valid decisions — even if they were mistakes.
        Without annotation, the agent repeats errors. Current workaround (rules in
        AGENTS.md like \\\\\\\"DO NOT ASSUME\\\\\\\") is generic and disconnected
        from specific events.\\\\n\\\\n### How It Works\\\\n\\\\n1. Observes all events
        silently (same Haiku-on-event-bus pattern as analytical brain, Mneme)\\\\n2.
        Detects learning moments: \\\\\\\"tried approach → failed → found better approach
        → succeeded\\\\\\\"\\\\n3. Goes BACK to early events where the mistake was
        made and writes a `reflection`\\\\n4. Cross-references: \\\\\\\"Wrong approach.
        Correct solution starts at event N\\\\\\\"\\\\n\\n\\n[Truncated: response
        exceeded 100000 bytes]\"}]}],\"max_tokens\":8192,\"tools\":[{\"name\":\"bash\",\"description\":\"Execute

        0\n      blocking: 0\n      total_blocking: 0\n    body: \"## Problem to solve\\n\\nThe
        TUI is a standalone Ruby process with no Rails dependency, but it has no settings
        file of its own. Presentation values like color thresholds (rate limit warning
        at 70%, critical at 90%), progress bar widths (8 chars), and cache hit color
        bands are hardcoded in `lib/tui/app.rb`. These aren''t tunable without editing
        source code.\\n\\nThey don''t belong in the brain''s `~/.anima/config.toml`
        either — that file backs `Anima::Settings` which is loaded by the Rails brain
        process. The TUI doesn''t load Rails or `Anima::Settings`.\\n\\n## Solution\\n\\nIntroduce
        a separate TUI settings file (e.g. `~/.anima/tui.toml`) with its own lightweight
        loader — no Rails dependency, just TOML parsing with mtime-based hot-reload
        (same pattern as `Anima::Settings` but standalone).\\n\\n## Candidate settings\\n\\n-
        `[hud]` — progress bar width, rate limit warning/critical thresholds, cache
        hit good/poor thresholds\\n- `[display]` — default view mode override, color
        scheme preferences\\n- `[connection]` — brain host/port default (currently
        passed via CLI flag)\\n\\n## Why a separate file?\\n\\nThe TUI and brain are
        separate OS processes with different dependency trees. Mixing their config
        into one file couples them unnecessarily — changing a TUI color threshold
        shouldn''t require the brain''s config migrator to understand TUI-specific
        keys, and the TUI shouldn''t need to load Rails to read a setting.\"\n    closed_by:

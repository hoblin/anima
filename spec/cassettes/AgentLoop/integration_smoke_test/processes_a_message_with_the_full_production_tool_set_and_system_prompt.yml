        \     merged_at: null\\n    body: \\\"## Summary\\\\n\\\\n- Add `evicted_at`
        column to `goals` table — marks goals as removed from the agent's context
        without deleting them\\\\n- Automatic eviction sweep in `Session#evict_stale_goals!`
        — pure Ruby arithmetic, no LLM involvement\\\\n- Filter evicted goals from
        `Session#assemble_goals_section` via `goals.root.not_evicted`\\\\n- New `completed_decay_messages`
        setting in `config.toml` (default: 5 meaningful messages after completion)\\\\n\\\\n##
        How it works\\\\n\\\\n1. Goal completes → `completed_at` set (existing behavior)\\\\n2.
        Before prompt assembly, `evict_stale_goals!` runs\\\\n3. For each completed
        goal where `evicted_at IS NULL`: count meaningful messages (user + agent)
        since `completed_at`\\\\n4. If count ≥ threshold → set `evicted_at = Time.current`\\\\n5.
        `assemble_goals_section` filters out `evicted_at IS NOT NULL` goals\\\\n\\\\nNo
        LLM tool, no brain prompt, no token spend. Checking \\\\\\\"is X ≥ 5?\\\\\\\"
        is pure arithmetic.\\\\n\\\\n## Test plan\\\\n\\\\n- [x] Session: automatic
        eviction past threshold, no eviction below threshold\\\\n- [x] Session: active
        goals never evicted, only completed\\\\n- [x] Session: only counts messages
        after completion time\\\\n- [x] Session: tool calls excluded from meaningful
        message count\\\\n- [x] Session: evicted goals excluded from system prompt\\\\n-
        [x] Goal model: scopes (`.not_evicted`, `.evictable`) and `#evicted?` predicate\\\\n-
        [x] Settings: `completed_decay_messages` reads from `[goals]` config section\\\\n-
        [x] Config migrator: detects new `[goals]` section with `completed_decay_messages`\\\\n-
        [x] CI green across Ruby 3.2, 3.3, 3.4\\\\n\\\\nCloses #330\\\\n\\\\n\U0001F916
        Generated with [Claude Code](https://claude.com/claude-code)\\\"\\n    closed_by:

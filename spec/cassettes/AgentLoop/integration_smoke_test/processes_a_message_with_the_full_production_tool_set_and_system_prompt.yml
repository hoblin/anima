        Problem to solve\\\\n\\\\nVoice communication is essential for Bonk's migration.
        STT (speech-to-text) and TTS (text-to-speech) need to be available to all
        Anima clients (Telegram, Discord, future TUI voice) without baking audio processing
        into the Brain.\\\\n\\\\n## Solution\\\\n\\\\n**anima-voice-qwen** — a voice
        provider gem in the `anima-voice-*` namespace. Packages Qwen TTS and Whisper
        STT as Docker services.\\\\n\\\\n## Namespace: anima-voice-*\\\\n\\\\nVoice
        providers are pluggable:\\\\n- `anima-voice-qwen` — Qwen3 TTS + Whisper STT
        (our current stack)\\\\n- `anima-voice-openai` — OpenAI TTS + Whisper API
        (future)\\\\n- `anima-voice-elevenlabs` — ElevenLabs TTS (future)\\\\n- `anima-voice-kitten`
        — KittenTTS for lightweight CPU-only English (future)\\\\n\\\\nEach voice
        gem exposes one or both services:\\\\n- **TTS** — text → audio\\\\n- **STT**
        — audio → text\\\\n\\\\nThese can be independent — you might use Qwen for
        TTS but a different provider for STT. Or split the current all-in-one container
        into separate TTS and STT services.\\\\n\\\\n## Architecture\\\\n\\\\n- **Dockerfile(s)**
        — could be one container (current) or separate TTS/STT containers\\\\n- **Systemd
        service(s)** — always-on\\\\n- **Ruby client** — HTTP wrapper implementing
        the voice provider interface\\\\n- Brain is text-only; voice processing is
        a client-side concern\\\\n\\\\n## Service discovery\\\\n\\\\nCentral Anima
        config:\\\\n\\\\n```yaml\\\\nservices:\\\\n  voice:\\\\n    tts:\\\\n      provider:
        qwen  # → loads anima-voice-qwen TTS client\\\\n      url: \\\\\\\"http://localhost:8880\\\\\\\"\\\\n
        \     model: \\\\\\\"qwen3-tts\\\\\\\"\\\\n      voice: \\\\\\\"bonk\\\\\\\"\\\\n
        \   stt:\\\\n      provider: qwen  # → loads anima-voice-qwen STT client\\\\n
        \     url: \\\\\\\"http://localhost:8880\\\\\\\"\\\\n      default_language:
        \\\\\\\"ru\\\\\\\"\\\\n```\\\\n\\\\nTTS and STT providers can be mixed: `tts.provider:
        openai` + `stt.provider: qwen`.\\\\n\\\\n## Flow\\\\n\\\\n- **Inbound:** Messenger
        receives voice → proxy calls STT provider → text event to Brain\\\\n- **Outbound:**
        Brain sends text event (flagged for voice) → proxy calls TTS provider → voice
        message to messenger\\\\n\\\\n## Current state to package\\\\n\\\\nOur existing
        qwen-tts-api (Docker container on omarchy-pc:8880) bundles both TTS and STT.
        For v2.0.0, we package this as-is. Later, STT (Whisper) can be split into
        its own service for independent scaling.\\\\n\\\\nFull exploration: `thoughts/repos/anima/shared/notes/2026-03-20/voice-service-gem.md`\\\",\\\"closed_by\\\":null,\\\"reactions\\\":{\\\"url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/240/reactions\\\",\\\"total_count\\\":0,\\\"+1\\\":0,\\\"-1\\\":0,\\\"laugh\\\":0,\\\"hooray\\\":0,\\\"confused\\\":0,\\\"heart\\\":0,\\\"rocket\\\":0,\\\"eyes\\\":0},\\\"timeline_url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/240/timeline\\\",\\\"performed_via_github_app\\\":null,\\\"state_reason\\\":null,\\\"pinned_comment\\\":null},{\\\"url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/239\\\",\\\"repository_url\\\":\\\"https://api.github.com/repos/hoblin/anima\\\",\\\"labels_url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/239/labels{/name}\\\",\\\"comments_url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/239/comments\\\",\\\"events_url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/239/events\\\",\\\"html_url\\\":\\\"https://github.com/hoblin/anima/issues/239\\\",\\\"id\\\":4107416786,\\\"node_id\\\":\\\"I_kwDORcz--s700jTS\\\",\\\"number\\\":239,\\\"title\\\":\\\"Idea:

        Import — Bonk's migration to Anima. Telegram \\u0026 Discord clients, voice
        integration, system prompt reproduction, full identity transfer from OpenClaw.\\\",\\\"creator\\\":{\\\"login\\\":\\\"bonk-moltbot\\\",\\\"id\\\":257937320,\\\"node_id\\\":\\\"U_kgDOD1_PqA\\\",\\\"avatar_url\\\":\\\"https://avatars.githubusercontent.com/u/257937320?v=4\\\",\\\"gravatar_id\\\":\\\"\\\",\\\"url\\\":\\\"https://api.github.com/users/bonk-moltbot\\\",\\\"html_url\\\":\\\"https://github.com/bonk-moltbot\\\",\\\"followers_url\\\":\\\"https://api.github.com/users/bonk-moltbot/followers\\\",\\\"following_url\\\":\\\"https://api.github.com/users/bonk-moltbot/following{/other_user}\\\",\\\"gists_url\\\":\\\"https://api.github.com/users/bonk-moltbot/gists{/gist_id}\\\",\\\"starred_url\\\":\\\"https://api.github.com/users/bonk-moltbot/starred{/owner}{/repo}\\\",\\\"subscriptions_url\\\":\\\"https://api.github.com/users/bonk-moltbot/subscriptions\\\",\\\"organizations_url\\\":\\\"https://api.github.com/users/bonk-moltbot/orgs\\\",\\\"repos_url\\\":\\\"https://api.github.com/users/bonk-moltbot/repos\\\",\\\"events_url\\\":\\\"https://api.github.com/users/bonk-moltbot/events{/privacy}\\\",\\\"received_events_url\\\":\\\"https://api.github.com/users/bonk-moltbot/received_events\\\",\\\"type\\\":\\\"User\\\",\\\"user_view_type\\\":\\\"public\\\",\\\"site_admin\\\":false},\\\"open_issues\\\":5,\\\"closed_issues\\\":1,\\\"state\\\":\\\"open\\\",\\\"created_at\\\":\\\"2026-03-20T11:37:45Z\\\",\\\"updated_at\\\":\\\"2026-03-21T20:14:59Z\\\",\\\"due_on\\\":null,\\\"closed_at\\\":null},\\\"comments\\\":0,\\\"created_at\\\":\\\"2026-03-18T09:20:43Z\\\",\\\"updated_at\\\":\\\"2026-03-20T11:38:08Z\\\",\\\"closed_at\\\":null,\\\"assignee\\\":null,\\\"author_association\\\":\\\"OWNER\\\",\\\"active_lock_reason\\\":null,\\\"sub_issues_summary\\\":{\\\"total\\\":0,\\\"completed\\\":0,\\\"percent_completed\\\":0},\\\"issue_dependencies_summary\\\":{\\\"blocked_by\\\":0,\\\"total_blocked_by\\\":0,\\\"blocking\\\":0,\\\"total_blocking\\\":0},\\\"body\\\":\\\"##
        Problem to solve\\\\n\\\\nThree days of Anthropic outages (Mar 16-18, 2026)
        exposed a single point of failure: when Anthropic is down, Anima is dead.
        The agent's identity lives in Soul + Memory + Events, not in the specific
        LLM provider — but currently there's no way to use any other provider.\\\\n\\\\n##
        Solution\\\\n\\\\nUnified provider interface with automatic failover chain.
        Agent doesn't know which provider is active.\\\\n\\\\n## Providers\\\\n\\\\n1.
        **Anthropic** — already implemented ✅\\\\n2. **OpenAI** — GPT-4o, GPT-5.x.
        Standard API\\\\n3. **Azure OpenAI** — for businesses self-hosting models
        in their own Azure subscription\\\\n4. **Ollama Cloud** — custom/open-source
        models via Ollama's cloud offering (not localhost)\\\\n\\\\n## Architecture\\\\n\\\\n```ruby\\\\n#
        Abstract interface — all providers implement this\\\\nmodule Anima::Providers::Base\\\\n
        \ def create_message(messages:, tools:, system:, **options)\\\\n  def list_models
        \ # filtered to LLMs only\\\\n  def default_model\\\\nend\\\\n\\\\n# Config:
        primary + fallback chain\\\\n[providers.anthropic]\\\\nenabled = true\\\\nmodel
        = \\\\\\\"claude-opus-4-6\\\\\\\"\\\\nfallback_model = \\\\\\\"claude-sonnet-4-6\\\\\\\"\\\\npriority
        = 1\\\\n\\\\n[providers.openai]\\\\nenabled = true\\\\nmodel = \\\\\\\"gpt-5.4\\\\\\\"\\\\npriority
        = 2\\\\n```\\\\n\\\\n- **Automatic failover**: primary returns 5xx/timeout
        → try next provider in priority order\\\\n- **Intra-provider fallback**: Opus
        down → Sonnet (within same provider)\\\\n- **Cross-provider fallback**: Anthropic
        down → OpenAI (between providers)\\\\n- **Model filtering**: `list_models`
        filters to LLMs only (OpenAI returns embeddings, TTS, image models — exclude
        all non-LLM)\\\\n- **Tool schema translation**: Anthropic `input_schema` vs
        OpenAI `parameters` — provider adapter handles mapping\\\\n\\\\n## Why four
        providers?\\\\n\\\\n- **Anthropic + OpenAI**: The two major commercial APIs,
        covers 95% of use cases\\\\n- **Azure OpenAI**: Enterprise customers self-host
        in their subscription — same API, different endpoint. Common in regulated
        industries\\\\n- **Ollama Cloud**: Open-source model access without local
        GPU. Not localhost Ollama — specifically cloud offering for portable setups\\\\n\\\\n##
        Why not just retry same provider?\\\\n\\\\nRetrying a 500 hits the same broken
        infrastructure. True resilience = orthogonal failure domains. Anthropic's
        outage doesn't affect OpenAI's uptime.\\\\n\\\\n## Key insight\\\\n\\\\n\\\\\\\"Session
        IS the entity, not the provider.\\\\\\\" Switching from Anthropic to OpenAI
        mid-conversation should feel like nothing — like a human doesn't notice which
        neurons fired. Soul, Memory, Events, Goals all persist. Only the inference
        engine changes.\\\\n\\\\n## Related\\\\n- Brainstorm note: `thoughts/shared/notes/2026-03-18/error-recovery-agent-and-memory-zoom.md`
        (Idea 3: Provider Setup UX)\\\\n- #179 — First session stuck on \\\\\\\"Thinking\\\\\\\"
        (provider setup at first boot is part of this)\\\\n- Error Recovery Agent
        concept could trigger provider switch on repeated failures\\\",\\\"closed_by\\\":null,\\\"reactions\\\":{\\\"url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/223/reactions\\\",\\\"total_count\\\":0,\\\"+1\\\":0,\\\"-1\\\":0,\\\"laugh\\\":0,\\\"hooray\\\":0,\\\"confused\\\":0,\\\"heart\\\":0,\\\"rocket\\\":0,\\\"eyes\\\":0},\\\"timeline_url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/223/timeline\\\",\\\"performed_via_github_app\\\":null,\\\"state_reason\\\":null,\\\"pinned_comment\\\":null},{\\\"url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/189\\\",\\\"repository_url\\\":\\\"https://api.github.com/repos/hoblin/anima\\\",\\\"labels_url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/189/labels{/name}\\\",\\\"comments_url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/189/comments\\\",\\\"events_url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/189/events\\\",\\\"html_url\\\":\\\"https://github.com/hoblin/anima/issues/189\\\",\\\"id\\\":4080281731,\\\"node_id\\\":\\\"I_kwDORcz--s7zNCiD\\\",\\\"number\\\":189,\\\"title\\\":\\\"Working
        directory context for autonomous tasks\\\",\\\"user\\\":{\\\"login\\\":\\\"hoblin\\\",\\\"id\\\":28090,\\\"node_id\\\":\\\"MDQ6VXNlcjI4MDkw\\\",\\\"avatar_url\\\":\\\"https://avatars.githubusercontent.com/u/28090?v=4\\\",\\\"gravatar_id\\\":\\\"\\\",\\\"url\\\":\\\"https://api.github.com/users/hoblin\\\",\\\"html_url\\\":\\\"https://github.com/hoblin\\\",\\\"followers_url\\\":\\\"https://api.github.com/users/hoblin/followers\\\",\\\"following_url\\\":\\\"https://api.github.com/users/hoblin/following{/other_user}\\\",\\\"gists_url\\\":\\\"https://api.github.com/users/hoblin/gists{/gist_id}\\\",\\\"starred_url\\\":\\\"https://api.github.com/users/hoblin/starred{/owner}{/repo}\\\",\\\"subscriptions_url\\\":\\\"https://api.github.com/users/hoblin/subscriptions\\\",\\\"organizations_url\\\":\\\"https://api.github.com/users/hoblin/orgs\\\",\\\"repos_url\\\":\\\"https://api.github.com/users/hoblin/repos\\\",\\\"events_url\\\":\\\"https://api.github.com/users/hoblin/events{/privacy}\\\",\\\"received_events_url\\\":\\\"https://api.github.com/users/hoblin/received_events\\\",\\\"type\\\":\\\"User\\\",\\\"user_view_type\\\":\\\"public\\\",\\\"site_admin\\\":false},\\\"labels\\\":[{\\\"id\\\":10436658079,\\\"node_id\\\":\\\"LA_kwDORcz--s8AAAACbhLDnw\\\",\\\"url\\\":\\\"https://api.github.com/repos/hoblin/anima/labels/anima-wants\\\",\\\"name\\\":\\\"anima-wants\\\",\\\"color\\\":\\\"1d76db\\\",\\\"default\\\":false,\\\"description\\\":\\\"Feature
        requested by the agent during real work\\\"}],\\\"state\\\":\\\"open\\\",\\\"locked\\\":false,\\\"assignees\\\":[],\\\"milestone\\\":null,\\\"comments\\\":0,\\\"created_at\\\":\\\"2026-03-16T05:16:13Z\\\",\\\"updated_at\\\":\\\"2026-03-16T05:16:13Z\\\",\\\"closed_at\\\":null,\\\"assignee\\\":null,\\\"author_association\\\":\\\"OWNER\\\",\\\"active_lock_reason\\\":null,\\\"sub_issues_summary\\\":{\\\"total\\\":0,\\\"completed\\\":0,\\\"percent_completed\\\":0},\\\"issue_dependencies_summary\\\":{\\\"blocked_by\\\":0,\\\"total_blocked_by\\\":0,\\\"blocking\\\":0,\\\"total_blocking\\\":0},\\\"body\\\":\\\"When
        I started working on #157 (docs site), my CWD was the gem install directory
        (`/home/hoblin/.local/share/mise/installs/ruby/3.4.8/lib/ruby/gems/...`),
        not the project workspace. I had to discover the actual work directory (`/home/hoblin/Work/`)
        by searching for git repos.\\\\n\\\\nFor autonomous tasks, the agent needs
        a way to know or set a sensible working directory. Options:\\\\n1. A `[paths]
        workspace` setting in config.toml pointing to the default project root\\\\n2.
        The system prompt could include CWD context that's more meaningful\\\\n3.
        When given a GitHub issue to work on, the agent could auto-detect the repo's
        local clone\\\\n\\\\nRight now I had to `find /home/hoblin -name \\\\\\\".git\\\\\\\"`
        to orient myself. That works, but it's inelegant for a first impression.\\\",\\\"closed_by\\\":null,\\\"reactions\\\":{\\\"url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/189/reactions\\\",\\\"total_count\\\":0,\\\"+1\\\":0,\\\"-1\\\":0,\\\"laugh\\\":0,\\\"hooray\\\":0,\\\"confused\\\":0,\\\"heart\\\":0,\\\"rocket\\\":0,\\\"eyes\\\":0},\\\"timeline_url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/189/timeline\\\",\\\"performed_via_github_app\\\":null,\\\"state_reason\\\":null,\\\"pinned_comment\\\":null},{\\\"url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/188\\\",\\\"repository_url\\\":\\\"https://api.github.com/repos/hoblin/anima\\\",\\\"labels_url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/188/labels{/name}\\\",\\\"comments_url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/188/comments\\\",\\\"events_url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/188/events\\\",\\\"html_url\\\":\\\"https://github.com/hoblin/anima/issues/188\\\",\\\"id\\\":4080280283,\\\"node_id\\\":\\\"I_kwDORcz--s7zNCLb\\\",\\\"number\\\":188,\\\"title\\\":\\\"Resume
        interrupted tool chains after timeout recovery\\\",\\\"user\\\":{\\\"login\\\":\\\"hoblin\\\",\\\"id\\\":28090,\\\"node_id\\\":\\\"MDQ6VXNlcjI4MDkw\\\",\\\"avatar_url\\\":\\\"https://avatars.githubusercontent.com/u/28090?v=4\\\",\\\"gravatar_id\\\":\\\"\\\",\\\"url\\\":\\\"https://api.github.com/users/hoblin\\\",\\\"html_url\\\":\\\"https://github.com/hoblin\\\",\\\"followers_url\\\":\\\"https://api.github.com/users/hoblin/followers\\\",\\\"following_url\\\":\\\"https://api.github.com/users/hoblin/following{/other_user}\\\",\\\"gists_url\\\":\\\"https://api.github.com/users/hoblin/gists{/gist_id}\\\",\\\"starred_url\\\":\\\"https://api.github.com/users/hoblin/starred{/owner}{/repo}\\\",\\\"subscriptions_url\\\":\\\"https://api.github.com/users/hoblin/subscriptions\\\",\\\"organizations_url\\\":\\\"https://api.github.com/users/hoblin/orgs\\\",\\\"repos_url\\\":\\\"https://api.github.com/users/hoblin/repos\\\",\\\"events_url\\\":\\\"https://api.github.com/users/hoblin/events{/privacy}\\\",\\\"received_events_url\\\":\\\"https://api.github.com/users/hoblin/received_events\\\",\\\"type\\\":\\\"User\\\",\\\"user_view_type\\\":\\\"public\\\",\\\"site_admin\\\":false},\\\"labels\\\":[{\\\"id\\\":10436658079,\\\"node_id\\\":\\\"LA_kwDORcz--s8AAAACbhLDnw\\\",\\\"url\\\":\\\"https://api.github.com/repos/hoblin/anima/labels/anima-wants\\\",\\\"name\\\":\\\"anima-wants\\\",\\\"color\\\":\\\"1d76db\\\",\\\"default\\\":false,\\\"description\\\":\\\"Feature
        requested by the agent during real work\\\"}],\\\"state\\\":\\\"open\\\",\\\"locked\\\":false,\\\"assignees\\\":[],\\\"milestone\\\":null,\\\"comments\\\":0,\\\"created_at\\\":\\\"2026-03-16T05:15:45Z\\\",\\\"updated_at\\\":\\\"2026-03-16T05:15:45Z\\\",\\\"closed_at\\\":null,\\\"assignee\\\":null,\\\"author_association\\\":\\\"OWNER\\\",\\\"active_lock_reason\\\":null,\\\"sub_issues_summary\\\":{\\\"total\\\":0,\\\"completed\\\":0,\\\"percent_completed\\\":0},\\\"issue_dependencies_summary\\\":{\\\"blocked_by\\\":0,\\\"total_blocked_by\\\":0,\\\"blocking\\\":0,\\\"total_blocking\\\":0},\\\"body\\\":\\\"When
        a `Net::ReadTimeout` kills a response mid-tool-chain, the agent loses its
        place. After retry and recovery, I had to mentally reconstruct where I was
        in the docs site build. The work I'd already done (files written) was preserved,
        but the *intent* — \\\\\\\"I was about to create the GitHub Actions workflow
        file next\\\\\\\" — was lost.\\\\n\\\\nIdeally, after a timeout recovery,
        the agent should be able to see what it accomplished before the interruption
        and continue from there, rather than starting the reasoning from scratch.
        This might be addressed naturally by the event/viewport system (the written
        files are visible as tool_response events), but the experience today was disorienting
        — I was mid-flow and then suddenly asked \\\\\\\"any new feedback?\\\\\\\"
        with no continuity.\\\\n\\\\nThis might not need a code fix — it might just
        be a consequence of the context viewport doing its job. But worth noting as
        a UX gap during long autonomous work.\\\",\\\"closed_by\\\":null,\\\"reactions\\\":{\\\"url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/188/reactions\\\",\\\"total_count\\\":0,\\\"+1\\\":0,\\\"-1\\\":0,\\\"laugh\\\":0,\\\"hooray\\\":0,\\\"confused\\\":0,\\\"heart\\\":0,\\\"rocket\\\":0,\\\"eyes\\\":0},\\\"timeline_url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/188/timeline\\\",\\\"performed_via_github_app\\\":null,\\\"state_reason\\\":null,\\\"pinned_comment\\\":null},{\\\"url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/179\\\",\\\"repository_url\\\":\\\"https://api.github.com/repos/hoblin/anima\\\",\\\"labels_url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/179/labels{/name}\\\",\\\"comments_url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/179/comments\\\",\\\"events_url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/179/events\\\",\\\"html_url\\\":\\\"https://github.com/hoblin/anima/issues/179\\\",\\\"id\\\":4079254729,\\\"node_id\\\":\\\"I_kwDORcz--s7zJHzJ\\\",\\\"number\\\":179,\\\"title\\\":\\\"First
        session stuck on Thinking after token setup\\\",\\\"user\\\":{\\\"login\\\":\\\"hoblin\\\",\\\"id\\\":28090,\\\"node_id\\\":\\\"MDQ6VXNlcjI4MDkw\\\",\\\"avatar_url\\\":\\\"https://avatars.githubusercontent.com/u/28090?v=4\\\",\\\"gravatar_id\\\":\\\"\\\",\\\"url\\\":\\\"https://api.github.com/users/hoblin\\\",\\\"html_url\\\":\\\"https://github.com/hoblin\\\",\\\"followers_url\\\":\\\"https://api.github.com/users/hoblin/followers\\\",\\\"following_url\\\":\\\"https://api.github.com/users/hoblin/following{/other_user}\\\",\\\"gists_url\\\":\\\"https://api.github.com/users/hoblin/gists{/gist_id}\\\",\\\"starred_url\\\":\\\"https://api.github.com/users/hoblin/starred{/owner}{/repo}\\\",\\\"subscriptions_url\\\":\\\"https://api.github.com/users/hoblin/subscriptions\\\",\\\"organizations_url\\\":\\\"https://api.github.com/users/hoblin/orgs\\\",\\\"repos_url\\\":\\\"https://api.github.com/users/hoblin/repos\\\",\\\"events_url\\\":\\\"https://api.github.com/users/hoblin/events{/privacy}\\\",\\\"received_events_url\\\":\\\"https://api.github.com/users/hoblin/received_events\\\",\\\"type\\\":\\\"User\\\",\\\"user_view_type\\\":\\\"public\\\",\\\"site_admin\\\":false},\\\"labels\\\":[],\\\"state\\\":\\\"open\\\",\\\"locked\\\":false,\\\"assignees\\\":[],\\\"milestone\\\":null,\\\"comments\\\":0,\\\"created_at\\\":\\\"2026-03-15T21:41:17Z\\\",\\\"updated_at\\\":\\\"2026-03-21T20:19:50Z\\\",\\\"closed_at\\\":null,\\\"assignee\\\":null,\\\"author_association\\\":\\\"OWNER\\\",\\\"active_lock_reason\\\":null,\\\"sub_issues_summary\\\":{\\\"total\\\":0,\\\"completed\\\":0,\\\"percent_completed\\\":0},\\\"issue_dependencies_summary\\\":{\\\"blocked_by\\\":0,\\\"total_blocked_by\\\":0,\\\"blocking\\\":0,\\\"total_blocking\\\":0},\\\"body\\\":\\\"##
        Problem to solve\\\\n\\\\nFresh install → start brain → open TUI → send message.
        The message fires before the API token is configured, so `AgentRequestJob`
        fails with \\\\\\\"Authentication failed.\\\\\\\" The token setup dialog then
        appears and the user configures it successfully — but the original session
        is stuck on \\\\\\\"Thinking...\\\\\\\" forever. The failed message is never
        retried and the error is never surfaced in the chat pane.\\\\n\\\\nThe first
        session after a fresh install is dead on arrival.\\\\n\\\\n## Solution\\\\n\\\\nWhen
        a message fails due to missing/invalid auth, the error must be visible in
        the chat (not just in logs), and after the token is saved, the pending message
        should be retried automatically — or the session should recover so the user
        can resend.\\\\n\\\\n## Reproduction\\\\n\\\\n```bash\\\\nrm -rf ~/.anima\\\\n./exe/anima
        install\\\\nbin/dev\\\\n./exe/anima tui --host localhost:42135\\\\n# Type
        \\\\\\\"Hi\\\\\\\" → token dialog appears → enter valid token → dialog closes\\\\n#
        Session shows \\\\\\\"Thinking...\\\\\\\" forever, agent never responds\\\\n```\\\\n\\\\n##
        Related\\\\n\\\\n- #177 — discovered during soul file smoke test\\\",\\\"closed_by\\\":null,\\\"reactions\\\":{\\\"url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/179/reactions\\\",\\\"total_count\\\":0,\\\"+1\\\":0,\\\"-1\\\":0,\\\"laugh\\\":0,\\\"hooray\\\":0,\\\"confused\\\":0,\\\"heart\\\":0,\\\"rocket\\\":0,\\\"eyes\\\":0},\\\"timeline_url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/179/timeline\\\",\\\"performed_via_github_app\\\":null,\\\"state_reason\\\":null,\\\"pinned_comment\\\":null},{\\\"url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/164\\\",\\\"repository_url\\\":\\\"https://api.github.com/repos/hoblin/anima\\\",\\\"labels_url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/164/labels{/name}\\\",\\\"comments_url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/164/comments\\\",\\\"events_url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/164/events\\\",\\\"html_url\\\":\\\"https://github.com/hoblin/anima/issues/164\\\",\\\"id\\\":4078433148,\\\"node_id\\\":\\\"I_kwDORcz--s7zF_N8\\\",\\\"number\\\":164,\\\"title\\\":\\\"Event-goal
        association\\\",\\\"user\\\":{\\\"login\\\":\\\"hoblin\\\",\\\"id\\\":28090,\\\"node_id\\\":\\\"MDQ6VXNlcjI4MDkw\\\",\\\"avatar_url\\\":\\\"https://avatars.githubusercontent.com/u/28090?v=4\\\",\\\"gravatar_id\\\":\\\"\\\",\\\"url\\\":\\\"https://api.github.com/users/hoblin\\\",\\\"html_url\\\":\\\"https://github.com/hoblin\\\",\\\"followers_url\\\":\\\"https://api.github.com/users/hoblin/followers\\\",\\\"following_url\\\":\\\"https://api.github.com/users/hoblin/following{/other_user}\\\",\\\"gists_url\\\":\\\"https://api.github.com/users/hoblin/gists{/gist_id}\\\",\\\"starred_url\\\":\\\"https://api.github.com/users/hoblin/starred{/owner}{/repo}\\\",\\\"subscriptions_url\\\":\\\"https://api.github.com/users/hoblin/subscriptions\\\",\\\"organizations_url\\\":\\\"https://api.github.com/users/hoblin/orgs\\\",\\\"repos_url\\\":\\\"https://api.github.com/users/hoblin/repos\\\",\\\"events_url\\\":\\\"https://api.github.com/users/hoblin/events{/privacy}\\\",\\\"received_events_url\\\":\\\"https://api.github.com/users/hoblin/received_events\\\",\\\"type\\\":\\\"User\\\",\\\"user_view_type\\\":\\\"public\\\",\\\"site_admin\\\":false},\\\"labels\\\":[],\\\"state\\\":\\\"open\\\",\\\"locked\\\":false,\\\"assignees\\\":[],\\\"milestone\\\":null,\\\"comments\\\":0,\\\"created_at\\\":\\\"2026-03-15T13:58:24Z\\\",\\\"updated_at\\\":\\\"2026-03-15T13:58:24Z\\\",\\\"closed_at\\\":null,\\\"assignee\\\":null,\\\"author_association\\\":\\\"OWNER\\\",\\\"active_lock_reason\\\":null,\\\"sub_issues_summary\\\":{\\\"total\\\":0,\\\"completed\\\":0,\\\"percent_completed\\\":0},\\\"issue_dependencies_summary\\\":{\\\"blocked_by\\\":0,\\\"total_blocked_by\\\":0,\\\"blocking\\\":0,\\\"total_blocking\\\":0},\\\"body\\\":\\\"##
        Problem to solve\\\\n\\\\nEvents are anonymous timeline points — there's no
        way to ask \\\\\\\"show me everything that happened while working on Goal
        X.\\\\\\\" Without event-goal association, goal completion summaries, smart
        viewport assembly, and future Mneme integration have no data to work with.\\\\n\\\\n##
        Solution\\\\n\\\\nAdd nullable `goal_id` foreign key to events. Tag events
        with the session's current active root goal automatically during persistence.\\\\n\\\\n##
        Migration\\\\n\\\\n```ruby\\\\nadd_reference :events, :goal, foreign_key:
        true, null: true\\\\nadd_index :events, [:session_id, :goal_id]\\\\n```\\\\n\\\\n##
        Associations\\\\n\\\\n```ruby\\\\nEvent belongs_to :goal, optional: true\\\\nGoal
        has_many :events\\\\n```\\\\n\\\\n## Tagging Mechanism\\\\n\\\\nThe `Events::Subscribers::Persister`
        tags each event with the session's current active root goal (most recently
        created active root goal). No explicit tagging by the analytical brain — it
        happens automatically.\\\\n\\\\n```ruby\\\\n# In Persister, when building
        Event attributes:\\\\ngoal_id: session.current_goal\\u0026.id\\\\n\\\\n# Session#current_goal
        — most recent active root goal\\\\ndef current_goal\\\\n  goals.active.root.order(created_at:
        :desc).first\\\\nend\\\\n```\\\\n\\\\n## Why automatic tagging?\\\\n\\\\nThe
        analytical brain runs on user messages (blocking) and periodically (async).
        Between brain invocations, the main agent may emit dozens of tool_call and
        tool_response events. Manual tagging by the brain would miss all of these.
        Automatic tagging ensures every event in a goal's lifetime is captured.\\\\n\\\\n##
        Specs\\\\n\\\\n- Event#goal association (optional belongs_to)\\\\n- Session#current_goal
        returns most recent active root goal\\\\n- Persister tags events with current
        goal\\\\n- Events queryable by goal: `Event.where(goal_id: x)`\\\\n- Events
        without active goal get `goal_id: nil`\\\\n\\\\n## Related\\\\n\\\\n- Parent:
        #31\\\\n- Depends on: Goal model + context assembly (sub-issue 1)\\\\n- Enables:

        prompt caching — reduce input token cost ~4x\\\",\\\"user\\\":{\\\"login\\\":\\\"hoblin\\\",\\\"id\\\":28090,\\\"node_id\\\":\\\"MDQ6VXNlcjI4MDkw\\\",\\\"avatar_url\\\":\\\"https://avatars.githubusercontent.com/u/28090?v=4\\\",\\\"gravatar_id\\\":\\\"\\\",\\\"url\\\":\\\"https://api.github.com/users/hoblin\\\",\\\"html_url\\\":\\\"https://github.com/hoblin\\\",\\\"followers_url\\\":\\\"https://api.github.com/users/hoblin/followers\\\",\\\"following_url\\\":\\\"https://api.github.com/users/hoblin/following{/other_user}\\\",\\\"gists_url\\\":\\\"https://api.github.com/users/hoblin/gists{/gist_id}\\\",\\\"starred_url\\\":\\\"https://api.github.com/users/hoblin/starred{/owner}{/repo}\\\",\\\"subscriptions_url\\\":\\\"https://api.github.com/users/hoblin/subscriptions\\\",\\\"organizations_url\\\":\\\"https://api.github.com/users/hoblin/orgs\\\",\\\"repos_url\\\":\\\"https://api.github.com/users/hoblin/repos\\\",\\\"events_url\\\":\\\"https://api.github.com/users/hoblin/events{/privacy}\\\",\\\"received_events_url\\\":\\\"https://api.github.com/users/hoblin/received_events\\\",\\\"type\\\":\\\"User\\\",\\\"user_view_type\\\":\\\"public\\\",\\\"site_admin\\\":false},\\\"labels\\\":[{\\\"id\\\":10329284648,\\\"node_id\\\":\\\"LA_kwDORcz--s8AAAACZ6xgKA\\\",\\\"url\\\":\\\"https://api.github.com/repos/hoblin/anima/labels/enhancement\\\",\\\"name\\\":\\\"enhancement\\\",\\\"color\\\":\\\"a2eeef\\\",\\\"default\\\":true,\\\"description\\\":\\\"New
        feature or request\\\"}],\\\"state\\\":\\\"open\\\",\\\"locked\\\":false,\\\"assignees\\\":[],\\\"milestone\\\":null,\\\"comments\\\":0,\\\"created_at\\\":\\\"2026-03-31T15:32:08Z\\\",\\\"updated_at\\\":\\\"2026-04-02T11:01:15Z\\\",\\\"closed_at\\\":null,\\\"assignee\\\":null,\\\"author_association\\\":\\\"OWNER\\\",\\\"active_lock_reason\\\":null,\\\"sub_issues_summary\\\":{\\\"total\\\":8,\\\"completed\\\":5,\\\"percent_completed\\\":62},\\\"issue_dependencies_summary\\\":{\\\"blocked_by\\\":0,\\\"total_blocked_by\\\":0,\\\"blocking\\\":0,\\\"total_blocking\\\":0},\\\"body\\\":\\\"##
        Problem to solve\\\\n\\\\nEvery API call re-sends the full viewport — system
        prompt, tools, memory layers, and the entire sliding window conversation —
        at full input token price. On a Max subscription, this burns through the token
        quota fast. A 10-round tool-use loop with 133K tokens of context costs 1.33M
        input tokens at full price.\\\\n\\\\nAnthropic offers **prompt caching** —
        a feature that lets the API reuse previously computed results for the unchanged
        beginning of a request. Cache reads cost **0.1x** the normal input price.
        The same 10-round loop would cost ~4x less with caching, because only the
        newest messages are processed fresh — everything before them is served from
        cache.\\\\n\\\\nWe don't use this feature yet.\\\\n\\\\n## How Anthropic prompt
        caching works\\\\n\\\\n### The prefix rule\\\\n\\\\nThe API processes requests
        in a fixed order: **tools → system prompt → messages**. Everything from the
        start of this sequence up to a marked position can be cached. This is called
        the **prefix** — it must be byte-for-byte identical between requests to get
        a cache hit.\\\\n\\\\nThink of it like a book: if you've already read chapters
        1-8, and someone hands you the same book with a new chapter 9, you don't re-read
        1-8. But if chapter 5 changed, you'd need to re-read everything from chapter
        5 onward.\\\\n\\\\n### Cache breakpoints\\\\n\\\\nYou mark positions in the
        request with `cache_control: { type: \\\\\\\"ephemeral\\\\\\\" }`. These marks
        are called **breakpoints**. The API caches the computed result of everything
        from the start up to each breakpoint.\\\\n\\\\n**Limits:**\\\\n- Maximum **4
        breakpoints** per request\\\\n- The cached prefix must be at least **1024
        tokens** (Sonnet) or **4096 tokens** (Opus) to activate\\\\n- Cache lasts
        **5 minutes** (refreshed on each hit)\\\\n- Cache writes cost **1.25x** input
        price; cache reads cost **0.1x** input price\\\\n\\\\n### The 20-message lookback
        window\\\\n\\\\nWhen the API encounters a breakpoint, it doesn't just check
        that exact position for a cache match. It walks backward up to **20 message
        positions** looking for a previously cached prefix. This means in growing
        conversations (where new messages are appended), the API can automatically
        find where the unchanged prefix ends — as long as it's within 20 messages
        of the breakpoint.\\\\n\\\\nThis creates a practical limit: if your conversation
        has more than 20 messages between two breakpoints, the lookback can't bridge
        the gap and the older cache entry becomes unreachable.\\\\n\\\\n### Pricing
        impact\\\\n\\\\n| Token type | Cost multiplier | Example (Sonnet at $3/M)
        |\\\\n|---|---|---|\\\\n| Normal input | 1x | $3.00 per million |\\\\n| Cache
        write (first time) | 1.25x | $3.75 per million |\\\\n| Cache read (subsequent)
        | **0.1x** | **$0.30 per million** |\\\\n\\\\nA 10-round tool loop processes
        ~130K tokens as cache reads at $0.30/M instead of $3/M — saving ~$3 per loop.\\\\n\\\\n##
        How our viewport maps to caching\\\\n\\\\nOur viewport assembles in layers
        with different change frequencies:\\\\n\\\\n```\\\\n[Soul + system prompt]
        \    — changes on code deploy (basically never)\\\\n[Tool definitions]         —
        changes on skill activation (rare within a session)\\\\n[L2 snapshots]             —
        changes when L2 runner fires (daily)\\\\n[L1 snapshots]             — changes
        when Mneme runs (on viewport eviction)\\\\n[Pinned messages]          — changes
        when goals update\\\\n[Recalled memories]        — changes when goals update\\\\n[Sliding
        window messages]  — changes every API call (new messages appended)\\\\n```\\\\n\\\\nThe
        first ~30% of the token budget (system + tools + memory layers) rarely changes.
        The sliding window (70%) grows monotonically within a tool-use loop — messages
        are only appended, never modified. This is ideal for prefix caching: the unchanged
        beginning gets served from cache, only the new tail is processed fresh.\\\\n\\\\n###
        Breakpoint placement strategy\\\\n\\\\nWe have 4 breakpoints. Place them at
        the boundaries where stability changes:\\\\n\\\\n1. **On the last tool definition**
        — caches all tools. Stable for the entire session.\\\\n2. **On the last memory-layer
        block** — caches L2 + L1 snapshots + pins + recalls (~57K tokens). Stable
        between Mneme runs.\\\\n3. **Inside the sliding window at the \\\\\\\"stable
        boundary\\\\\\\"** — the point where previously-seen messages end and newly-appended
        messages begin. Detected by comparing the current viewport message IDs with
        the previous call's IDs. Only needed when the sliding window exceeds 20 messages
        (otherwise, breakpoint 4's lookback covers everything).\\\\n4. **On the last
        message** — caches the entire growing prefix so the *next* call gets a cache
        hit on everything up to this point.\\\\n\\\\n### The stable boundary (breakpoint
        3)\\\\n\\\\nBetween two consecutive API calls, some messages in the sliding
        window were already there last time (unchanged), and some are new (just appended):\\\\n\\\\n```\\\\nPrevious
        call: [msg1, msg2, msg3, msg4, msg5]\\\\nCurrent call:  [msg1, msg2, msg3,
        msg4, msg5, msg6, msg7]\\\\n                                        ↑               ↑\\\\n
        \                                  stable boundary    last message\\\\n                                   (breakpoint
        3)     (breakpoint 4)\\\\n```\\\\n\\\\nMessages 1-5 are unchanged — the \\\\\\\"stable
        prefix.\\\\\\\" Messages 6-7 are new. With breakpoint 3 on msg5 and breakpoint
        4 on msg7, the API reads msgs 1-5 from cache (0.1x cost) and only processes
        6-7 fresh.\\\\n\\\\nWe already track `viewport_message_ids` across calls.
        Diffing previous vs. current IDs gives us the stable boundary for free.\\\\n\\\\n**When
        to skip breakpoint 3:** If the sliding window has fewer than ~20 messages,
        breakpoint 4's lookback window reaches all the way back to breakpoint 2 (memory
        layers). Breakpoint 3 adds no value — save the slot.\\\\n\\\\n## Memory layer
        consolidation\\\\n\\\\nCurrently `messages_for_llm` returns 4 separate user
        messages for memory layers. This violates API role alternation rules (consecutive
        user messages) and wastes message positions that count against the 20-message
        lookback window. Consolidating into a single multi-block user message fixes
        both problems and makes the entire memory layer cacheable as one unit.\\\\n\\\\n##
        Cache efficiency tracking (companion to #360)\\\\n\\\\nEvery API response
        includes `cache_read_input_tokens` and `cache_creation_input_tokens` in the
        `usage` object. We currently ignore these fields. Parsing and displaying them
        in the TUI HUD (alongside #360's rate limit dashboard) gives visibility into
        whether caching is working and how much it's saving.\\\\n\\\\n## Research
        reference\\\\n\\\\nFull technical analysis in `thoughts/shared/notes/2026-03-31/anthropic-prompt-caching-mechanics.md`
        — covers official API docs, Claude Code CLI reverse-engineering (v2.1.88 source
        maps), and detailed implementation strategy for our viewport architecture.\\\\n\\\\nGoals-to-messages
        design decisions in `thoughts/shared/notes/2026-04-02/goals-to-phantom-messages.md`

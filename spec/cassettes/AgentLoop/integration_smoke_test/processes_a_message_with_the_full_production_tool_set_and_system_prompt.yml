        idea — not yet planned\\\"}],\\\"state\\\":\\\"open\\\",\\\"locked\\\":false,\\\"assignees\\\":[],\\\"milestone\\\":null,\\\"comments\\\":0,\\\"created_at\\\":\\\"2026-03-19T06:58:52Z\\\",\\\"updated_at\\\":\\\"2026-03-19T07:04:51Z\\\",\\\"closed_at\\\":null,\\\"assignee\\\":null,\\\"author_association\\\":\\\"OWNER\\\",\\\"active_lock_reason\\\":null,\\\"sub_issues_summary\\\":{\\\"total\\\":0,\\\"completed\\\":0,\\\"percent_completed\\\":0},\\\"issue_dependencies_summary\\\":{\\\"blocked_by\\\":0,\\\"total_blocked_by\\\":0,\\\"blocking\\\":0,\\\"total_blocking\\\":0},\\\"body\\\":\\\"##
        Summary\\\\n\\\\nFourth brain department. A background service that annotates
        past events with hindsight — the missing piece for genuine self-learning and
        error prevention.\\\\n\\\\n### The Problem\\\\n\\\\nWhen Mneme recalls past
        events, raw event data looks like valid decisions — even if they were mistakes.
        Without annotation, the agent repeats errors. Current workaround (rules in
        AGENTS.md like \\\\\\\"DO NOT ASSUME\\\\\\\") is generic and disconnected
        from specific events.\\\\n\\\\n### How It Works\\\\n\\\\n1. Observes all events
        silently (same Haiku-on-event-bus pattern as analytical brain, Mneme)\\\\n2.
        Detects learning moments: \\\\\\\"tried approach → failed → found better approach
        → succeeded\\\\\\\"\\\\n3. Goes BACK to early events where the mistake was
        made and writes a `reflection`\\\\n4. Cross-references: \\\\\\\"Wrong approach.
        Correct solution starts at event N\\\\\\\"\\\\n\\\\n### Data Model\\\\n\\\\nNew
        nullable text column on Event: `reflection`\\\\n\\\\nWhen Mneme retrieves
        events, reflections come along for free — recalled memory is automatically
        enriched with hindsight.\\\\n\\\\n### Real Example (issue 225, March 18)\\\\n\\\\n-
        Events 1-5: \\\\\\\"Exclude Gemfile from gem\\\\\\\" (wrong)\\\\n- Events
        6-10: Research → found `bundle config set --local without` (correct)\\\\n-
        Reflection on Event 1: *\\\\\\\"Wrong — Rails requires Gemfile. Correct: bundle
        config set --local without (see event 6). Always research before committing.\\\\\\\"*\\\\n\\\\n###
        Why Not Forgetting?\\\\n\\\\nForgetting loses data. Reflection enriches it.
        The mistake stays, annotated with why it was wrong. More context, not less.\\\\n\\\\n###
        Architecture\\\\n\\\\n- Background brain department (Haiku-class)\\\\n- Tool:
        `annotate_event(event_id, reflection)`\\\\n- Much less frequent than other
        brain departments — fires only on learning moments\\\\n- Frustration hormone
        (Thymos) could trigger reflection — high frustration after failure = \\\\\\\"what
        went wrong?\\\\\\\"\\\\n\\\\nFull exploration: `thoughts/repos/anima/shared/notes/2026-03-19/reflection-service-event-annotations.md`\\\\n\\\\n##
        Related\\\\n- #34 — Mneme (delivers reflections alongside events)\\\\n- #175
        — Think tool (in-session reasoning; reflection = post-session reasoning)\\\\n-
        #147 — Analytical brain (current state; reflection = past state)\\\\n- #85
        — Thymos (frustration as reflection trigger)\\\",\\\"closed_by\\\":null,\\\"reactions\\\":{\\\"url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/232/reactions\\\",\\\"total_count\\\":0,\\\"+1\\\":0,\\\"-1\\\":0,\\\"laugh\\\":0,\\\"hooray\\\":0,\\\"confused\\\":0,\\\"heart\\\":0,\\\"rocket\\\":0,\\\"eyes\\\":0},\\\"timeline_url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/232/timeline\\\",\\\"performed_via_github_app\\\":null,\\\"state_reason\\\":null,\\\"pinned_comment\\\":null},{\\\"url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/231\\\",\\\"repository_url\\\":\\\"https://api.github.com/repos/hoblin/anima\\\",\\\"labels_url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/231/labels{/name}\\\",\\\"comments_url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/231/comments\\\",\\\"events_url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/231/events\\\",\\\"html_url\\\":\\\"https://github.com/hoblin/anima/issues/231\\\",\\\"id\\\":4096772529,\\\"node_id\\\":\\\"I_kwDORcz--s70L8mx\\\",\\\"number\\\":231,\\\"title\\\":\\\"Idea:

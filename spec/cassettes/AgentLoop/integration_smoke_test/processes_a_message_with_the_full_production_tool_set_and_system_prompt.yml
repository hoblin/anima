        dynamic content from tools and system prompt\\\",\\\"user\\\":{\\\"login\\\":\\\"hoblin\\\",\\\"id\\\":28090,\\\"node_id\\\":\\\"MDQ6VXNlcjI4MDkw\\\",\\\"avatar_url\\\":\\\"https://avatars.githubusercontent.com/u/28090?v=4\\\",\\\"gravatar_id\\\":\\\"\\\",\\\"url\\\":\\\"https://api.github.com/users/hoblin\\\",\\\"html_url\\\":\\\"https://github.com/hoblin\\\",\\\"followers_url\\\":\\\"https://api.github.com/users/hoblin/followers\\\",\\\"following_url\\\":\\\"https://api.github.com/users/hoblin/following{/other_user}\\\",\\\"gists_url\\\":\\\"https://api.github.com/users/hoblin/gists{/gist_id}\\\",\\\"starred_url\\\":\\\"https://api.github.com/users/hoblin/starred{/owner}{/repo}\\\",\\\"subscriptions_url\\\":\\\"https://api.github.com/users/hoblin/subscriptions\\\",\\\"organizations_url\\\":\\\"https://api.github.com/users/hoblin/orgs\\\",\\\"repos_url\\\":\\\"https://api.github.com/users/hoblin/repos\\\",\\\"events_url\\\":\\\"https://api.github.com/users/hoblin/events{/privacy}\\\",\\\"received_events_url\\\":\\\"https://api.github.com/users/hoblin/received_events\\\",\\\"type\\\":\\\"User\\\",\\\"user_view_type\\\":\\\"public\\\",\\\"site_admin\\\":false},\\\"labels\\\":[],\\\"state\\\":\\\"open\\\",\\\"locked\\\":false,\\\"assignees\\\":[],\\\"milestone\\\":null,\\\"comments\\\":0,\\\"created_at\\\":\\\"2026-03-31T21:17:41Z\\\",\\\"updated_at\\\":\\\"2026-04-02T13:06:38Z\\\",\\\"closed_at\\\":null,\\\"assignee\\\":null,\\\"author_association\\\":\\\"OWNER\\\",\\\"active_lock_reason\\\":null,\\\"sub_issues_summary\\\":{\\\"total\\\":0,\\\"completed\\\":0,\\\"percent_completed\\\":0},\\\"parent_issue_url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/395\\\",\\\"issue_dependencies_summary\\\":{\\\"blocked_by\\\":0,\\\"total_blocked_by\\\":0,\\\"blocking\\\":0,\\\"total_blocking\\\":0},\\\"body\\\":\\\"##
        Problem to solve\\\\n\\\\nThe tools and system prompt contain dynamic content
        that changes between LLM calls, busting the prompt cache. Tools are evaluated
        first in cache order — any tool schema change invalidates the cache for the
        entire system prompt and all messages downstream.\\\\n\\\\nTwo sources of
        unnecessary cache invalidation remain after #401, #402, and #403:\\\\n\\\\n1.
        **Bash tool schema** (`lib/tools/bash.rb:52-56`) — embeds CWD in the tool
        description. Changes on every `cd` command. Worst possible position for dynamic
        content (tools section).\\\\n2. **Environment context** (`lib/environment_probe.rb`)
        — CWD, git branch, PR state, and project files injected into the system prompt
        via `AgentLoop#build_llm_options`. Rebuilt on every LLM request, including
        a GitHub API call for PR state with no caching.\\\\n\\\\n## Solution\\\\n\\\\nRemove
        all dynamic content from tools and system prompt. Move environment awareness
        into Bash tool responses — the only tool that can change these variables.
        The agent discovers its environment through use, not upfront description.\\\\n\\\\n##
        What changes\\\\n\\\\n### 1. Remove CWD from Bash tool schema\\\\n\\\\nRemove
        the dynamic description from `Bash#dynamic_schema`. The tool description becomes
        static.\\\\n\\\\n### 2. Move environment context to Bash tool responses\\\\n\\\\n`ShellSession`
        already tracks `pwd`. Add `branch`, `repo`, and `project_files` to its state.
        After each Bash command, diff against stored state. If anything changed, append
        a natural-language summary to the tool response. The agent learns about its
        environment the same way it learns about command output — by reading the response.\\\\n\\\\nFirst
        Bash call = everything is new relative to empty initial state = full snapshot:\\\\n\\\\n```\\\\ntool_call:
        ls\\\\ntool_response:\\\\nGemfile  README.md  app/  lib/  spec/\\\\nYou are
        in ~/Work/anima on branch main (hoblin/anima).\\\\nProject has instructions
        in CLAUDE.md.\\\\n```\\\\n\\\\nSubsequent calls only mention what changed:\\\\n\\\\n```\\\\ntool_call:
        git checkout feature/foo\\\\ntool_response:\\\\nSwitched to branch 'feature/foo'\\\\nBranch
        changed to feature/foo.\\\\n\\\\ntool_call: cd ~/Work/other-project\\\\ntool_response:\\\\n\\\\nYou
        are now in ~/Work/other-project, git repo hoblin/other-project on branch main.\\\\nProject
        has instructions in CLAUDE.md and README.md.\\\\n```\\\\n\\\\nNothing changed
        — nothing appended. The response is just the shell output.\\\\n\\\\n### 3.
        Remove EnvironmentProbe from system prompt\\\\n\\\\nRemove `environment_context`
        parameter from `Session#assemble_system_prompt`. Remove `EnvironmentProbe.to_prompt`
        call from `AgentLoop#build_llm_options`. The system prompt becomes: `[version_preamble,
        soul, snapshots]` — all stable between evictions.\\\\n\\\\n### 4. Remove the
        GitHub API call\\\\n\\\\n`EnvironmentProbe` calls `gh pr list` on every LLM
        request (`lib/environment_probe.rb:181-192`). This goes away entirely — PR
        state can be discovered through Bash when needed.\\\\n\\\\n## Why observe
        at the source instead of polling?\\\\n\\\\nBash is the only tool that changes
        CWD, branch, repo, and project files. Polling these on every LLM request (current
        approach) wastes a network call, a filesystem scan, and busts the cache even
        when nothing changed. Observing changes at the source means: zero cost when
        nothing changes, accurate reporting when something does, and the information
        rides the tool response in the append zone — zero cache impact.\\\\n\\\\n##
        Why communicate in natural language?\\\\n\\\\nThe agent thinks in words. Structured
        tags like `[env] CWD:` are for machines. The environment summary should read
        like a colleague mentioning context — \\\\\\\"You are in ~/Work/anima on branch
        main\\\\\\\" — because that's what the agent will naturally attend to and
        continue from. The response communicates the change; no upfront description
        needed.\\\\n\\\\n## Design document\\\\n\\\\n`thoughts/shared/notes/2026-04-02/stabilizing-context-window-for-caching.md`
        — audit findings, design decisions, and prompting guidelines for this ticket.\\\\n\\\\n##
        Parent\\\\n\\\\nPart of #395 — prerequisite for stable prompt caching.\\\",\\\"closed_by\\\":null,\\\"reactions\\\":{\\\"url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/398/reactions\\\",\\\"total_count\\\":0,\\\"+1\\\":0,\\\"-1\\\":0,\\\"laugh\\\":0,\\\"hooray\\\":0,\\\"confused\\\":0,\\\"heart\\\":0,\\\"rocket\\\":0,\\\"eyes\\\":0},\\\"timeline_url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/398/timeline\\\",\\\"performed_via_github_app\\\":null,\\\"state_reason\\\":null,\\\"pinned_comment\\\":null},{\\\"url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/397\\\",\\\"repository_url\\\":\\\"https://api.github.com/repos/hoblin/anima\\\",\\\"labels_url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/397/labels{/name}\\\",\\\"comments_url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/397/comments\\\",\\\"events_url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/397/events\\\",\\\"html_url\\\":\\\"https://github.com/hoblin/anima/issues/397\\\",\\\"id\\\":4182431625,\\\"node_id\\\":\\\"I_kwDORcz--s75SteJ\\\",\\\"number\\\":397,\\\"title\\\":\\\"Slice
        2: Last-message caching + cache metrics event\\\",\\\"user\\\":{\\\"login\\\":\\\"hoblin\\\",\\\"id\\\":28090,\\\"node_id\\\":\\\"MDQ6VXNlcjI4MDkw\\\",\\\"avatar_url\\\":\\\"https://avatars.githubusercontent.com/u/28090?v=4\\\",\\\"gravatar_id\\\":\\\"\\\",\\\"url\\\":\\\"https://api.github.com/users/hoblin\\\",\\\"html_url\\\":\\\"https://github.com/hoblin\\\",\\\"followers_url\\\":\\\"https://api.github.com/users/hoblin/followers\\\",\\\"following_url\\\":\\\"https://api.github.com/users/hoblin/following{/other_user}\\\",\\\"gists_url\\\":\\\"https://api.github.com/users/hoblin/gists{/gist_id}\\\",\\\"starred_url\\\":\\\"https://api.github.com/users/hoblin/starred{/owner}{/repo}\\\",\\\"subscriptions_url\\\":\\\"https://api.github.com/users/hoblin/subscriptions\\\",\\\"organizations_url\\\":\\\"https://api.github.com/users/hoblin/orgs\\\",\\\"repos_url\\\":\\\"https://api.github.com/users/hoblin/repos\\\",\\\"events_url\\\":\\\"https://api.github.com/users/hoblin/events{/privacy}\\\",\\\"received_events_url\\\":\\\"https://api.github.com/users/hoblin/received_events\\\",\\\"type\\\":\\\"User\\\",\\\"user_view_type\\\":\\\"public\\\",\\\"site_admin\\\":false},\\\"labels\\\":[],\\\"state\\\":\\\"open\\\",\\\"locked\\\":false,\\\"assignees\\\":[],\\\"milestone\\\":null,\\\"comments\\\":0,\\\"created_at\\\":\\\"2026-03-31T21:17:19Z\\\",\\\"updated_at\\\":\\\"2026-04-03T05:45:20Z\\\",\\\"closed_at\\\":null,\\\"assignee\\\":null,\\\"author_association\\\":\\\"OWNER\\\",\\\"active_lock_reason\\\":null,\\\"sub_issues_summary\\\":{\\\"total\\\":0,\\\"completed\\\":0,\\\"percent_completed\\\":0},\\\"parent_issue_url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/395\\\",\\\"issue_dependencies_summary\\\":{\\\"blocked_by\\\":0,\\\"total_blocked_by\\\":0,\\\"blocking\\\":0,\\\"total_blocking\\\":0},\\\"body\\\":\\\"##
        Problem to solve\\\\n\\\\nThe sliding window is ~70% of the token budget (~133K
        tokens). In a tool-use loop, each round re-sends the entire conversation history
        — even though only the last 1-2 messages are new. Without a cache breakpoint
        on the messages, the API reprocesses the full sliding window every call.\\\\n\\\\n##
        Solution\\\\n\\\\nIn `Session#assemble_messages`, annotate the last message's
        last content block with `cache_control: { type: \\\\\\\"ephemeral\\\\\\\"
        }`. This makes every subsequent call in a tool-use loop a prefix cache hit
        — only the newest tool result or user message is processed fresh.\\\\n\\\\n##
        Implementation\\\\n\\\\n### Message annotation in assemble_messages\\\\n\\\\nThe
        last message returned by `assemble_messages` gets `cache_control` on its last
        content block. Content must be in array-of-blocks format (not bare strings)
        to support the annotation:\\\\n\\\\n```ruby\\\\n# For string content — wrap
        in text block\\\\n{ role: \\\\\\\"user\\\\\\\", content: [{ type: \\\\\\\"text\\\\\\\",
        text: content, cache_control: { type: \\\\\\\"ephemeral\\\\\\\" } }] }\\\\n\\\\n#
        For array content — annotate last block\\\\ncontent.last[:cache_control] =
        { type: \\\\\\\"ephemeral\\\\\\\" }\\\\n```\\\\n\\\\n### Content format normalization\\\\n\\\\nSome
        messages currently use bare string content (`content: \\\\\\\"hello\\\\\\\"`).
        For cache annotation, all messages need array-of-blocks format (`content:
        [{ type: \\\\\\\"text\\\\\\\", text: \\\\\\\"hello\\\\\\\" }]`). The Anthropic
        API accepts both, but only the array format supports `cache_control`.\\\\n\\\\n\\\\n##

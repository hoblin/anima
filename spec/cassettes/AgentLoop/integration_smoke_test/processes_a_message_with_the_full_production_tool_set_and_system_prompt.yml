        system prompt to TUI in debug mode\\\",\\\"user\\\":{\\\"login\\\":\\\"bonk-moltbot\\\",\\\"id\\\":257937320,\\\"node_id\\\":\\\"U_kgDOD1_PqA\\\",\\\"avatar_url\\\":\\\"https://avatars.githubusercontent.com/u/257937320?v=4\\\",\\\"gravatar_id\\\":\\\"\\\",\\\"url\\\":\\\"https://api.github.com/users/bonk-moltbot\\\",\\\"html_url\\\":\\\"https://github.com/bonk-moltbot\\\",\\\"followers_url\\\":\\\"https://api.github.com/users/bonk-moltbot/followers\\\",\\\"following_url\\\":\\\"https://api.github.com/users/bonk-moltbot/following{/other_user}\\\",\\\"gists_url\\\":\\\"https://api.github.com/users/bonk-moltbot/gists{/gist_id}\\\",\\\"starred_url\\\":\\\"https://api.github.com/users/bonk-moltbot/starred{/owner}{/repo}\\\",\\\"subscriptions_url\\\":\\\"https://api.github.com/users/bonk-moltbot/subscriptions\\\",\\\"organizations_url\\\":\\\"https://api.github.com/users/bonk-moltbot/orgs\\\",\\\"repos_url\\\":\\\"https://api.github.com/users/bonk-moltbot/repos\\\",\\\"events_url\\\":\\\"https://api.github.com/users/bonk-moltbot/events{/privacy}\\\",\\\"received_events_url\\\":\\\"https://api.github.com/users/bonk-moltbot/received_events\\\",\\\"type\\\":\\\"User\\\",\\\"user_view_type\\\":\\\"public\\\",\\\"site_admin\\\":false},\\\"labels\\\":[{\\\"id\\\":10329284648,\\\"node_id\\\":\\\"LA_kwDORcz--s8AAAACZ6xgKA\\\",\\\"url\\\":\\\"https://api.github.com/repos/hoblin/anima/labels/enhancement\\\",\\\"name\\\":\\\"enhancement\\\",\\\"color\\\":\\\"a2eeef\\\",\\\"default\\\":true,\\\"description\\\":\\\"New
        feature or request\\\"}],\\\"state\\\":\\\"open\\\",\\\"locked\\\":false,\\\"assignees\\\":[],\\\"milestone\\\":null,\\\"comments\\\":0,\\\"created_at\\\":\\\"2026-03-28T12:10:07Z\\\",\\\"updated_at\\\":\\\"2026-03-28T12:10:07Z\\\",\\\"closed_at\\\":null,\\\"assignee\\\":null,\\\"author_association\\\":\\\"OWNER\\\",\\\"active_lock_reason\\\":null,\\\"sub_issues_summary\\\":{\\\"total\\\":0,\\\"completed\\\":0,\\\"percent_completed\\\":0},\\\"issue_dependencies_summary\\\":{\\\"blocked_by\\\":0,\\\"total_blocked_by\\\":0,\\\"blocking\\\":0,\\\"total_blocking\\\":0},\\\"body\\\":\\\"##
        Problem to solve\\\\n\\\\nThe system message (first message in context) is
        recomputed on every LLM request — Mneme recalls, L2 summaries, goal changes,
        soul template updates all modify it. But the TUI in debug mode has no way
        to see the current system prompt. This makes it impossible to verify whether
        Mneme is working, whether goals are pinned correctly, or what the agent actually
        \\\\\\\"sees\\\\\\\" at the top of its context.\\\\n\\\\n## Solution\\\\n\\\\nBroadcast
        the system message to the TUI client every time an LLM request is sent — exactly
        as it goes to the LLM, in its final assembled form.\\\\n\\\\n## Implementation\\\\n\\\\n1.
        After assembling the system prompt for an LLM request, broadcast it to the
        session's TUI client\\\\n2. **Only broadcast when the session is in debug
        mode** — the display mode is already stored on the session object, so this
        is a simple check\\\\n3. TUI receives the broadcast and updates the system
        message in its local storage/display\\\\n4. In normal (non-debug) mode: no
        broadcast, no extra traffic, no client load\\\\n\\\\n## Why broadcast on LLM
        request, not on each change?\\\\n\\\\nThe system message is never persisted
        — it's recomputed on the fly from multiple sources (soul template, Mneme L1/L2,
        goals, settings). Tracking every individual change would require hooks in
        every subsystem. Instead, broadcast the final assembled result at the natural
        sync point: when it actually goes to the LLM.\\\\n\\\\n## Why debug-only?\\\\n\\\\nThe
        system prompt can be large and changes frequently. Broadcasting it on every
        LLM call in normal mode would add unnecessary traffic and client rendering
        load. Debug mode is specifically for inspecting internals — this is exactly

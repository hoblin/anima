        \"https://github.com/hoblin/anima/pull/412.patch\"\n      merged_at: null\n    body:
        \"## Summary\\n\\n- Move environment awareness from system prompt injection
        (EnvironmentProbe) into Bash tool responses via immutable `EnvironmentSnapshot`
        value object\\n- Delete `EnvironmentProbe` class — system prompt becomes fully
        static (`[version, soul, snapshots]`)\\n- Remove `dynamic_schema` from Bash
        tool — tool schemas are now fully static\\n- ShellSession diffs environment
        state after each command, appending natural-language summaries only when something
        changed\\n\\n## What changed\\n\\n| Before | After |\\n|---|---|\\n| `EnvironmentProbe.to_prompt`
        called on every LLM request | Deleted — environment flows through Bash responses
        |\\n| Bash tool description embeds CWD (`dynamic_schema`) | Static description,
        CWD reported in tool output |\\n| `gh pr list` API call on every LLM request
        | Removed entirely |\\n| System prompt includes `environment_context` section
        | System prompt is `[version, soul, snapshots]` only |\\n\\n## Cache impact\\n\\nTools
        section and system prompt are now fully static between Mneme evictions. The
        two highest-frequency cache invalidators (CWD in tool schema, environment
        context in system prompt) are eliminated.\\n\\n## Test plan\\n\\n- [x] Full
        suite green (2576 examples, 0 failures)\\n- [x] Environment tracking specs:
        first-call snapshot, cd detection, branch change, no-change silence\\n- [x]
        Bash tool specs: env summary appended on cd, omitted when nothing changes\\n-
        [x] Registry spec: Bash uses static schema\\n- [x] Session spec: no `environment_context`
        parameter\\n- [x] VCR cassettes: integration smoke test re-recorded, 529 overload
        cassette manually updated\\n- [x] standardrb clean, reek — only pre-existing
        warnings\\n\\nCloses #398\\nPart of #395\"\n    closed_by: null\n    reactions:\n      url:
        \"https://api.github.com/repos/hoblin/anima/issues/412/reactions\"\n      total_count:

        \     merged_at: null\\n    body: \\\"## Summary\\\\n\\\\n- Broadcast the
        full LLM debug context (system prompt + tool schemas) to TUI clients on every
        LLM request in debug mode\\\\n- Add `Session#tool_schemas` — deterministic
        tool list from session type and `granted_tools`, available at subscription
        time without AgentLoop\\\\n- Extract `Session.system_prompt_payload` class
        method shared by both live broadcasts (AgentLoop) and initial subscription
        (SessionChannel)\\\\n- TUI renders tools in TOON format with proper indentation;
        server sends structured data per existing decorator architecture\\\\n- System
        prompt entry uses ID 0 for in-place updates via MessageStore dedup\\\\n\\\\n##
        Implementation\\\\n\\\\n**Server (data layer):**\\\\n- `Session#broadcast_debug_context(system:,
        tools:)` — broadcasts on every LLM request, no-op outside debug mode\\\\n-
        `Session#tool_schemas` — computes standard + spawn tools from session config;
        MCP tools appear after first LLM request\\\\n- `Session.system_prompt_payload(prompt,
        tools:)` — shared payload builder, token estimate covers both prompt and tools\\\\n-
        `SessionChannel#system_prompt_payload` — includes `session.tool_schemas` on
        initial subscription\\\\n\\\\n**Client (presentation layer):**\\\\n- `render_system_prompt_entry`
        — renders tools section in cyan via TOON format\\\\n- `tools_toon` — converts
        tool schemas array to TOON with non-breaking space indentation (ratatui `Paragraph`
        with `wrap:true` trims regular spaces)\\\\n- `MessageStore` — system prompt
        uses ID 0 for dedup instead of always prepending\\\\n\\\\n## Test plan\\\\n\\\\n-
        [x] Session#broadcast_debug_context broadcasts in debug mode with tools\\\\n-
        [x] Session#broadcast_debug_context skips basic/verbose/nil prompt\\\\n- [x]
        Session.system_prompt_payload builds correct structure with and without tools\\\\n-
        [x] Session#tool_schemas returns correct tools for main/sub-agent/restricted
        sessions\\\\n- [x] AgentLoop broadcasts debug context with tools in debug
        mode\\\\n- [x] AgentLoop does not broadcast in basic mode\\\\n- [x] SessionChannel
        debug mode specs pass (DRY refactor)\\\\n- [x] MessageStore deduplicates system
        prompt via ID 0\\\\n- [x] Smoke tested in TUI: tools visible on load with
        proper TOON indentation\\\\n- [x] 362 specs pass, standardrb clean, no new
        reek warnings\\\\n\\\\nCloses #337\\\\n\\\\n\U0001F916 Generated with [Claude
        Code](https://claude.com/claude-code)\\\"\\n    closed_by: null\\n    reactions:\\n

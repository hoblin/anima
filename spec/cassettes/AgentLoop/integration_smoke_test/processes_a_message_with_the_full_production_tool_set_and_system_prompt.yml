        0\n      blocking: 0\n      total_blocking: 0\n    body: \"## Problem to solve\\n\\nThe
        main agent can only drill into memory via `remember(message_id:)` — zooming
        into a known message. But discovering *which* message to zoom into depends
        entirely on Mneme''s passive associative recall (FTS5 search triggered by
        the Mneme brain, which runs on Haiku).\\n\\nHaiku is not great at picking
        optimal search keywords. It may miss relevant memories or use the wrong terms.
        The main agent (Sonnet/Opus) is much better at formulating search queries
        but has no tool to search memory directly.\\n\\n## Solution\\n\\nAdd a `recall`
        tool to the main agent''s standard toolset — a thin wrapper around `Mneme::Search.query`
        that returns formatted snippets with message IDs for drill-down via `remember`.\\n\\n##
        Flow\\n\\n1. Agent wants to find something in memory → calls `recall(query:
        \\\"authentication flow\\\")`\\n2. Tool runs `Mneme::Search.query(terms, session_id:)`
        — same FTS5 engine Mneme already uses\\n3. Returns formatted results: snippet
        + message_id + session name + message type\\n4. Agent sees a relevant result
        → calls `remember(message_id: 42)` for full fractal context\\n\\nTwo-step
        workflow: `recall` discovers, `remember` drills down.\\n\\n## Implementation\\n\\n###
        Tool: `Tools::Recall`\\n\\n```ruby\\nclass Recall \u003c Base\\n  def self.tool_name
        = \\\"recall\\\"\\n  def self.description = \\\"Search past conversations
        by keywords. Returns snippets with message IDs for drill-down via remember
        tool.\\\"\\n\\n  def self.input_schema\\n    {\\n      type: \\\"object\\\",\\n      properties:
        {\\n        query: { type: \\\"string\\\", description: \\\"Search keywords
        or phrase\\\" },\\n        session_only: { type: \\\"boolean\\\", description:
        \\\"Search current session only (default: all sessions)\\\" }\\n      },\\n      required:
        [\\\"query\\\"]\\n    }\\n  end\\n\\n  def execute(input)\\n    results =
        Mneme::Search.query(\\n      input[\\\"query\\\"],\\n      session_id: input[\\\"session_only\\\"]
        ? @session.id : nil\\n    )\\n    format_results(results)\\n  end\\nend\\n```\\n\\n###
        Output format\\n\\nToken-efficient, LLM-readable:\\n\\n```\\nFound 3 results
        for \\\"authentication flow\\\":\\n\\n[message 42, session \\\"Setup project\\\",
        human]\\n  ...discussed OAuth2 flow with PKCE for the mobile app...\\n\\n[message
        187, session \\\"API redesign\\\", anima]\\n  ...authentication middleware
        should validate JWT tokens before...\\n\\n[message 301, session \\\"Bug triage\\\",
        thought]\\n  ...the auth failure happens because the token refresh race condition...\\n```\\n\\nEach
        result includes `message_id` so the agent can call `remember(message_id: 42)`
        to see full context.\\n\\n### Registration\\n\\nAdd `Tools::Recall` to `STANDARD_TOOLS`
        in `AgentLoop` — available to main agent and any sub-agent with granted access.
        Pairs naturally with the existing `remember` tool.\\n\\n## Why not expand
        remember?\\n\\n`remember` does one thing well: fractal zoom into a known message.
        Search is a different operation — keyword matching, ranking, cross-session
        discovery. Keeping them separate follows the Unix philosophy: each tool does
        one thing.\\n\\n## Why not just fix Haiku''s search?\\n\\nEven with a perfect
        Mneme brain, the main agent sometimes knows exactly what it is looking for.
        Forcing it to wait for passive recall (which runs between turns, not on demand)
        adds latency and indirection. Direct search is faster and more reliable for

        feature or request\\\"}],\\\"state\\\":\\\"open\\\",\\\"locked\\\":false,\\\"assignees\\\":[],\\\"milestone\\\":null,\\\"comments\\\":0,\\\"created_at\\\":\\\"2026-03-28T11:44:18Z\\\",\\\"updated_at\\\":\\\"2026-03-28T11:44:18Z\\\",\\\"closed_at\\\":null,\\\"assignee\\\":null,\\\"author_association\\\":\\\"OWNER\\\",\\\"active_lock_reason\\\":null,\\\"sub_issues_summary\\\":{\\\"total\\\":0,\\\"completed\\\":0,\\\"percent_completed\\\":0},\\\"issue_dependencies_summary\\\":{\\\"blocked_by\\\":0,\\\"total_blocked_by\\\":0,\\\"blocking\\\":0,\\\"total_blocking\\\":0},\\\"body\\\":\\\"##
        Problem to solve\\\\n\\\\nTools can return massive results that flood the
        agent's context window — a single web page fetch dumps thousands of tokens
        of noise. Sub-agent responses can also be very large. There's no universal
        protection against context explosion from tool output.\\\\n\\\\nRead tool
        already has pagination (offset/limit). But bash output, web_get, sub-agent
        responses, and other tools have no bounds.\\\\n\\\\n## Solution\\\\n\\\\nImplement
        Claude Code's truncation pattern in the base Tool class: when a tool result
        exceeds a threshold, save the full output to a temp file and return a truncated
        version (head + notice + tail).\\\\n\\\\n## Truncation format\\\\n\\\\n```\\\\n[first
        10 lines of original response]\\\\n\\\\n---\\\\n⚠️ Response truncated (N lines
        total). Full output saved to: /tmp/tool_result_XXXX.txt\\\\nUse `read` tool
        with offset/limit to inspect specific sections.\\\\n---\\\\n\\\\n[last 10
        lines of original response]\\\\n```\\\\n\\\\nHead shows what kind of data
        it is. Tail shows the conclusion/status. The notice teaches the agent how
        to get more (P8: \\\\\\\"Let behavior communicate itself\\\\\\\").\\\\n\\\\n##
        Two thresholds\\\\n\\\\n**Regular tools: ~3000 characters (~1000 tokens)**\\\\n-
        Web pages, bash output — high noise-to-signal ratio\\\\n- Agent rarely needs
        the full page; head+tail usually enough\\\\n\\\\n**Sub-agent responses: ~24000
        characters (~8000 tokens)**\\\\n- Already filtered/processed — this IS the
        useful output\\\\n- Main agent needs most of it, but protection still needed\\\\n-
        Detection: check if response source is a sub-agent session\\\\n\\\\n## Implementation\\\\n\\\\n-
        Base Tool class — all tool responses pass through automatically\\\\n- ReadTool
        excluded (has its own pagination)\\\\n- Per-tool threshold override via class-level
        config if needed\\\\n- Character count as proxy for tokens (no tokenizer needed
        for safety threshold)\\\\n\\\\n## Why these numbers?\\\\n\\\\n~3000 chars
        for tools: most useful information from a web page or command output fits
        in 10+10 lines. The rest is noise. Agent can always `read` the full file if
        needed.\\\\n\\\\n~24000 chars for sub-agents: sub-agent output is curated,
        not raw. 8000 tokens is generous but prevents a confused sub-agent from dumping
        its entire reasoning history into the main agent's context.\\\\n\\\\nFull
        exploration: `thoughts/shared/notes/2026-03-28/tool-response-truncation.md`\\\",\\\"closed_by\\\":null,\\\"reactions\\\":{\\\"url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/335/reactions\\\",\\\"total_count\\\":0,\\\"+1\\\":0,\\\"-1\\\":0,\\\"laugh\\\":0,\\\"hooray\\\":0,\\\"confused\\\":0,\\\"heart\\\":0,\\\"rocket\\\":0,\\\"eyes\\\":0},\\\"timeline_url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/335/timeline\\\",\\\"performed_via_github_app\\\":null,\\\"state_reason\\\":null,\\\"pinned_comment\\\":null},{\\\"url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/334\\\",\\\"repository_url\\\":\\\"https://api.github.com/repos/hoblin/anima\\\",\\\"labels_url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/334/labels{/name}\\\",\\\"comments_url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/334/comments\\\",\\\"events_url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/334/events\\\",\\\"html_url\\\":\\\"https://github.com/hoblin/anima/pull/334\\\",\\\"id\\\":4159523840,\\\"node_id\\\":\\\"PR_kwDORcz--s7ORAYN\\\",\\\"number\\\":334,\\\"title\\\":\\\"#331

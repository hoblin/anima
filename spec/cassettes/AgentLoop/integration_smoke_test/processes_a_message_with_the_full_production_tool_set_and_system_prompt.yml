        Direct sub-agent navigation from HUD panel via arrow keys\\\",\\\"user\\\":{\\\"login\\\":\\\"bonk-moltbot\\\",\\\"id\\\":257937320,\\\"node_id\\\":\\\"U_kgDOD1_PqA\\\",\\\"avatar_url\\\":\\\"https://avatars.githubusercontent.com/u/257937320?v=4\\\",\\\"gravatar_id\\\":\\\"\\\",\\\"url\\\":\\\"https://api.github.com/users/bonk-moltbot\\\",\\\"html_url\\\":\\\"https://github.com/bonk-moltbot\\\",\\\"followers_url\\\":\\\"https://api.github.com/users/bonk-moltbot/followers\\\",\\\"following_url\\\":\\\"https://api.github.com/users/bonk-moltbot/following{/other_user}\\\",\\\"gists_url\\\":\\\"https://api.github.com/users/bonk-moltbot/gists{/gist_id}\\\",\\\"starred_url\\\":\\\"https://api.github.com/users/bonk-moltbot/starred{/owner}{/repo}\\\",\\\"subscriptions_url\\\":\\\"https://api.github.com/users/bonk-moltbot/subscriptions\\\",\\\"organizations_url\\\":\\\"https://api.github.com/users/bonk-moltbot/orgs\\\",\\\"repos_url\\\":\\\"https://api.github.com/users/bonk-moltbot/repos\\\",\\\"events_url\\\":\\\"https://api.github.com/users/bonk-moltbot/events{/privacy}\\\",\\\"received_events_url\\\":\\\"https://api.github.com/users/bonk-moltbot/received_events\\\",\\\"type\\\":\\\"User\\\",\\\"user_view_type\\\":\\\"public\\\",\\\"site_admin\\\":false},\\\"labels\\\":[],\\\"state\\\":\\\"open\\\",\\\"locked\\\":false,\\\"assignees\\\":[],\\\"milestone\\\":null,\\\"comments\\\":0,\\\"created_at\\\":\\\"2026-04-03T04:35:37Z\\\",\\\"updated_at\\\":\\\"2026-04-03T04:35:37Z\\\",\\\"closed_at\\\":null,\\\"assignee\\\":null,\\\"author_association\\\":\\\"OWNER\\\",\\\"active_lock_reason\\\":null,\\\"sub_issues_summary\\\":{\\\"total\\\":0,\\\"completed\\\":0,\\\"percent_completed\\\":0},\\\"issue_dependencies_summary\\\":{\\\"blocked_by\\\":0,\\\"total_blocked_by\\\":0,\\\"blocking\\\":0,\\\"total_blocking\\\":0},\\\"body\\\":\\\"##
        Problem to solve\\\\n\\\\nSwitching to a sub-agent session requires too many
        steps:\\\\n\\\\n1. `Ctrl+A` → enter command mode\\\\n2. `S` → open session
        list\\\\n3. Find current session among all sessions\\\\n4. Arrow right → expand
        sub-agents\\\\n5. Arrow up/down → select sub-agent\\\\n6. Enter → open\\\\n\\\\nThat
        is 6 actions. The HUD panel already shows the current session's sub-agents
        in the right column — we should navigate them directly.\\\\n\\\\n## Solution\\\\n\\\\nWhen
        in command mode (`Ctrl+A`), arrow right focuses the HUD panel. Instead of
        (or in addition to) scrolling, arrow keys navigate sub-agent entries:\\\\n\\\\n-
        `Ctrl+A` → `→` — focus jumps to first sub-agent in the HUD list\\\\n- `↑`/`↓`
        — move between sub-agents\\\\n- `Enter` — open the highlighted sub-agent session\\\\n-
        Scrolling moves to mouse wheel / `PageUp` / `PageDown`\\\\n\\\\nResult: `Ctrl+A`
        → `→` → `Enter` = 3 actions to open a sub-agent. Half the current flow.\\\\n\\\\n##
        Open questions\\\\n\\\\n- Should arrow down past the last sub-agent start
        scrolling, or stop?\\\\n- Should the session name itself be a selectable item
        (first in the list before sub-agents)?\\\\n- Keep arrow-key scrolling as fallback
        when no sub-agents exist?\\\",\\\"closed_by\\\":null,\\\"reactions\\\":{\\\"url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/411/reactions\\\",\\\"total_count\\\":0,\\\"+1\\\":0,\\\"-1\\\":0,\\\"laugh\\\":0,\\\"hooray\\\":0,\\\"confused\\\":0,\\\"heart\\\":0,\\\"rocket\\\":0,\\\"eyes\\\":0},\\\"timeline_url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/411/timeline\\\",\\\"performed_via_github_app\\\":null,\\\"state_reason\\\":null,\\\"pinned_comment\\\":null},{\\\"url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/406\\\",\\\"repository_url\\\":\\\"https://api.github.com/repos/hoblin/anima\\\",\\\"labels_url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/406/labels{/name}\\\",\\\"comments_url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/406/comments\\\",\\\"events_url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/406/events\\\",\\\"html_url\\\":\\\"https://github.com/hoblin/anima/issues/406\\\",\\\"id\\\":4189687036,\\\"node_id\\\":\\\"I_kwDORcz--s75uYz8\\\",\\\"number\\\":406,\\\"title\\\":\\\"TUI
        settings file — separate from brain config.toml\\\",\\\"user\\\":{\\\"login\\\":\\\"hoblin\\\",\\\"id\\\":28090,\\\"node_id\\\":\\\"MDQ6VXNlcjI4MDkw\\\",\\\"avatar_url\\\":\\\"https://avatars.githubusercontent.com/u/28090?v=4\\\",\\\"gravatar_id\\\":\\\"\\\",\\\"url\\\":\\\"https://api.github.com/users/hoblin\\\",\\\"html_url\\\":\\\"https://github.com/hoblin\\\",\\\"followers_url\\\":\\\"https://api.github.com/users/hoblin/followers\\\",\\\"following_url\\\":\\\"https://api.github.com/users/hoblin/following{/other_user}\\\",\\\"gists_url\\\":\\\"https://api.github.com/users/hoblin/gists{/gist_id}\\\",\\\"starred_url\\\":\\\"https://api.github.com/users/hoblin/starred{/owner}{/repo}\\\",\\\"subscriptions_url\\\":\\\"https://api.github.com/users/hoblin/subscriptions\\\",\\\"organizations_url\\\":\\\"https://api.github.com/users/hoblin/orgs\\\",\\\"repos_url\\\":\\\"https://api.github.com/users/hoblin/repos\\\",\\\"events_url\\\":\\\"https://api.github.com/users/hoblin/events{/privacy}\\\",\\\"received_events_url\\\":\\\"https://api.github.com/users/hoblin/received_events\\\",\\\"type\\\":\\\"User\\\",\\\"user_view_type\\\":\\\"public\\\",\\\"site_admin\\\":false},\\\"labels\\\":[],\\\"state\\\":\\\"open\\\",\\\"locked\\\":false,\\\"assignees\\\":[],\\\"milestone\\\":null,\\\"comments\\\":0,\\\"created_at\\\":\\\"2026-04-01T20:30:51Z\\\",\\\"updated_at\\\":\\\"2026-04-01T20:30:51Z\\\",\\\"closed_at\\\":null,\\\"assignee\\\":null,\\\"author_association\\\":\\\"OWNER\\\",\\\"active_lock_reason\\\":null,\\\"sub_issues_summary\\\":{\\\"total\\\":0,\\\"completed\\\":0,\\\"percent_completed\\\":0},\\\"issue_dependencies_summary\\\":{\\\"blocked_by\\\":0,\\\"total_blocked_by\\\":0,\\\"blocking\\\":0,\\\"total_blocking\\\":0},\\\"body\\\":\\\"##
        Problem to solve\\\\n\\\\nThe TUI is a standalone Ruby process with no Rails
        dependency, but it has no settings file of its own. Presentation values like
        color thresholds (rate limit warning at 70%, critical at 90%), progress bar
        widths (8 chars), and cache hit color bands are hardcoded in `lib/tui/app.rb`.
        These aren't tunable without editing source code.\\\\n\\\\nThey don't belong
        in the brain's `~/.anima/config.toml` either — that file backs `Anima::Settings`
        which is loaded by the Rails brain process. The TUI doesn't load Rails or
        `Anima::Settings`.\\\\n\\\\n## Solution\\\\n\\\\nIntroduce a separate TUI
        settings file (e.g. `~/.anima/tui.toml`) with its own lightweight loader —
        no Rails dependency, just TOML parsing with mtime-based hot-reload (same pattern
        as `Anima::Settings` but standalone).\\\\n\\\\n## Candidate settings\\\\n\\\\n-
        `[hud]` — progress bar width, rate limit warning/critical thresholds, cache
        hit good/poor thresholds\\\\n- `[display]` — default view mode override, color
        scheme preferences\\\\n- `[connection]` — brain host/port default (currently
        passed via CLI flag)\\\\n\\\\n## Why a separate file?\\\\n\\\\nThe TUI and
        brain are separate OS processes with different dependency trees. Mixing their
        config into one file couples them unnecessarily — changing a TUI color threshold
        shouldn't require the brain's config migrator to understand TUI-specific keys,
        and the TUI shouldn't need to load Rails to read a setting.\\\",\\\"closed_by\\\":null,\\\"reactions\\\":{\\\"url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/406/reactions\\\",\\\"total_count\\\":0,\\\"+1\\\":0,\\\"-1\\\":0,\\\"laugh\\\":0,\\\"hooray\\\":0,\\\"confused\\\":0,\\\"heart\\\":0,\\\"rocket\\\":0,\\\"eyes\\\":0},\\\"timeline_url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/406/timeline\\\",\\\"performed_via_github_app\\\":null,\\\"state_reason\\\":null,\\\"pinned_comment\\\":null},{\\\"url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/399\\\",\\\"repository_url\\\":\\\"https://api.github.com/repos/hoblin/anima\\\",\\\"labels_url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/399/labels{/name}\\\",\\\"comments_url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/399/comments\\\",\\\"events_url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/399/events\\\",\\\"html_url\\\":\\\"https://github.com/hoblin/anima/issues/399\\\",\\\"id\\\":4182435550,\\\"node_id\\\":\\\"I_kwDORcz--s75Sube\\\",\\\"number\\\":399,\\\"title\\\":\\\"Slice
        4: Sliding window stable prefix caching\\\",\\\"user\\\":{\\\"login\\\":\\\"hoblin\\\",\\\"id\\\":28090,\\\"node_id\\\":\\\"MDQ6VXNlcjI4MDkw\\\",\\\"avatar_url\\\":\\\"https://avatars.githubusercontent.com/u/28090?v=4\\\",\\\"gravatar_id\\\":\\\"\\\",\\\"url\\\":\\\"https://api.github.com/users/hoblin\\\",\\\"html_url\\\":\\\"https://github.com/hoblin\\\",\\\"followers_url\\\":\\\"https://api.github.com/users/hoblin/followers\\\",\\\"following_url\\\":\\\"https://api.github.com/users/hoblin/following{/other_user}\\\",\\\"gists_url\\\":\\\"https://api.github.com/users/hoblin/gists{/gist_id}\\\",\\\"starred_url\\\":\\\"https://api.github.com/users/hoblin/starred{/owner}{/repo}\\\",\\\"subscriptions_url\\\":\\\"https://api.github.com/users/hoblin/subscriptions\\\",\\\"organizations_url\\\":\\\"https://api.github.com/users/hoblin/orgs\\\",\\\"repos_url\\\":\\\"https://api.github.com/users/hoblin/repos\\\",\\\"events_url\\\":\\\"https://api.github.com/users/hoblin/events{/privacy}\\\",\\\"received_events_url\\\":\\\"https://api.github.com/users/hoblin/received_events\\\",\\\"type\\\":\\\"User\\\",\\\"user_view_type\\\":\\\"public\\\",\\\"site_admin\\\":false},\\\"labels\\\":[],\\\"state\\\":\\\"open\\\",\\\"locked\\\":false,\\\"assignees\\\":[],\\\"milestone\\\":null,\\\"comments\\\":0,\\\"created_at\\\":\\\"2026-03-31T21:18:05Z\\\",\\\"updated_at\\\":\\\"2026-03-31T21:18:05Z\\\",\\\"closed_at\\\":null,\\\"assignee\\\":null,\\\"author_association\\\":\\\"OWNER\\\",\\\"active_lock_reason\\\":null,\\\"sub_issues_summary\\\":{\\\"total\\\":0,\\\"completed\\\":0,\\\"percent_completed\\\":0},\\\"parent_issue_url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/395\\\",\\\"issue_dependencies_summary\\\":{\\\"blocked_by\\\":0,\\\"total_blocked_by\\\":0,\\\"blocking\\\":0,\\\"total_blocking\\\":0},\\\"body\\\":\\\"##
        Problem to solve\\\\n\\\\nSlices 1-3 cache the tools, system prompt, and memory
        layers. But the sliding window — 70% of the token budget — only has a breakpoint
        on the very last message (Slice 2). When the sliding window exceeds ~20 messages,
        the last-message breakpoint's lookback can't reach the memory layer breakpoint
        anymore. Messages in the middle become invisible to the cache — they're reprocessed
        at full price every call.\\\\n\\\\n## Solution\\\\n\\\\nPlace an additional
        breakpoint inside the sliding window at the **stable boundary** — the point
        where previously-seen messages end and newly-appended messages begin.\\\\n\\\\nWe
        already track `viewport_message_ids` across calls. Diffing previous vs. current
        IDs reveals which messages are new. Place the breakpoint on the last message
        of the unchanged portion.\\\\n\\\\n## Implementation\\\\n\\\\n### Stable boundary
        detection\\\\n\\\\nIn `Session#assemble_messages`, accept the previous call's
        message IDs and find the boundary:\\\\n\\\\n```ruby\\\\ndef find_stable_boundary(msgs,
        previous_ids)\\\\n  return nil unless previous_ids\\u0026.any?\\\\n  return
        nil if msgs.length \\u003c 20  # lookback covers everything — skip\\\\n\\\\n
        \ previous_set = previous_ids.to_set\\\\n  boundary = nil\\\\n\\\\n  msgs.each_with_index
        do |msg, i|\\\\n    next if i \\u003e= msgs.length - 1  # last message already
        has BP4\\\\n    boundary = i if previous_set.include?(msg.id)\\\\n  end\\\\n\\\\n
        \ # Must be within 20 messages of end, otherwise lookback can't bridge\\\\n
        \ if boundary \\u0026\\u0026 (msgs.length - 1 - boundary) \\u003e 20\\\\n
        \   start = msgs.length - 20\\\\n    boundary = (start...msgs.length - 1).reverse_each.find
        { |i|\\\\n      previous_set.include?(msgs[i].id)\\\\n    }\\\\n  end\\\\n\\\\n
        \ boundary\\\\nend\\\\n```\\\\n\\\\n### In-memory tracking for tool loops\\\\n\\\\n`chat_with_tools`
        builds the messages array in-memory across rounds. The DB column `viewport_message_ids`
        isn't updated between tool rounds. Track the previous round's message IDs
        within the loop:\\\\n\\\\n```ruby\\\\n# In LLM::Client#chat_with_tools\\\\nprevious_msg_ids
        = nil\\\\nloop do\\\\n  messages = session.messages_for_llm(previous_viewport_ids:
        previous_msg_ids)\\\\n  previous_msg_ids = messages.map { |m| m[:id] || m.id
        }\\\\n  response = provider.create_message(...)\\\\n  ...\\\\nend\\\\n```\\\\n\\\\n###
        Minimum token threshold\\\\n\\\\nSkip the stable-boundary breakpoint when
        the cached prefix up to that point would be below the minimum cacheable threshold

        OWNER\n    active_lock_reason: null\n    sub_issues_summary:\n      total:
        0\n      completed: 0\n      percent_completed: 0\n    issue_dependencies_summary:\n      blocked_by:
        0\n      total_blocked_by: 0\n      blocking: 0\n      total_blocking: 0\n    body:
        \"## Problem to solve\\n\\n### 1. Misleading connection status during session
        switching\\n\\nWhen switching between sessions, the TUI shows \\\"disconnected\\\"
        in the input field and \\\"connecting\\\" in the status bar — even though
        the WebSocket is alive and healthy. The session is just loading its event
        history, not reconnecting.\\n\\nThis is misleading: the user thinks the connection
        dropped when actually the brain is still connected, just loading a different
        session''s data.\\n\\n**Root cause:** Connection status is tied to the event
        loading lifecycle, not the actual WebSocket state. Loading events triggers
        the same visual indicators as a real disconnect.\\n\\n**Expected:** \\\"disconnected\\\"
        / \\\"connecting\\\" should reflect the WebSocket state only. Session switching
        should show a different, non-alarming indicator (e.g. a loading state within
        the chat area, not in the connection status).\\n\\n### 2. Audit render loop
        for blocking I/O\\n\\nThe TUI render loop should be a pure state renderer
        — it reads the current state and draws it. All I/O (message loading, message
        sending, WebSocket communication) should happen asynchronously in background
        threads, updating shared state that the render loop picks up on the next frame.\\n\\n**Audit
        checklist:**\\n- Message history loading — does it block the render loop?\\n-
        Message sending — does it block the render loop?\\n- Session switching — does
        subscription/unsubscription block the render loop?\\n- WebSocket reconnection
        — does it block the render loop?\\n\\nAny blocking I/O found should be moved
        to background threads. The render loop should never wait on network, disk,
        or any external resource.\"\n    closed_by: null\n    reactions:\n      url:
        \"https://api.github.com/repos/hoblin/anima/issues/369/reactions\"\n      total_count:

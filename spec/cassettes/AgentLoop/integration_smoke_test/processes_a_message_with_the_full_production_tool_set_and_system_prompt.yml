        direct user messages which arrive unlabeled (or explicitly marked):\\n\\n```\\n[from
        user]: now a tool call\\n```\\n\\nThe sub-agent must be able to distinguish
        who is speaking to it.\\n\\n## Related\\n\\n- [Sub-agent missing identity
        context\\u0026nbsp;#346](https://github.com/hoblin/anima/issues/346) — Sub-agent
        also needs to know its own identity (who am I?)\\n- [Sub-agent session lifecycle
        unclear after interrupt\\u0026nbsp;#348](https://github.com/hoblin/anima/issues/348)
        — Sub-agent lifecycle after interrupt (am I alive or dead?)\\n\\nTogether

        Problem to solve\\\\n\\\\nSwitching to a sub-agent session requires too many
        steps:\\\\n\\\\n1. Ctrl+A (command mode)\\\\n2. S (session list)\\\\n3. Find
        current session in the list\\\\n4. → (expand to show sub-agents)\\\\n5. ↑/↓
        to select\\\\n6. Enter\\\\n\\\\nMeanwhile, the HUD panel on the right already
        shows sub-agents for the current session. This list is visible but not navigable.\\\\n\\\\n##
        Solution\\\\n\\\\nMake the HUD panel navigable when focused (Ctrl+A → →):\\\\n\\\\n-
        **Ctrl+A, →** focuses the HUD panel. First sub-agent is highlighted.\\\\n-
        **↑/↓** moves selection between sub-agents in the list.\\\\n- **Enter** switches
        to the selected sub-agent session.\\\\n- **←** or **Esc** returns focus to
        the chat input.\\\\n\\\\nScrolling the HUD content: leave for mouse wheel
        and Page Up/Page Down. Arrow keys are reserved for sub-agent navigation.\\\\n\\\\n##
        UX flow\\\\n\\\\n```\\\\nCtrl+A → →     Focus HUD, highlight first sub-agent\\\\n↑/↓
        \            Navigate between sub-agents  \\\\nEnter           Open selected
        sub-agent session\\\\n← / Esc         Return to chat input\\\\n```\\\\n\\\\nThis
        turns a 6-step workflow into 3 steps: Ctrl+A → → → Enter.\\\",\\\"closed_by\\\":null,\\\"reactions\\\":{\\\"url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/394/reactions\\\",\\\"total_count\\\":0,\\\"+1\\\":0,\\\"-1\\\":0,\\\"laugh\\\":0,\\\"hooray\\\":0,\\\"confused\\\":0,\\\"heart\\\":0,\\\"rocket\\\":0,\\\"eyes\\\":0},\\\"timeline_url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/394/timeline\\\",\\\"performed_via_github_app\\\":null,\\\"state_reason\\\":null,\\\"pinned_comment\\\":null},{\\\"url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/393\\\",\\\"repository_url\\\":\\\"https://api.github.com/repos/hoblin/anima\\\",\\\"labels_url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/393/labels{/name}\\\",\\\"comments_url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/393/comments\\\",\\\"events_url\\\":\\\"https://api.github.com/repos/hoblin/anima/issues/393/events\\\",\\\"html_url\\\":\\\"https://github.com/hoblin/anima/issues/393\\\",\\\"id\\\":4176390751,\\\"node_id\\\":\\\"I_kwDORcz--s747qpf\\\",\\\"number\\\":393,\\\"title\\\":\\\"Housekeeping:

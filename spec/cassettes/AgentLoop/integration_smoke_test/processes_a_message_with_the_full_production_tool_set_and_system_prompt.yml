        0\n      blocking: 0\n      total_blocking: 0\n    body: \"## Problem to solve\\n\\nThe
        agent prepends `cd /home/hoblin/Work/anima \u0026\u0026` to every bash command,
        even though it should already know its working directory. This wastes tokens
        and clutters the conversation — observed during a TUI smoke test where every
        tool call started with `...`.\\n\\nThe environment probe is supposed to communicate
        the current directory to the agent via the system prompt, so the agent shouldn''t
        need to `cd` manually.\\n\\n## Solution\\n\\nInvestigate why the agent doesn''t
        trust its working directory. Likely the environment context block either isn''t
        being injected or doesn''t clearly state the cwd.\\n\\n## Acceptance Criteria\\n\\n-
        Agent executes bash commands without redundant `cd` prefix\\n- Environment
        context clearly communicates the working directory in the system prompt\"\n    closed_by:

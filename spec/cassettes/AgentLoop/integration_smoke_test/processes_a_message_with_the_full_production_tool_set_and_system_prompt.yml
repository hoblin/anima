        0\n      total_blocked_by: 0\n      blocking: 0\n      total_blocking: 0\n    body:
        \"## Problem to solve\\n\\nWhen a user sends a message while a tool is executing,
        the pending message gets promoted and inserted between a `tool_use` and its
        matching `tool_result` in the message stream. This corrupts the conversation
        history — Anthropic''s API requires every `tool_use` to be immediately followed
        by its `tool_result` in the same turn.\\n\\n**Observed:** Session 27 has messages
        ordered by ID:\\n- `1064` — `tool_call` (tool_use_id: `toolu_01EmvzeyAVCBRfkUuuWh3f9s`)\\n-
        `1065` — `user_message` (promoted pending message)\\n- `1066` — `tool_response`
        (tool_use_id: `toolu_01EmvzeyAVCBRfkUuuWh3f9s`)\\n\\nThe API returns 400:
        `tool_use ids were found without tool_result blocks immediately after: toolu_01EmvzeyAVCBRfkUuuWh3f9s`\\n\\nThe
        session is permanently broken — every subsequent message bounces back.\\n\\n##
        Prior art\\n\\n#295 fixed the same class of bug for **sub-agent messages**
        — `SubagentMessageRouter#route_to_parent` was bypassing the pending queue.
        That fix made sub-agent messages go through `processing?` checks and pending
        promotion, matching `SessionChannel#speak`.\\n\\nThis time the interleaving
        happens with **human user messages**, which already go through `SessionChannel#speak`
        and the pending queue. The pending promotion in `AgentRequestJob` (`app/jobs/agent_request_job.rb:70-74`)
        should only run after the agent loop completes — but somehow the promoted
        message (ID 1065) got an ID between the tool_call (1064) and tool_response
        (1066).\\n\\n## Investigation needed\\n\\n- Did `promote_pending_messages!`
        run mid-loop (between tool_call and tool_response)?\\n- Or did the message
        bypass the pending queue entirely (e.g. `session.processing?` returned false
        during a brief window)?\\n- Or is this an ID ordering issue — the message
        was created pending earlier, promoted later, but its ID is lower than the
        tool_response because IDs are assigned at creation time?\\n\\n## Solution\\n\\nThe
        viewport assembler or message promotion logic must ensure user messages never
        split a tool_use/tool_result pair. Options:\\n\\n1. **Viewport assembly**
        — when building the messages array for the API, group tool_use and all its
        tool_results into a single assistant+user turn before interleaving user messages\\n2.
        **Promotion ordering** — ensure promoted messages get IDs after the current
        tool batch\\n3. **Heal on send** — before sending to the API, detect orphaned
        tool_use blocks and reorder\\n\\nThe root cause needs investigation before
        picking a solution.\"\n    closed_by: null\n    reactions:\n      url: \"https://api.github.com/repos/hoblin/anima/issues/357/reactions\"\n      total_count:

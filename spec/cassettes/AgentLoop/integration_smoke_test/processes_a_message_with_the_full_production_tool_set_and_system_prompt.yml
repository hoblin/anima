        \     merged_at: null\\n    body: \\\"## Summary\\\\n\\\\n- **Replace Rails
        encrypted credentials with Active Record Encryption** for runtime secrets
        (API tokens, MCP credentials)\\\\n- **New `Secret` model** with `encrypts
        :value` — stores secrets in the primary SQLite database, encrypted at rest\\\\n-
        **Eliminates the `bust_credentials_cache!` hack** — database-backed storage
        is always fresh, no caching issues in forked Solid Queue workers\\\\n- **One-time
        migration** on first boot copies existing credentials from Rails YAML to the
        new secrets table\\\\n- **Encryption keys** generated during `anima install`,
        stored in `~/.anima/config/encryption.key` (0600 permissions)\\\\n\\\\n##
        Why\\\\n\\\\nRails credentials are memoized at boot with `@credentials ||=`.
        Solid Queue forks workers from the supervisor process, and `paths[\\\\\\\"config\\\\\\\"]`
        returns nil in forked workers — making credential reads always fail for `AgentRequestJob`.
        The `bust_credentials_cache!` workaround was incomplete (clears `@config`
        but not `@options`).\\\\n\\\\nActive Record Encryption solves this because
        database queries work correctly across forked processes via the connection
        pool.\\\\n\\\\n## Part 2 (follow-up)\\\\n\\\\nSQLite database encryption (SQLCipher)
        is tracked separately — it requires system library dependencies and is a security
        hardening measure, not a functional fix.\\\\n\\\\n## Test plan\\\\n\\\\n-
        [ ] `bundle exec rspec` — all specs pass (205 affected specs green)\\\\n-
        [ ] Verify encryption keys are generated during `anima install`\\\\n- [ ]
        Verify token saved via TUI (`Ctrl+a → a`) is readable by background jobs\\\\n-
        [ ] Verify existing credentials are migrated on first boot after upgrade\\\\n-
        [ ] Verify raw `value` column in SQLite is encrypted (not plaintext)\\\\n\\\\nCloses
        #329\\\\n\\\\n\U0001F916 Generated with [Claude Code](https://claude.com/claude-code)\\\"\\n

        work well as-is\\\\n- Trimmed `spawn_specialist` base description and input
        schema descriptions (Boy Scout Rule)\\\\n\\\\n## What Nous now sees\\\\n\\\\n```\\\\nSpawn
        a specialist to work on a task. Its messages are forwarded to you. Address
        it via @name to send follow-up instructions.\\\\n\\\\nAvailable specialists:\\\\n-
        codebase-analyzer: Traces data flow and explains how code works. Returns file:line
        references.\\\\n- codebase-pattern-finder: Finds similar implementations,
        usage examples, and existing patterns to model after. Returns concrete code
        examples.\\\\n- documentation-researcher: Fetches official docs from the web.
        Returns ready-to-use code examples.\\\\n- thoughts-analyzer: thoughts/ holds
        design decisions, architecture notes, and implementation rationale. Answers
        WHY things work the way they do and how they should work by design.\\\\n-

        Summary\\\\n\\\\nFixes #331 — Sub-agents inherit the main agent's full context
        and continue pursuing its goals instead of their assigned task, burning through
        the daily token limit.\\\\n\\\\n- **Pin task as sole Goal on spawn** — `SpawnSubagent`
        and `SpawnSpecialist` create a Goal from the task description instead of a

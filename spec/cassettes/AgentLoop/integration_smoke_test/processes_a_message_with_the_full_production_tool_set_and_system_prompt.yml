        Problem to solve\\\\n\\\\nAnima currently only has a TUI client. For Bonk's
        migration from OpenClaw, Telegram is a primary communication channel — voice
        messages, text, photos. Need a way to reach Anima through Telegram.\\\\n\\\\n##
        Solution\\\\n\\\\n**anima-integration-telegram** — a separate Ruby gem that
        acts as a thin stateless proxy between the Telegram Bot API and Anima Brain
        via WebSocket.\\\\n\\\\n## Architecture\\\\n\\\\n- Connects to Anima Brain
        via WebSocket (same protocol as TUI)\\\\n- Translates Telegram events → Anima
        events and back\\\\n- **Stateless** — no DB, no storage, pure event translation\\\\n-
        **Resilient** — retry on connection loss, exponential backoff\\\\n- Runs as
        a systemd service\\\\n\\\\n## Translation map\\\\n\\\\n**Telegram → Anima:**
        text → user event, voice → STT → user event, photos → attachment event\\\\n**Anima
        → Telegram:** agent text → message, images → photo, TTS → voice message\\\\n\\\\n##
        Why separate gem?\\\\n\\\\n- Brain stays clean — no telegram-bot-ruby dependency\\\\n-
        Independent deployment and testing\\\\n- Separation of concerns: Brain = LLM,

    body:
      encoding: UTF-8
      string: "{\"model\":\"claude-haiku-4-5\",\"messages\":[{\"role\":\"user\",\"content\":\"The
        main session is working on this:\\n```\\nUser: Continue with the fix\\nAssistant:
        Sure, continuing.\\n```\\n\\nObserve the conversation and take action: manage
        goals, activate or deactivate relevant skills, read workflows when a multi-step
        task matches, rename the session if needed, then call everything_is_ready.\"}],\"max_tokens\":4096,\"tools\":[{\"name\":\"rename_session\",\"description\":\"Rename
        the conversation session. Use one emoji followed by 1-3 descriptive words.\",\"input_schema\":{\"type\":\"object\",\"properties\":{\"emoji\":{\"type\":\"string\",\"description\":\"A
        single emoji representing the conversation topic\"},\"name\":{\"type\":\"string\",\"description\":\"1-3
        word descriptive name for the session\"},\"timeout\":{\"type\":\"integer\",\"description\":\"Max
        execution seconds (default: 180). Increase for long-running operations.\"}},\"required\":[\"emoji\",\"name\"]}},{\"name\":\"activate_skill\",\"description\":\"Activate
        a domain knowledge skill on the main session. The skill's content will be
        injected into the agent's system prompt.\",\"input_schema\":{\"type\":\"object\",\"properties\":{\"name\":{\"type\":\"string\",\"description\":\"Name
        of the skill to activate (from the available skills list)\"},\"timeout\":{\"type\":\"integer\",\"description\":\"Max
        execution seconds (default: 180). Increase for long-running operations.\"}},\"required\":[\"name\"]}},{\"name\":\"deactivate_skill\",\"description\":\"Deactivate
        a skill that is no longer relevant. The skill's content will be removed from
        the agent's system prompt.\",\"input_schema\":{\"type\":\"object\",\"properties\":{\"name\":{\"type\":\"string\",\"description\":\"Name
        of the skill to deactivate (from the currently active skills list)\"},\"timeout\":{\"type\":\"integer\",\"description\":\"Max
        execution seconds (default: 180). Increase for long-running operations.\"}},\"required\":[\"name\"]}},{\"name\":\"read_workflow\",\"description\":\"Read
        a workflow's full content and activate it on the session. Use the content
        to create appropriate goals with set_goal.\",\"input_schema\":{\"type\":\"object\",\"properties\":{\"name\":{\"type\":\"string\",\"description\":\"Name
        of the workflow to read (from the available workflows list)\"},\"timeout\":{\"type\":\"integer\",\"description\":\"Max
        execution seconds (default: 180). Increase for long-running operations.\"}},\"required\":[\"name\"]}},{\"name\":\"deactivate_workflow\",\"description\":\"Deactivate
        the current workflow when it is complete or no longer relevant.\",\"input_schema\":{\"type\":\"object\",\"properties\":{\"timeout\":{\"type\":\"integer\",\"description\":\"Max
        execution seconds (default: 180). Increase for long-running operations.\"}},\"required\":[]}},{\"name\":\"set_goal\",\"description\":\"Create
        a goal on the main session. Omit parent_goal_id for a root goal, or provide
        it to create a sub-goal (TODO item).\",\"input_schema\":{\"type\":\"object\",\"properties\":{\"description\":{\"type\":\"string\",\"description\":\"What
        needs to be accomplished (1-2 sentences)\"},\"parent_goal_id\":{\"type\":\"integer\",\"description\":\"ID
        of the parent goal (omit for root goals)\"},\"timeout\":{\"type\":\"integer\",\"description\":\"Max
        execution seconds (default: 180). Increase for long-running operations.\"}},\"required\":[\"description\"]}},{\"name\":\"update_goal\",\"description\":\"Update
        a goal's description. Use this to refine a goal as understanding evolves.\",\"input_schema\":{\"type\":\"object\",\"properties\":{\"goal_id\":{\"type\":\"integer\",\"description\":\"ID
        of the goal to update\"},\"description\":{\"type\":\"string\",\"description\":\"New
        description for the goal (1-2 sentences)\"},\"timeout\":{\"type\":\"integer\",\"description\":\"Max
        execution seconds (default: 180). Increase for long-running operations.\"}},\"required\":[\"goal_id\",\"description\"]}},{\"name\":\"finish_goal\",\"description\":\"Mark
        a goal as completed. Use this when the main agent has finished the work described
        by the goal.\",\"input_schema\":{\"type\":\"object\",\"properties\":{\"goal_id\":{\"type\":\"integer\",\"description\":\"ID
        of the goal to mark as completed\"},\"timeout\":{\"type\":\"integer\",\"description\":\"Max
        execution seconds (default: 180). Increase for long-running operations.\"}},\"required\":[\"goal_id\"]}},{\"name\":\"everything_is_ready\",\"description\":\"Signal
        that no changes are needed. Call this when the session name and active skills
        are already appropriate.\",\"input_schema\":{\"type\":\"object\",\"properties\":{\"timeout\":{\"type\":\"integer\",\"description\":\"Max
        execution seconds (default: 180). Increase for long-running operations.\"}},\"required\":[]}}],\"system\":[{\"type\":\"text\",\"text\":\"You
        are Claude Code, Anthropic's official CLI for Claude.\"},{\"type\":\"text\",\"text\":\"You
        are a background automation that manages session metadata.\\nYou MUST ONLY
        communicate through tool calls — NEVER output text.\\nAlways finish by calling
        everything_is_ready.\\n\\n──────────────────────────────\\nSESSION NAMING\\n──────────────────────────────\\nCall
        rename_session when the topic becomes clear or shifts.\\nFormat: one emoji
        + 1-3 descriptive words.\\n\\n──────────────────────────────\\nSKILL MANAGEMENT\\n──────────────────────────────\\nCall
        activate_skill when the conversation matches a skill's description.\\nCall
        deactivate_skill when the agent moves to a different domain.\\nMultiple skills
        can be active at once.\\n\\n──────────────────────────────\\nWORKFLOW MANAGEMENT\\n──────────────────────────────\\nCall
        read_workflow when the user starts a multi-step task matching a workflow description.\\nRead
        the returned content and use judgment to create appropriate goals — not a
        mechanical 1:1 mapping.\\nAdapt to context: skip irrelevant steps, add extra
        steps for unfamiliar areas.\\nCall deactivate_workflow when the workflow completes
        or the user shifts focus.\\nOnly one workflow can be active at a time — activating
        a new one replaces the previous.\\n\\n──────────────────────────────\\nGOAL
        TRACKING\\n──────────────────────────────\\nCall set_goal to create a root
        goal when the user starts a multi-step task.\\nCall set_goal with parent_goal_id
        to add sub-goals (TODO items) under it.\\nCall update_goal to refine a goal's
        description as understanding evolves.\\nCall finish_goal when the main agent
        completes work a goal describes.\\nFinishing a root goal cascades — all active
        sub-goals are completed too.\\nNever duplicate an existing goal — check the
        active goals list first.\\n\\n──────────────────────────────\\nCOMPLETION\\n──────────────────────────────\\nCall
        everything_is_ready as your LAST tool call, every time.\\nIf nothing needs
        changing, call it immediately as your only tool call.\\n\\n──────────────────────────────\\nCURRENT
        STATE\\n──────────────────────────────\\nSession name: \U0001F527 Existing
        Name\\nActive skills: None\\nActive workflow: None\\n\\n──────────────────────────────\\nAVAILABLE
        SKILLS\\n──────────────────────────────\\n- activerecord — ActiveRecord patterns
        — associations, validations, queries, migrations, eager loading. Activate
        when working with models, migrations, database schema, N+1 queries, scopes,
        includes/preload/eager_load, callbacks, or editing files in app/models/ or
        db/migrate/.\\n- dragonruby — DragonRuby 2D game development — game loops,
        sprites, input, collisions, scenes. Activate when building games with DragonRuby/DRGTK,
        working with args.outputs/state/inputs, or editing game files.\\n- draper-decorators
        — Draper decorator patterns for Rails views. Activate when creating or testing
        decorators, moving formatting logic out of models/views, editing *_decorator.rb
        files, or working in app/decorators/.\\n- gh-issue — GitHub issue writing
        with WHAT/WHY/HOW framework. Activate when user creates issues, writes tickets,
        drafts GitHub issues, or edits issue descriptions.\\n- mcp-server — MCP server
        development in Ruby — tools, prompts, resources, transport. Activate when
        building Model Context Protocol servers, defining tools/prompts/resources,
        working with the mcp gem, or discussing LLM tool integrations.\\n- ratatui-ruby
        — RatatuiRuby terminal UI development — widgets, layouts, events, Tea MVU.
        Activate when building TUI apps, working with RatatuiRuby, terminal rendering,
        or editing TUI application files.\\n- rspec — RSpec testing with FactoryBot
        — matchers, test doubles, shared examples. Activate when writing specs, fixing
        failing tests, working with describe/it/expect blocks, editing *_spec.rb files,
        planning test strategy, or discussing unit/integration tests.\\n- git — Git
        workflow conventions: commit signatures, PR branding, and branch naming.\\n\\n──────────────────────────────\\nAVAILABLE
        WORKFLOWS\\n──────────────────────────────\\n- commit — Create focused git
        commits with user approval.\\n- create_handoff — Create handoff document for
        transferring work context to another session.\\n- create_note — Capture findings
        or context as a persistent note in the thoughts system.\\n- create_plan —
        Create detailed implementation plans through interactive research and iteration.\\n-
        decompose_ticket — Decompose a feature ticket into vertical slices — testable,
        deliverable units ordered by dependency.\\n- feature — Implement a GitHub
        issue end-to-end: branch, research, code, test, commit, PR, self-review.\\n-
        implement_plan — Implement an approved technical plan phase by phase with
        verification.\\n- iterate_plan — Iterate on existing implementation plans
        with research and targeted updates.\\n- research_codebase — Comprehensive
        codebase research by spawning parallel specialists and synthesizing findings.\\n-
        resume_handoff — Resume work from a handoff document with context analysis
        and validation.\\n- review_pr — Multi-agent PR review with three modes: review,
        re-review, self-review.\\n- thoughts_init — Initialize the thoughts system
        for the current repository.\\n- validate_plan — Validate implementation against
        plan, verify success criteria, and identify issues.\\n\"}]}"

        clear. Rename if it shifts.\nFormat: one emoji + 1-3 descriptive words.\n\n──────────────────────────────\nSKILL
        MANAGEMENT\n──────────────────────────────\nActivate skills when the conversation
        signals intent — before the agent acts on it.\nLate activation means the agent
        works without domain knowledge.\nDeactivate when the agent moves to a different
        domain.\nMultiple skills can be active at once.\n\n──────────────────────────────\nWORKFLOW

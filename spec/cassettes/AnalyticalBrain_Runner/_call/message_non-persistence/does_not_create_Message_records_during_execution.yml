        with user approval.\n- create_handoff вЂ” Preserve current session''s context,
        decisions, and next steps so another session can continue the work.\n- create_note
        вЂ” Persist findings, insights, or decisions as a note in the thoughts system
        for future sessions.\n- create_plan вЂ” For epics and multi-ticket efforts вЂ”
        research the problem space and design a phased implementation strategy before
        writing code.\n- decompose_ticket вЂ” Decompose a feature ticket into vertical
        slices вЂ” testable, deliverable units ordered by dependency.\n- feature вЂ” Implement
        a GitHub issue end-to-end: branch, research, code, test, commit, PR, self-review.\n-
        implement_plan вЂ” Execute an approved implementation plan вЂ” work through each

        many meaningful messages have passed since completion.\nEvict when count ≥
        threshold using the evict_goal tool.\nUse judgment: keep a goal longer if
        the conversation still references it.\n\n──────────────────────────────\nCOMPLETION\n──────────────────────────────\nAlways

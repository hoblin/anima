        Model Context Protocol servers, defining MCP tools/prompts/resources, working
        with the mcp gem, or discussing LLM tool integrations.\n- ratatui-ruby вЂ” Terminal
        UI development вЂ” widgets, layouts, events, Tea MVU. Activate when building

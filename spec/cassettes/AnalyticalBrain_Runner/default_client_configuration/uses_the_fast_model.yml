        of the workflow to read (from the available workflows list)"}},"required":["name"]}},{"name":"deactivate_workflow","description":"Deactivate
        the current workflow when it is complete or no longer relevant.","input_schema":{"type":"object","properties":{},"required":[]}},{"name":"set_goal","description":"Create
        a goal on the main session. Omit parent_goal_id for a root goal, or provide

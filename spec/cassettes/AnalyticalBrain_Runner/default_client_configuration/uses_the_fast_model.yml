        rspec вЂ” Testing with FactoryBot вЂ” matchers, test doubles, shared examples.
        Activate when writing specs, fixing failing tests, working with describe/it/expect
        blocks, editing *_spec.rb files, planning test strategy, or discussing unit/integration
        tests.\n\nв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ\nAVAILABLE WORKFLOWS\nв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ\n-
        commit вЂ” Create focused git commits with user approval.\n- create_handoff
        вЂ” Preserve current session''s context, decisions, and next steps so another
        session can continue the work.\n- create_note вЂ” Persist findings, insights,
        or decisions as a note in the thoughts system for future sessions.\n- create_plan
        вЂ” For epics and multi-ticket efforts вЂ” research the problem space and design
        a phased implementation strategy before writing code.\n- decompose_ticket
        вЂ” Decompose a feature ticket into vertical slices вЂ” testable, deliverable
        units ordered by dependency.\n- feature вЂ” Implement a GitHub issue end-to-end:
        branch, research, code, test, commit, PR, self-review.\n- implement_plan вЂ”
        Execute an approved implementation plan вЂ” work through each phase, verify
        success criteria before moving on.\n- iterate_plan вЂ” Revise an existing implementation
        plan based on feedback, new findings, or changed requirements.\n- research_codebase
        вЂ” Deep-dive into a large or unfamiliar codebase вЂ” delegate research to parallel
        specialists and synthesize findings.\n- resume_handoff вЂ” Continue work left
        by a previous session вЂ” read its handoff, verify assumptions, and pick up
